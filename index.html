<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoPix Revolutionary v5</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #075E54; --secondary: #128C7E; --blue: #34B7F1; --bg: #ECE5DD; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .app-header { background: var(--primary); color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .tabs { background: var(--primary); display: flex; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .tab { flex: 1; padding: 14px; color: rgba(255,255,255,0.6); font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: white; border-bottom-color: white; }

        .screen { display: none; flex: 1; overflow-y: auto; background: var(--white); height: calc(100vh - 110px); }
        .screen.active { display: block; }
        .list-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; object-fit: cover; background: #eee; }

        #chat-screen { position: fixed; inset: 0; background: #e5ddd5; z-index: 2000; display: none; flex-direction: column; }
        .msg-box { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 4px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-8e1d-60400d46e936.png'); }
        .msg { padding: 6px 10px; border-radius: 8px; max-width: 80%; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.sent { align-self: flex-end; background: #dcf8c6; }
        .msg.received { align-self: flex-start; background: white; }
        .msg img { max-width: 100%; border-radius: 5px; margin-top: 5px; }

        .input-bar { background: #f0f0f0; padding: 8px; display: flex; align-items: center; gap: 8px; }
        .input-bar input { flex: 1; padding: 10px 15px; border-radius: 20px; border: none; outline: none; }

        #call-screen { position: fixed; inset: 0; background: #075e54; z-index: 3000; display: none; flex-direction: column; color: white; }
        .video-container { flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden; }
        #remote-video, #local-video { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .video-split #remote-video, .video-split #local-video { height: 50%; border: 1px solid rgba(255,255,255,0.2); }
        
        .call-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: space-around; z-index: 10; }
        .btn-round { width: 65px; height: 65px; border-radius: 50%; border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #qr-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 4000; display: none; align-items: center; justify-content: center; flex-direction: column; color: white; }
        #qrcode { background: white; padding: 20px; border-radius: 10px; }

        .fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--secondary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        /* İkonlar arası məsafə düzəlişi */
        .call-icons i { margin-left: 35px; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <audio id="snd-msg" src="https://www.soundjay.com/button/button-20.mp3"></audio>
    <audio id="snd-ring" loop src="https://www.soundjay.com/phone/phone-calling-1.mp3"></audio>
    <audio id="snd-qudok" loop src="https://www.soundjay.com/phone/telephone-ring-03a.mp3"></audio>

    <div class="app-header">
        <i class="fas fa-qrcode" onclick="toggleQR(true)"></i>
        <b>EcoPix Ultra</b>
        <div id="my-id-display" style="font-size: 12px; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 5px;">AZ-....</div>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('chats')">SÖHBƏTLƏR</div>
        <div class="tab" onclick="switchTab('contacts')">KONTAKTLAR</div>
        <div class="tab" onclick="switchTab('history')">TARİXÇƏ</div>
    </div>

    <div id="chats" class="screen active"></div>
    <div id="contacts" class="screen"></div>
    <div id="history" class="screen"></div>

    <div class="fab" onclick="addContact()"><i class="fas fa-plus"></i></div>

    <div id="chat-screen">
        <div class="app-header" style="background:var(--secondary)">
            <div style="display:flex; align-items:center; flex:1;">
                <i class="fas fa-arrow-left" onclick="closeChat()" style="margin-right:15px;"></i>
                <img id="active-avatar" src="" class="avatar" style="width:38px; height:38px;">
                <b id="active-name">...</b>
            </div>
            <div class="call-icons">
                <i class="fas fa-video" onclick="initCall(true)"></i>
                <i class="fas fa-phone-alt" onclick="initCall(false)"></i>
            </div>
        </div>
        <div class="msg-box" id="msg-render"></div>
        <div class="input-bar">
            <i class="fas fa-paperclip" onclick="pickMedia()" style="font-size:22px; color:#666;"></i>
            <input type="text" id="msg-input" placeholder="Mesaj yazın...">
            <i class="fas fa-paper-plane" onclick="sendData()" style="color:var(--secondary); font-size:22px;"></i>
        </div>
    </div>

    <div id="call-screen">
        <div class="video-container" id="vid-cont">
            <video id="remote-video" autoplay playsinline></video>
            <video id="local-video" autoplay muted playsinline style="display:none;"></video>
            <div class="call-overlay" id="call-ui">
                <div style="text-align:center;">
                    <img id="call-avatar" src="https://via.placeholder.com/120" style="width:120px; height:120px; border-radius:50%; border:3px solid white; margin-bottom:15px;">
                    <h2 id="call-partner">Zəng...</h2>
                    <h3 id="timer">Bağlanılır...</h3>
                </div>
                <div style="display:flex; gap:40px;">
                    <button class="btn-round" style="background:#ff3b30;" onclick="hangUp()"><i class="fas fa-phone-slash"></i></button>
                    <button id="btn-answer" class="btn-round" style="background:#4cd964; display:none;" onclick="accept()"><i class="fas fa-phone"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="qr-modal" onclick="toggleQR(false)">
        <div id="qrcode"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCtrVliO1bmdg7r0juWz-Yj2EaEGNsz2j8", databaseURL: "https://ecopix-118c6-default-rtdb.europe-west1.firebasedatabase.app", projectId: "ecopix-118c6" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myID = localStorage.getItem('eco_id') || "AZ-" + Math.floor(1000 + Math.random()*9000);
        localStorage.setItem('eco_id', myID);
        document.getElementById('my-id-display').innerText = myID;
        new QRCode(document.getElementById("qrcode"), { text: myID, width: 200, height: 200 });

        const peer = new Peer(myID, { config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]} });
        let activePeer, activeCall, localStream, callType;

        function switchTab(t) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.target.classList.add('active');
            if(t === 'contacts') renderContacts();
            if(t === 'chats') renderRecent();
            if(t === 'history') renderHistory();
        }

        function toggleQR(show) { document.getElementById('qr-modal').style.display = show ? 'flex' : 'none'; }

        function openChat(id, name) {
            activePeer = id;
            document.getElementById('active-name').innerText = name;
            document.getElementById('active-avatar').src = `https://ui-avatars.com/api/?name=${name}&background=random`;
            document.getElementById('chat-screen').style.display = 'flex';
            loadMessages();
        }

        function closeChat() { document.getElementById('chat-screen').style.display = 'none'; }

        function sendData(media = null, type = 'text') {
            const input = document.getElementById('msg-input');
            if(!input.value && !media) return;
            const chatKey = [myID, activePeer].sort().join('_');
            const packet = { s: myID, t: input.value, m: media, mt: type, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
            db.ref('msgs/' + chatKey).push(packet);
            db.ref(`recent/${myID}/${activePeer}`).set({ name: document.getElementById('active-name').innerText, last: input.value || "Media", time: packet.time });
            document.getElementById('snd-msg').play();
            input.value = "";
        }

        function loadMessages() {
            const chatKey = [myID, activePeer].sort().join('_');
            db.ref('msgs/' + chatKey).on('value', snap => {
                const box = document.getElementById('msg-render'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val(); const side = d.s === myID ? 'sent' : 'received';
                    let content = d.t;
                    if(d.m) content = d.mt === 'video' ? `<video src="${d.m}" controls></video>` : `<img src="${d.m}">`;
                    box.innerHTML += `<div class="msg ${side}">${content}<br><small style="font-size:9px; opacity:0.6;">${d.time}</small></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function pickMedia() {
            cloudinary.openUploadWidget({ cloudName: "dyrfkit3x", uploadPreset: "ml_default" }, (err, res) => {
                if (!err && res.event === "success") sendData(res.info.secure_url, res.info.resource_type);
            });
        }

        // ZƏNG MOTORU
        function initCall(isVideo) {
            callType = isVideo ? "Görüntülü" : "Səsli";
            navigator.mediaDevices.getUserMedia({video: isVideo, audio: true}).then(stream => {
                localStream = stream;
                document.getElementById('snd-qudok').play(); // Qudok çalır
                if(isVideo) { document.getElementById('local-video').srcObject = stream; document.getElementById('local-video').style.display = 'block'; }
                activeCall = peer.call(activePeer, stream, { metadata: { video: isVideo } });
                document.getElementById('call-partner').innerText = document.getElementById('active-name').innerText;
                document.getElementById('call-screen').style.display = 'flex';
                setupCallHandlers(isVideo);
            });
        }

        peer.on('call', call => {
            activeCall = call;
            callType = call.metadata.video ? "Görüntülü" : "Səsli";
            document.getElementById('snd-ring').play(); // Zəng səsi
            document.getElementById('call-screen').style.display = 'flex';
            document.getElementById('btn-answer').style.display = 'flex';
            document.getElementById('call-partner').innerText = call.peer;
        });

        function accept() {
            const isVideo = activeCall.metadata.video;
            navigator.mediaDevices.getUserMedia({video: isVideo, audio: true}).then(stream => {
                localStream = stream;
                if(isVideo) { document.getElementById('local-video').srcObject = stream; document.getElementById('local-video').style.display = 'block'; }
                activeCall.answer(stream);
                document.getElementById('snd-ring').pause();
                document.getElementById('btn-answer').style.display = 'none';
                setupCallHandlers(isVideo);
            });
        }

        function setupCallHandlers(isVideo) {
            activeCall.on('stream', rem => {
                document.getElementById('snd-qudok').pause(); // Cavab veriləndə qudok dayanır
                document.getElementById('remote-video').srcObject = rem;
                if(isVideo) document.getElementById('vid-cont').classList.add('video-split');
                startCallTimer();
            });
            activeCall.on('close', hangUp);
        }

        function hangUp() {
            document.getElementById('snd-qudok').pause();
            document.getElementById('snd-ring').pause();
            if(activeCall) {
                saveHistory(activeCall.peer, document.getElementById('timer').innerText, callType);
                activeCall.close();
            }
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            document.getElementById('call-screen').style.display = 'none';
            document.getElementById('vid-cont').classList.remove('video-split');
            document.getElementById('local-video').style.display = 'none';
            clearInterval(window.callInt);
            document.getElementById('timer').innerText = "Bağlanılır...";
        }

        function saveHistory(id, duration, type) {
            let hist = JSON.parse(localStorage.getItem('eco_history') || "[]");
            hist.unshift({ id, duration, type, date: new Date().toLocaleString() });
            localStorage.setItem('eco_history', JSON.stringify(hist));
        }

        function renderHistory() {
            const hist = JSON.parse(localStorage.getItem('eco_history') || "[]");
            document.getElementById('history').innerHTML = hist.map(h => `
                <div class="list-item">
                    <i class="fas fa-${h.type==='Səsli'?'phone':'video'}" style="margin-right:20px; color:var(--secondary);"></i>
                    <div><b>${h.id}</b><br><small>${h.date} (${h.duration})</small></div>
                </div>`).join('');
        }

        function renderRecent() {
            db.ref(`recent/${myID}`).on('value', snap => {
                const cont = document.getElementById('chats'); cont.innerHTML = "";
                snap.forEach(s => {
                    const d = s.val();
                    cont.innerHTML += `<div class="list-item" onclick="openChat('${s.key}', '${d.name}')">
                        <img src="https://ui-avatars.com/api/?name=${d.name}&background=random" class="avatar">
                        <div style="flex:1;"><div style="display:flex; justify-content:space-between;"><b>${d.name}</b><small>${d.time}</small></div><p style="margin:0; font-size:13px; color:#666;">${d.last}</p></div>
                    </div>`;
                });
            });
        }

        function addContact() {
            const id = prompt("AZ-ID:"); const name = prompt("Ad:");
            if(id && name) {
                let list = JSON.parse(localStorage.getItem('eco_contacts') || "[]");
                list.push({id, name}); localStorage.setItem('eco_contacts', JSON.stringify(list));
                renderContacts();
            }
        }

        function renderContacts() {
            const list = JSON.parse(localStorage.getItem('eco_contacts') || "[]");
            document.getElementById('contacts').innerHTML = list.map(c => `<div class="list-item" onclick="openChat('${c.id}', '${c.name}')"><img src="https://ui-avatars.com/api/?name=${c.name}&background=random" class="avatar"><div><b>${c.name}</b><br><small>${c.id}</small></div></div>`).join('');
        }

        function startCallTimer() {
            let s = 0; clearInterval(window.callInt);
            window.callInt = setInterval(() => {
                s++; let m = Math.floor(s/60); let sec = s%60;
                document.getElementById('timer').innerText = `${m}:${sec<10?'0'+sec:sec}`;
            }, 1000);
        }

        renderContacts(); renderRecent();
    </script>
</body>
</html>
