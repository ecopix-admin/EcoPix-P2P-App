<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarMaster AI Pro v2.0 | Ultra-Precision Sonar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse-bg { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.5; }
        }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            SonarMaster AI Pro
        </h1>
        <p class="text-slate-500 text-xs uppercase tracking-widest mt-2">Ultra-Precision Sonar v2.0</p>
    </div>

    <div class="absolute top-4 right-4 bg-slate-800 p-4 rounded-xl border border-slate-700 text-right">
        <span class="block text-slate-500 uppercase text-xs">Toplam Ölçü</span>
        <span id="total-val" class="text-3xl font-bold text-emerald-400">0.00</span>
        <span class="text-lg font-bold text-emerald-500/80 ml-1">m</span>
    </div>

    <div class="relative w-64 h-64 flex items-center justify-center mb-10">
        <div id="visualizer" class="absolute inset-0 border-4 border-blue-500/30 rounded-full pulse-bg hidden"></div>
        <div class="text-center z-10">
            <span id="dist-val" class="text-6xl font-black font-mono">0.00</span>
            <span class="text-2xl font-bold text-blue-400 ml-1">m</span>
        </div>
    </div>

    <div class="w-full max-w-xs space-y-4">
        <button id="measureBtn" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all py-4 rounded-2xl font-bold text-xl shadow-lg shadow-blue-900/40">
            ÖLÇMƏYƏ BAŞLA
        </button>
        
        <div class="grid grid-cols-2 gap-3 text-xs">
            <button id="addTotalBtn" class="bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all p-3 rounded-xl border border-slate-700 disabled:opacity-50">
                <span class="block text-slate-500 uppercase">Topla</span>
                <span class="font-bold text-blue-400">+ Toplama Əlavə Et</span>
            </button>
            <button id="resetAllBtn" class="bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all p-3 rounded-xl border border-slate-700">
                <span class="block text-slate-500 uppercase">Sıfırla</span>
                <span class="font-bold text-red-400">⚠️ Sıfırla</span>
            </button>
        </div>
        
        <div class="bg-slate-900 p-3 rounded-xl border border-slate-800 text-center text-xs text-slate-600">
            Maksimum Ölçü: 5.0m (4 metrlik divar üçün optimaldır)
        </div>
    </div>

    <script>
        let audioCtx;
        let isMeasuring = false;
        let currentMeasure = 0;
        let totalMeasure = 0;

        const measureBtn = document.getElementById('measureBtn');
        const distVal = document.getElementById('dist-val');
        const totalVal = document.getElementById('total-val');
        const visualizer = document.getElementById('visualizer');
        const addTotalBtn = document.getElementById('addTotalBtn');
        const resetAllBtn = document.getElementById('resetAllBtn');

        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: 48000 // Yüksək dəqiqlik üçün
                });
            }
        }

        async function measure() {
            await initAudio();
            if (isMeasuring) return;
            isMeasuring = true;
            
            measureBtn.innerText = "SİQNAL GÖNDƏRİLİR...";
            measureBtn.classList.replace('bg-blue-600', 'bg-emerald-600');
            visualizer.classList.remove('hidden');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: {
                    echoCancellation: false,
                    noiseSuppression: false,
                    autoGainControl: false
                }});

                const duration = 0.01; // 10ms chirp
                const sampleRate = audioCtx.sampleRate;
                const buffer = audioCtx.createBuffer(1, sampleRate * duration, sampleRate);
                const data = buffer.getChannelData(0);

                // Chirp Signal (18kHz - 22kHz)
                for (let i = 0; i < buffer.length; i++) {
                    const t = i / sampleRate;
                    const f = 18000 + (4000 * t / duration);
                    data[i] = Math.sin(2 * Math.PI * f * t) * Math.exp(-t * 100);
                }

                // Dinləmə
                const source = audioCtx.createMediaStreamSource(stream);
                const processor = audioCtx.createScriptProcessor(2048, 1, 1);
                
                let recording = [];
                const startTime = audioCtx.currentTime + 0.05;

                const node = audioCtx.createBufferSource();
                node.buffer = buffer;
                node.connect(audioCtx.destination);

                processor.onaudioprocess = (e) => {
                    if (audioCtx.currentTime >= startTime) {
                        recording.push(...e.inputBuffer.getChannelData(0));
                        // Yalnız 30ms (maksimum 5m məsafə üçün) dinlə, 36m kimi mənasız rəqəmləri blokla
                        if (recording.length > sampleRate * 0.03) { 
                            stopAndAnalyze(recording, data, sampleRate);
                            processor.disconnect();
                            source.disconnect();
                        }
                    }
                };

                source.connect(processor);
                processor.connect(audioCtx.destination);
                node.start(startTime);

            } catch (err) {
                alert("Mikrofon icazəsi lazımdır!");
                resetMeasureState();
            }
        }

        function stopAndAnalyze(recorded, original, sr) {
            // Cross-correlation (DSP Alqoritmi)
            let maxCorr = -1;
            let bestDelay = 0;

            for (let i = 0; i < recorded.length - original.length; i++) {
                let corr = 0;
                for (let j = 0; j < original.length; j++) {
                    corr += recorded[i + j] * original[j];
                }
                if (corr > maxCorr) {
                    maxCorr = corr;
                    bestDelay = i;
                }
            }

            const timeOfFlight = bestDelay / sr;
            // OFFSET kompensasiyasını (0.04m) öz telefonuna görə bir az artırıb-azalda bilərsən
            const distance = Math.max(0, (timeOfFlight * 343.2 / 2) - 0.04);
            
            currentMeasure = distance;
            distVal.innerText = currentMeasure.toFixed(2);
            
            // Dəqiqlik dərəcəsi (Cross-Correlation gücünə görə rəng dəyişdirə bilərik - gələcək üçün)
            
            resetMeasureState();
        }

        function resetMeasureState() {
            isMeasuring = false;
            measureBtn.innerText = "ÖLÇMƏYƏ BAŞLA";
            measureBtn.classList.replace('bg-emerald-600', 'bg-blue-600');
            visualizer.classList.add('hidden');
        }

        measureBtn.addEventListener('click', measure);
        
        addTotalBtn.addEventListener('click', () => {
            totalMeasure += currentMeasure;
            totalVal.innerText = totalMeasure.toFixed(2);
            currentMeasure = 0; // Hər toplamadan sonra ölçünü sıfırla (gələcək addım üçün)
            distVal.innerText = "0.00";
        });
        
        resetAllBtn.addEventListener('click', () => {
            currentMeasure = 0;
            totalMeasure = 0;
            distVal.innerText = "0.00";
            totalVal.innerText = "0.00";
        });
    </script>
</body>
</html>
