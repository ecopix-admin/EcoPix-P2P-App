<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sham-Vision Pro</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-look-at-marker.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; }
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; pointer-events: none;
        }
        .corner { position: absolute; width: 30px; height: 30px; border: 3px solid #0f0; }
        #top-left { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        #top-right { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        #bottom-left { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        #bottom-right { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        #data-panel {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 20, 0, 0.9); color: #0f0;
            padding: 20px; border: 1px solid #0f0; border-radius: 15px;
            text-align: center; pointer-events: auto; width: 250px;
        }
        #status-icon { display: inline-block; width: 10px; height: 10px; background: #f00; border-radius: 50%; margin-right: 8px; animation: pulse 1s infinite; }
        button { background: #0f0; color: #000; border: none; padding: 10px; margin-top: 10px; font-weight: bold; cursor: pointer; width: 100%; border-radius: 5px; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    </style>
</head>

<body>
    <div id="ui-overlay">
        <div class="corner" id="top-left"></div>
        <div class="corner" id="top-right"></div>
        <div class="corner" id="bottom-left"></div>
        <div class="corner" id="bottom-right"></div>
        
        <div id="data-panel">
            <div><span id="status-icon"></span><span id="status-text">SİSTEM HAZIRLANIR...</span></div>
            <div style="font-size: 0.8em; margin: 10px 0;">TGT: 40.353482, 49.965170</div>
            <button id="start-btn">KAMERANI VƏ SƏSİ AÇ</button>
        </div>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">

        <a-assets>
            <video id="ar-video" src="https://www.w3schools.com/html/mov_bbb.mp4" 
                   loop="true" crossorigin="anonymous" playsinline muted></video>
        </a-assets>

        <a-video
            id="video-entity"
            src="#ar-video"
            width="16" height="9"
            gps-entity-place="latitude: 40.353482; longitude: 49.965170;"
            position="0 20 0"
            scale="2 2 2">
        </a-video>

        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        const btn = document.getElementById('start-btn');
        const video = document.getElementById('ar-video');
        const statusText = document.getElementById('status-text');
        const statusIcon = document.getElementById('status-icon');

        btn.addEventListener('click', () => {
            // Səsi və videonu aktivləşdir
            video.muted = false;
            video.play();
            
            // UI Yenilə
            btn.style.display = 'none';
            statusText.innerText = "SKANER AKTİVDİR";
            statusIcon.style.background = "#0f0";
            
            // Kameranı yenidən başlatmağa məcbur et
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            }
        });

        window.addEventListener('gps-camera-update-position', (e) => {
            statusText.innerText = "GPS SİQNALI TUTULDU";
        });
    </script>
</body>
</html>
