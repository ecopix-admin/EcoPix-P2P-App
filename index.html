<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sham-Cell | 3D Vision AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #controls { position: absolute; top: 10px; left: 10px; color: #0f0; z-index: 10; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #0f0; }
        canvas { display: block; }
        video { display: none; }
    </style>
</head>
<body>

    <div id="controls">
        <h3>SHAM-3D SCANNER</h3>
        <p id="status">Sistem hazırlanır...</p>
        <small>Real vaxtda 3D skelet skanı</small>
    </div>

    <video id="input_video"></video>

    <script>
        const videoElement = document.getElementById('input_video');
        const status = document.getElementById('status');

        // --- THREE.JS 3D SAHƏSİNİN QURULMASI ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        camera.position.z = 2;

        // 3D Nöqtələr üçün material
        const geometry = new THREE.BufferGeometry();
        const material = new THREE.PointsMaterial({ color: 0x00ff00, size: 0.05 });
        const points = new THREE.Points(geometry, material);
        scene.add(points);

        // --- AI SKANER (MEDIAPIPE POSE) ---
        function onResults(results) {
            if (!results.poseLandmarks) {
                status.innerText = "Obyekt axtarılır...";
                return;
            }
            status.innerText = "CANLI 3D SKAN AKTİVDİR";

            const positions = [];
            // Mediapipe-dən gələn 3D (x, y, z) məlumatlarını Three.js-ə ötürürük
            results.poseLandmarks.forEach(landmark => {
                positions.push(
                    (landmark.x - 0.5) * 2,  // X oxu (mərkəzləşdirilmiş)
                    -(landmark.y - 0.5) * 2, // Y oxu
                    -landmark.z              // Z oxu (Dərinlik!)
                );
            });

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.attributes.position.needsUpdate = true;
        }

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults(onResults);

        // Kamera aktivləşdirilməsi
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await pose.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        cameraUtils.start();

        // Render dövrü
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Pəncərə ölçüsü dəyişdikdə uyğunlaşma
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
