<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoPix Ultimate Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon-blue: #00f3ff; --neon-red: #ff0055; --bg: #0a0a0b; --card: #151517; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; overflow: hidden; height: 100vh; }

        /* Header */
        header { height: 70px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }
        .logo { font-size: 22px; font-weight: 900; color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); }
        #my-id-display { font-size: 14px; color: var(--neon-blue); font-weight: bold; cursor: pointer; border: 1px solid var(--neon-blue); padding: 5px 12px; border-radius: 8px; }

        /* Screens */
        .screen { display: none; height: calc(100vh - 140px); overflow-y: auto; padding: 10px; }
        .screen.active { display: block; }

        /* TikTok Section */
        #tiktok-screen iframe { width: 100%; height: 100%; border: none; border-radius: 15px; }

        /* List Items (Contacts/History) */
        .list-item { background: var(--card); margin-bottom: 12px; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; border-left: 4px solid var(--neon-blue); position: relative; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--neon-blue); color: black; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; box-shadow: 0 0 10px var(--neon-blue); }
        .item-info { flex: 1; }
        .trash-btn { color: var(--neon-red); font-size: 18px; padding: 10px; cursor: pointer; }

        /* Chat/Profile UI */
        #chat-ui { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        .chat-header { padding: 20px; background: #000; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 15px; }
        .chat-actions { display: flex; flex-direction: column; gap: 20px; position: absolute; right: 20px; top: 100px; }
        .action-btn { width: 55px; height: 55px; border-radius: 50%; background: var(--card); border: 2px solid var(--neon-blue); display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }
        
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .m.sent { background: var(--neon-blue); color: black; align-self: flex-end; }
        .m.rec { background: #333; color: white; align-self: flex-start; }

        /* Call Overlay */
        #call-ui { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
        .video-grid { height: 100%; display: flex; flex-direction: column; }
        #remote-v { height: 50%; width: 100%; object-fit: cover; background: #111; }
        #local-v { height: 50%; width: 100%; object-fit: cover; background: #222; }
        .call-info { position: absolute; top: 50px; width: 100%; text-align: center; }
        .call-ctrls { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: center; gap: 50px; }
        .end-btn { width: 75px; height: 75px; background: var(--neon-red); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 0 20px var(--neon-red); }

        /* Incoming Call Modal */
        #incoming-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center; text-align: center; }

        /* Floating Add Button */
        .add-btn { position: fixed; bottom: 90px; right: 25px; width: 65px; height: 65px; background: var(--neon-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: black; box-shadow: 0 0 20px var(--neon-blue); z-index: 99; border: none; }

        /* Nav */
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; border-top: 1px solid var(--neon-blue); }
        .n-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 11px; }
        .n-item.active { color: var(--neon-blue); }
        .n-item i { font-size: 24px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">ECOPIX PRO</div>
        <div id="my-id-display" onclick="alert('Sənin ID: ' + myID)">Yüklənir...</div>
    </header>

    <div id="scr-history" class="screen"><h3 style="margin-bottom:15px; color:var(--neon-blue)">Zəng Tarixçəsi</h3><div id="call-history-list"></div></div>
    <div id="scr-chats" class="screen"><h3 style="margin-bottom:15px; color:var(--neon-blue)">Söhbətlər</h3><div id="chat-list"></div></div>
    <div id="scr-contacts" class="screen active"><h3 style="margin-bottom:15px; color:var(--neon-blue)">Dostlar</h3><div id="friends-list"></div></div>
    <div id="scr-tiktok" class="screen"><iframe src="https://www.tiktok.com/embed/v2/7345678912345678912"></iframe></div>

    <button class="add-btn" onclick="addFriend()"><i class="fas fa-plus"></i></button>

    <div id="chat-ui">
        <div class="chat-header">
            <i class="fas fa-arrow-left" onclick="closeChat()"></i>
            <div class="avatar" id="c-avatar" style="width:40px; height:40px; font-size:16px;"></div>
            <b id="c-name">Ad</b>
        </div>
        <div class="chat-actions">
            <div class="action-btn" onclick="startCall('voice')"><i class="fas fa-phone"></i></div>
            <div class="action-btn" onclick="startCall('video')"><i class="fas fa-video"></i></div>
        </div>
        <div id="messages"></div>
        <div style="padding:15px; display:flex; gap:10px; background:#000;">
            <input type="text" id="m-input" placeholder="Mesaj yaz..." style="flex:1; padding:15px; border-radius:30px; border:none; background:#222; color:white;">
            <button onclick="sendMsg()" style="background:var(--neon-blue); border:none; width:50px; height:50px; border-radius:50%;"><i class="fas fa-paper-plane" style="color:black"></i></button>
        </div>
    </div>

    <div id="call-ui">
        <div class="video-grid" id="v-grid">
            <video id="remote-v" autoplay playsinline></video>
            <video id="local-v" autoplay playsinline muted></video>
        </div>
        <div class="call-info">
            <h2 id="call-target-name">Zəng edilir...</h2>
            <div id="call-timer">00:00</div>
        </div>
        <div class="call-ctrls">
            <div class="end-btn" onclick="location.reload()"><i class="fas fa-phone-slash"></i></div>
        </div>
    </div>

    <div id="incoming-modal">
        <div>
            <h1 id="caller-name">AZ-XXXXXX</h1>
            <p style="margin:20px 0;">Zəng gəlir...</p>
            <div style="display:flex; gap:50px; justify-content:center;">
                <div onclick="acceptCall()" style="width:70px; height:70px; background:var(--neon-blue); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px; color:black;"><i class="fas fa-phone"></i></div>
                <div onclick="location.reload()" style="width:70px; height:70px; background:var(--neon-red); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px;"><i class="fas fa-phone-slash"></i></div>
            </div>
        </div>
    </div>

    <nav>
        <div class="n-item" onclick="tab('scr-history', this)"><i class="fas fa-clock"></i>TARİXÇƏ</div>
        <div class="n-item" onclick="tab('scr-chats', this)"><i class="fas fa-comment"></i>SÖHBƏT</div>
        <div class="n-item active" onclick="tab('scr-contacts', this)"><i class="fas fa-user-friends"></i>DOSTLAR</div>
        <div class="n-item" onclick="tab('scr-tiktok', this)"><i class="fab fa-tiktok"></i>TIKTOK</div>
    </nav>

    <script>
        // 1. UNİKAL ID SİSTEMİ (AZ-XXXXXX)
        let myID = localStorage.getItem('eco_fixed_id');
        if(!myID) {
            myID = 'AZ-' + Math.floor(100000 + Math.random() * 900000);
            localStorage.setItem('eco_fixed_id', myID);
        }
        document.getElementById('my-id-display').innerText = myID;

        const peer = new Peer(myID);
        let activeConn, targetID, callTimerInterval, startTime;

        // 2. DOST ƏLAVƏ ET VƏ SİL
        function addFriend() {
            const n = prompt("Ad:");
            const i = prompt("ID (AZ-XXXXXX):");
            if(n && i) {
                let db = JSON.parse(localStorage.getItem('friends') || '[]');
                db.push({n, i});
                localStorage.setItem('friends', JSON.stringify(db));
                renderAll();
            }
        }

        function deleteFriend(id) {
            let db = JSON.parse(localStorage.getItem('friends') || '[]');
            db = db.filter(f => f.i !== id);
            localStorage.setItem('friends', JSON.stringify(db));
            renderAll();
        }

        function renderAll() {
            const friends = JSON.parse(localStorage.getItem('friends') || '[]');
            document.getElementById('friends-list').innerHTML = friends.map(f => `
                <div class="list-item" onclick="openChat('${f.n}', '${f.i}')">
                    <div class="avatar">${f.n[0]}</div>
                    <div class="item-info"><b>${f.n}</b><br><small>${f.i}</small></div>
                    <i class="fas fa-trash trash-btn" onclick="event.stopPropagation(); deleteFriend('${f.i}')"></i>
                </div>
            `).join('');
            renderHistory();
        }

        // 3. ÇAT SİSTEMİ
        function openChat(name, id) {
            targetID = id;
            document.getElementById('c-name').innerText = name;
            document.getElementById('c-avatar').innerText = name[0];
            document.getElementById('chat-ui').style.display = 'flex';
            activeConn = peer.connect(id);
            activeConn.on('data', data => receiveMsg(data));
        }

        function sendMsg() {
            const inp = document.getElementById('m-input');
            if(inp.value && activeConn) {
                activeConn.send(inp.value);
                appendMsg(inp.value, 'sent');
                inp.value = '';
                // Mesaj səsi buraya əlavə oluna bilər
            }
        }

        function receiveMsg(txt) {
            appendMsg(txt, 'rec');
            // Bildiriş səsi
        }

        function appendMsg(t, type) {
            const d = document.createElement('div');
            d.className = `m ${type}`;
            d.innerText = t;
            document.getElementById('messages').appendChild(d);
            document.getElementById('messages').scrollTop = 10000;
        }

        // 4. ZƏNG SİSTEMİ (PRO)
        let currentCall;
        function startCall(type) {
            saveHistory(targetID, type);
            navigator.mediaDevices.getUserMedia({video: type==='video', audio:true}).then(stream => {
                document.getElementById('call-ui').style.display = 'block';
                document.getElementById('local-v').srcObject = stream;
                if(type === 'voice') document.getElementById('local-v').style.display = 'none';
                
                const call = peer.call(targetID, stream);
                setupCall(call);
            });
        }

        peer.on('call', call => {
            currentCall = call;
            document.getElementById('caller-name').innerText = call.peer;
            document.getElementById('incoming-modal').style.display = 'flex';
            // Google Meet zəng səsi play()
        });

        function acceptCall() {
            document.getElementById('incoming-modal').style.display = 'none';
            navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(stream => {
                document.getElementById('call-ui').style.display = 'block';
                document.getElementById('local-v').srcObject = stream;
                currentCall.answer(stream);
                setupCall(currentCall);
            });
        }

        function setupCall(call) {
            call.on('stream', remoteStream => {
                document.getElementById('remote-v').srcObject = remoteStream;
                startTimer();
            });
        }

        function startTimer() {
            startTime = Date.now();
            callTimerInterval = setInterval(() => {
                let diff = Math.floor((Date.now() - startTime) / 1000);
                let m = Math.floor(diff / 60).toString().padStart(2, '0');
                let s = (diff % 60).toString().padStart(2, '0');
                document.getElementById('call-timer').innerText = `${m}:${s}`;
            }, 1000);
        }

        // 5. TARİXÇƏ
        function saveHistory(id, type) {
            let hist = JSON.parse(localStorage.getItem('history') || '[]');
            hist.unshift({id, type, time: new Date().toLocaleString()});
            localStorage.setItem('history', JSON.stringify(hist));
        }

        function renderHistory() {
            const hist = JSON.parse(localStorage.getItem('history') || '[]');
            document.getElementById('call-history-list').innerHTML = hist.map(h => `
                <div class="list-item">
                    <i class="fas fa-${h.type==='video'?'video':'phone'}" style="color:var(--neon-blue)"></i>
                    <div class="item-info"><b>${h.id}</b><br><small>${h.time}</small></div>
                    <i class="fas fa-redo" onclick="openChat('Dost', '${h.id}')" style="color:var(--neon-blue)"></i>
                </div>
            `).join('');
        }

        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.n-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function closeChat() { document.getElementById('chat-ui').style.display = 'none'; }

        window.onload = renderAll;
    </script>
</body>
</html>
