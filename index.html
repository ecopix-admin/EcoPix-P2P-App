<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloSketch PRO | No-Lag Drawing</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #010409; overflow: hidden; touch-action: none; }
        /* Görüntünü güzgü kimi çeviririk */
        canvas { transform: scaleX(-1); border-radius: 20px; }
        .active-brush { border: 2px solid #3b82f6; transform: scale(1.1); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="absolute top-6 flex items-center gap-3 bg-slate-900/80 px-4 py-2 rounded-full border border-slate-700">
        <div id="dot" class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
        <span class="text-xs font-mono text-slate-300 uppercase tracking-widest">Holo-Tracker Active</span>
    </div>

    <div class="relative w-full max-w-4xl shadow-2xl">
        <video id="input_video" class="hidden"></video>
        <canvas id="output_canvas" class="w-full h-auto bg-black shadow-inner"></canvas>
    </div>

    <div id="palette" class="fixed bottom-10 flex gap-4 bg-slate-900/90 p-4 rounded-3xl border border-white/10 backdrop-blur-xl">
        <div onclick="changeColor('#ff0000')" class="w-10 h-10 bg-red-500 rounded-full cursor-pointer active-brush"></div>
        <div onclick="changeColor('#00ff00')" class="w-10 h-10 bg-green-500 rounded-full cursor-pointer"></div>
        <div onclick="changeColor('#0080ff')" class="w-10 h-10 bg-blue-500 rounded-full cursor-pointer"></div>
        <div onclick="changeColor('#ffffff')" class="w-10 h-10 bg-white rounded-full cursor-pointer"></div>
        <button onclick="clearCanvas()" class="ml-4 text-xs font-bold text-slate-400">TƏMİZLƏ</button>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        
        let currentColor = '#ff0000';
        let isDrawing = false;
        let points = [];
        
        // Titrəməni önləmək üçün hamarlaşdırma
        let smoothedX = 0, smoothedY = 0;
        const lerp = (start, end, amt) => (1 - amt) * start + amt * end;

        function changeColor(c) {
            currentColor = c;
            event.target.parentElement.querySelectorAll('div').forEach(el => el.classList.remove('active-brush'));
            event.target.classList.add('active-brush');
        }

        function clearCanvas() {
            points = [];
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Kameranı çək
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const thumbTip = hand[4];
                const indexTip = hand[8];

                // Koordinatları hesabla (Güzgü effektini nəzərə alaraq)
                const targetX = indexTip.x * canvasElement.width;
                const targetY = indexTip.y * canvasElement.height;

                // Titrəməni azaldan riyazi filtr
                smoothedX = lerp(smoothedX, targetX, 0.3);
                smoothedY = lerp(smoothedY, targetY, 0.3);

                // Pinch (Birləşdirmə) yoxla
                const distance = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                
                if (distance < 0.05) {
                    if (!isDrawing) {
                        points.push([]); // Yeni xətt başla
                        isDrawing = true;
                    }
                    points[points.length - 1].push({x: smoothedX, y: smoothedY, color: currentColor});
                    document.getElementById('dot').classList.replace('bg-red-500', 'bg-green-500');
                } else {
                    isDrawing = false;
                    document.getElementById('dot').classList.replace('bg-green-500', 'bg-red-500');
                }
            }

            // Bütün xətləri rəngləri ilə birlikdə çək
            canvasCtx.lineJoin = 'round';
            canvasCtx.lineCap = 'round';
            canvasCtx.lineWidth = 5;

            points.forEach(stroke => {
                if (stroke.length < 2) return;
                canvasCtx.beginPath();
                canvasCtx.strokeStyle = stroke[0].color;
                canvasCtx.moveTo(stroke[0].x, stroke[0].y);
                for (let i = 1; i < stroke.length; i++) {
                    canvasCtx.lineTo(stroke[i].x, stroke[i].y);
                }
                canvasCtx.stroke();
            });

            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                await hands.send({image: videoElement});
            },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
