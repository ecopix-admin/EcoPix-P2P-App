<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Görən Göz AI - Dostun</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #video-container { position: relative; flex: 1; width: 100%; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .full-btn { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(39, 174, 96, 0.2); border: none; color: white; 
            font-size: 2rem; font-weight: bold; cursor: pointer; z-index: 10;
        }
        .status-bar { height: 60px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-top: 3px solid #27ae60; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
        <button id="mainBtn" class="full-btn" onclick="init()">BAŞLATMAK İÇİN DOKUN</button>
    </div>
    <div id="status" class="status-bar">Sistem Hazır</div>

    <script>
        let model;
        let video = document.getElementById('webcam');
        let statusDiv = document.getElementById('status');
        let mainBtn = document.getElementById('mainBtn');
        let synth = window.speechSynthesis;
        let lastObject = "";
        let isRunning = false;

        function speak(text) {
            if (synth.speaking) return; 
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            utterance.rate = 1.1; // Biraz daha hızlı ve doğal konuşma
            synth.speak(utterance);
        }

        async function init() {
            if(isRunning) return;
            
            mainBtn.innerText = "SİSTEM ÇALIŞIYOR...";
            statusDiv.innerText = "Yükleniyor...";
            speak("Merhaba dostum, gözlerini açıyorum. Lütfen bekle.");

            model = await cocoSsd.load();
            
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: false
            });
            video.srcObject = stream;
            
            isRunning = true;
            mainBtn.style.display = "none"; // Başladıktan sonra ekranı temizle
            statusDiv.innerText = "Görüyorum...";
            speak("Sistem aktif. Etrafı senin için izliyorum.");
            
            predict();
        }

        const tr_dict = {
            "person": "Bir kişi", "car": "Araba geliyor", "chair": "Sandalye", 
            "bottle": "Şişe", "cell phone": "Telefon", "laptop": "Bilgisayar",
            "cup": "Bardak", "bed": "Yatak", "tv": "Televizyon", 
            "backpack": "Çanta", "handbag": "El çantası", "bicycle": "Bisiklet"
        };

        async function predict() {
            if(!isRunning) return;

            const predictions = await model.detect(video, 3, 0.5); // Sadece en yakın 3 objeyi al
            
            if (predictions.length > 0) {
                let currentObj = predictions[0].class;
                let turkishName = tr_dict[currentObj] || currentObj;

                if (turkishName !== lastObject) {
                    statusDiv.innerText = "Gördüğüm: " + turkishName;
                    speak(turkishName);
                    lastObject = turkishName;
                }
            }
            
            // Daha akıcı analiz için kısa gecikme ile sürekli döngü
            setTimeout(() => {
                requestAnimationFrame(predict);
            }, 500); 
        }
    </script>
</body>
</html>
