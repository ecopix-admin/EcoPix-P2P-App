<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wire Tracker Pro v6.0</title>
    <style>
        body { background: #0a0a0a; color: #555; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; transition: 0.4s; }
        .container { height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .value-box { font-size: 100px; font-weight: 900; letter-spacing: -2px; margin: 10px 0; }
        #status { font-size: 18px; font-weight: bold; letter-spacing: 3px; color: #444; }
        button { background: #444; color: #000; border: none; padding: 25px 60px; font-size: 22px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        /* Tapıldı rejimi - Parlaq Yaşıl */
        .found { background: #00ff41 !important; color: #000 !important; }
        .found .value-box { color: #000 !important; }
        .found #status { color: #000 !important; }
    </style>
</head>
<body>

<div class="container" id="mainBg">
    <div id="status">SİSTEM DEAKTİVDİR</div>
    <div id="display" class="value-box">0.0</div>
    <div id="msg">Kalibrasiya üçün düyməyə basıb 3 saniyə gözləyin</div>
    <br>
    <button id="startBtn" onclick="startApp()">SKANERI BAŞLAT</button>
</div>

<script>
    let audioCtx, oscillator, gainNode;
    let smoothedValue = 0;
    let baseline = 0;
    let isCalibrated = false;

    function setupAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        oscillator = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        gainNode.gain.value = 0;
        oscillator.start();
    }

    function startApp() {
        if (!audioCtx) setupAudio();
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientationabsolute', handleData, true);
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status').innerText = "KALİBRASİYA OLUNUR...";
            
            // 3 saniyə sabit saxlayın ki, fonu ölçsün
            setTimeout(() => {
                isCalibrated = true;
                document.getElementById('status').innerText = "HAZIR - SKAN EDİN";
                document.getElementById('msg').innerText = "Yavaş hərəkət etdirin";
            }, 3000);
        }
    }

    function handleData(event) {
        let rawVal = event.alpha || event.webkitCompassHeading || 0;

        // GÜCLÜ FİLTR: Rəqəmlərin qaçmasının qarşısını alır (Low-pass filter)
        smoothedValue = (0.03 * rawVal) + (0.97 * smoothedValue);
        
        const display = document.getElementById('display');
        const status = document.getElementById('status');
        const mainBg = document.getElementById('mainBg');

        if (!isCalibrated) {
            baseline = smoothedValue;
            display.innerText = smoothedValue.toFixed(1);
            return;
        }

        // Fərqi hesabla
        let diff = Math.abs(smoothedValue - baseline);
        if (diff > 180) diff = Math.abs(diff - 360);

        display.innerText = smoothedValue.toFixed(1);

        // HƏSSASLIQ AYARI: 15 dərəcədən çox sıçrayış olsa (Naqil deməkdir)
        if (diff > 15) {
            mainBg.classList.add('found');
            status.innerText = "NAQİL TAPILDI!";
            
            // Vibrasiya və Səs
            if (navigator.vibrate) navigator.vibrate(80);
            if (gainNode) {
                oscillator.frequency.value = 180 + (diff * 2);
                gainNode.gain.setTargetAtTime(0.15, audioCtx.currentTime, 0.01);
            }
        } else {
            // NORMAL HAL: Heç bir səs və ya titrəyiş yoxdur
            mainBg.classList.remove('found');
            status.innerText = "SKAN EDİLİR...";
            if (gainNode) gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
            
            // Adaptiv Baseline: Ətraf mühitə yavaşca uyğunlaşır ki, yalançı siqnal verməsin
            baseline = (0.01 * smoothedValue) + (0.99 * baseline);
        }
    }
</script>
</body>
</html>
