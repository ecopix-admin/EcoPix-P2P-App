<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirPiano AI | Havada Pianino</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .key-active { background: rgba(59, 130, 246, 0.8) !important; transform: translateY(10px); }
        canvas { transform: scaleX(-1); } /* Güzgü effekti */
        video { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center overflow-hidden">

    <div class="mt-6 text-center">
        <h1 class="text-3xl font-black text-blue-500 uppercase tracking-tighter">AirPiano AI</h1>
        <p class="text-slate-500 text-xs">Əllərinizi kameraya göstərin və havada çalın</p>
    </div>

    <div class="relative mt-8 border-4 border-slate-800 rounded-3xl overflow-hidden bg-black shadow-2xl">
        <video id="input_video"></video>
        <canvas id="output_canvas" width="640" height="480"></canvas>
        
        <div id="keyboard" class="absolute bottom-0 left-0 w-full h-32 flex gap-1 px-2 mb-2">
            </div>
    </div>

    <div id="status" class="mt-4 text-emerald-500 font-mono text-sm uppercase">Sistem yüklənir...</div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const keyboard = document.getElementById('keyboard');
        const status = document.getElementById('status');

        const notes = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5'];
        const freqs = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Düymələri yarat
        notes.forEach((note, i) => {
            const key = document.createElement('div');
            key.className = "flex-1 bg-white/10 border border-white/20 rounded-lg flex items-end justify-center pb-2 transition-all duration-100";
            key.innerHTML = `<span class="text-slate-400 font-bold">${note}</span>`;
            key.id = `key-${i}`;
            keyboard.appendChild(key);
        });

        function playNote(index) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freqs[index], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);

            const keyEl = document.getElementById(`key-${index}`);
            keyEl.classList.add('key-active');
            setTimeout(() => keyEl.classList.remove('key-active'), 150);
        }

        let lastActiveKey = -1;

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                status.innerText = "Əl aşkarlandı - Çalmağa hazırdır";
                for (const landmarks of results.multiHandLandmarks) {
                    // Şəhadət barmağının ucu (Nöqtə 8)
                    const indexFinger = landmarks[8];
                    const x = (1 - indexFinger.x) * canvasElement.width;
                    const y = indexFinger.y * canvasElement.height;

                    // Barmağı çək
                    canvasCtx.fillStyle = "#3b82f6";
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, 10, 0, 2 * Math.PI);
                    canvasCtx.fill();

                    // Düyməyə dəyib-dəymədiyini yoxla
                    if (y > canvasElement.height - 128) { // Düymələr sahəsi
                        const keyWidth = canvasElement.width / notes.length;
                        const keyIndex = Math.floor(x / keyWidth);
                        
                        if (keyIndex !== lastActiveKey && keyIndex >= 0 && keyIndex < notes.length) {
                            playNote(keyIndex);
                            lastActiveKey = keyIndex;
                        }
                    } else {
                        lastActiveKey = -1;
                    }
                }
            } else {
                status.innerText = "Kameraya əlinizi göstərin";
                lastActiveKey = -1;
            }
            canvasCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        camera.start();
    </script>
</body>
</html>
