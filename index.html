<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GÖREN GÖZ | ZIĞ TV MODE</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; display: flex; 
            align-items: center; justify-content: center; z-index: 9999;
        }
        .btn { 
            padding: 20px 60px; border-radius: 50px; background: #fff; 
            border: none; font-weight: bold; cursor: pointer; color: #000; 
            font-size: 20px; box-shadow: 0 0 30px rgba(255,255,255,0.5);
        }
    </style>
</head>

<body>

    <div id="overlay">
        <button class="btn" onclick="startTV()">YAYIMI BAŞLAT</button>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">

        <a-assets>
            <video id="tv-video" 
                   src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" playsinline muted>
            </video>
        </a-assets>

        <a-camera gps-camera="minDistance: 1; positionMinAccuracy: 50;" rotation-reader fov="60"></a-camera>

        <a-entity gps-entity-place="latitude: 40.350554; longitude: 49.965319;">
            
            <a-entity position="0 2 0" scale="8 8 8">
                
                <a-box color="#000" width="2.1" height="1.2" depth="0.05" position="0 0 -0.01"></a-box>

                <a-video src="#tv-video" width="2" height="1.1" material="shader: flat; side: double;"></a-video>
                
                <a-text value="ZIG LIVE TV" align="center" position="0 -0.7 0" width="2.5" color="#fff"></a-text>

            </a-entity>

            <a-circle color="#fff" radius="0.5" rotation="-90 0 0" position="0 -1.5 0" opacity="0.3"></a-circle>

        </a-entity>

    </a-scene>

    <script>
        function startTV() {
            document.getElementById('overlay').style.display = 'none';
            var v = document.querySelector('#tv-video');
            if(v) v.play();
        }

        // GPS məlumatını brauzerdə təmizləyirik
        navigator.geolocation.watchPosition(()=>{}, ()=>{}, {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 5000
        });
    </script>
</body>
</html>
