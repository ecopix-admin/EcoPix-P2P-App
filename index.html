<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Cyber Ops: 3D Shooter</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid rgba(0, 255, 0, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px;
            color: #0f0; font-size: 24px; text-shadow: 0 0 10px #0f0;
        }
        #instructions {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; text-align: center; background: rgba(0,0,0,0.8);
            padding: 20px; border: 2px solid #0f0; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">XAL: 0</div>
    <div id="instructions">
        <h1>CYBER OPS</h1>
        <p>Hərəkət: W, A, S, D | Atəş: KLİK</p>
        <p>Oynamaq üçün klikləyin</p>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        let scene, camera, renderer, moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let bullets = [], enemies = [], score = 0;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.Fog(0x020205, 0, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 0.75);
            scene.add(light);

            // Yer (Grid)
            const grid = new THREE.GridHelper(100, 50, 0x00ff00, 0x222222);
            scene.add(grid);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Pointer Lock (Mouse ilə baxmaq)
            const instructions = document.getElementById('instructions');
            instructions.addEventListener('click', () => {
                document.body.requestPointerLock();
            });

            document.addEventListener('pointerlockchange', () => {
                instructions.style.display = document.pointerLockElement ? 'none' : 'block';
            });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement) {
                    camera.rotation.y -= e.movementX * 0.002;
                }
            });

            window.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW') moveForward = true;
                if(e.code === 'KeyS') moveBackward = true;
                if(e.code === 'KeyA') moveLeft = true;
                if(e.code === 'KeyD') moveRight = true;
            });

            window.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW') moveForward = false;
                if(e.code === 'KeyS') moveBackward = false;
                if(e.code === 'KeyA') moveLeft = false;
                if(e.code === 'KeyD') moveRight = false;
            });

            window.addEventListener('mousedown', shoot);

            spawnEnemy();
            animate();
        }

        function shoot() {
            if (!document.pointerLockElement) return;
            const bullet = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xffff00 })
            );
            bullet.position.copy(camera.position);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            bullet.userData.velocity = dir.multiplyScalar(1.5);
            bullets.push(bullet);
            scene.add(bullet);
        }

        function spawnEnemy() {
            const enemy = new THREE.Mesh(
                new THREE.BoxGeometry(1, 2, 1),
                new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5 })
            );
            const angle = Math.random() * Math.PI * 2;
            const dist = 20 + Math.random() * 10;
            enemy.position.set(Math.cos(angle) * dist, 1, Math.sin(angle) * dist);
            enemies.push(enemy);
            scene.add(enemy);
            setTimeout(spawnEnemy, 2000);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (document.pointerLockElement) {
                // Hərəkət fizikası
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 0.01;
                if (moveLeft || moveRight) velocity.x -= direction.x * 0.01;

                camera.translateX(-velocity.x);
                camera.translateZ(-velocity.z);
                velocity.multiplyScalar(0.9);
            }

            // Güllələri yenilə
            bullets.forEach((b, i) => {
                b.position.add(b.userData.velocity);
                if (b.position.distanceTo(camera.position) > 50) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            });

            // Düşmənləri yenilə
            enemies.forEach((e, ei) => {
                const dir = new THREE.Vector3().subVectors(camera.position, e.position).normalize();
                e.position.x += dir.x * 0.05;
                e.position.z += dir.z * 0.05;

                // Güllə ilə toqquşma
                bullets.forEach((b, bi) => {
                    if (b.position.distanceTo(e.position) < 1.5) {
                        scene.remove(e);
                        enemies.splice(ei, 1);
                        scene.remove(b);
                        bullets.splice(bi, 1);
                        score += 10;
                        document.getElementById('ui').innerText = `XAL: ${score}`;
                    }
                });

                if (e.position.distanceTo(camera.position) < 1) {
                    alert("OYUN BİTDİ! XALINIZ: " + score);
                    location.reload();
                }
            });

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
