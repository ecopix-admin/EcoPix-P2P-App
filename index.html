<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Neon Escape</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            border: 4px solid #00f2ff;
            box-shadow: 0 0 20px #00f2ff66;
            background: #111;
        }

        canvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #00f2ff;
            text-shadow: 0 0 10px #00f2ff;
        }

        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border: 2px solid #ff0055;
            box-shadow: 0 0 30px #ff005544;
            border-radius: 10px;
        }

        h1 { color: #ff0055; margin-bottom: 10px; text-shadow: 0 0 15px #ff0055; }
        p { font-size: 14px; margin-bottom: 20px; color: #ccc; }

        button {
            padding: 12px 30px;
            font-size: 18px;
            background: transparent;
            color: #00f2ff;
            border: 2px solid #00f2ff;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 20px #00f2ff;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">Xal: 0</div>
    
    <div id="menu">
        <h1 id="title">CYBER ESCAPE</h1>
        <p id="msg">Maneələrdən qaç və sağ qal!</p>
        <button onclick="startGame()">BAŞLA</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');
    const menu = document.getElementById('menu');
    const title = document.getElementById('title');
    const msg = document.getElementById('msg');

    canvas.width = 400;
    canvas.height = 600;

    let score = 0;
    let gameActive = false;
    let player = { x: 185, y: 530, w: 30, h: 30, speed: 7, color: '#00f2ff' };
    let obstacles = [];
    let frame = 0;
    let speedMultiplier = 1;

    // İdarəetmə
    let keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // Mobil toxunuş
    canvas.addEventListener('touchstart', e => {
        let touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
        player.x = touchX - player.w / 2;
    });
    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        let touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
        player.x = touchX - player.w / 2;
    });

    function spawnObstacle() {
        let width = Math.random() * (150 - 50) + 50;
        let x = Math.random() * (canvas.width - width);
        obstacles.push({ x: x, y: -50, w: width, h: 20, color: '#ff0055' });
    }

    function startGame() {
        score = 0;
        obstacles = [];
        player.x = 185;
        speedMultiplier = 1;
        gameActive = true;
        menu.classList.add('hidden');
        loop();
    }

    function gameOver() {
        gameActive = false;
        title.innerText = "MƏĞLUB OLDUN!";
        msg.innerHTML = `Yekun Xal: ${Math.floor(score)}<br>Yenidən cəhd et!`;
        menu.classList.remove('hidden');
    }

    function update() {
        if (!gameActive) return;

        score += 0.1;
        ui.innerText = `Xal: ${Math.floor(score)}`;

        // Oyunçu hərəkəti
        if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
        if (keys['ArrowRight'] && player.x < canvas.width - player.w) player.x += player.speed;

        // Maneələri yenilə
        if (frame % Math.max(10, Math.floor(40 / speedMultiplier)) === 0) spawnObstacle();
        
        speedMultiplier += 0.0005; // Getdikcə sürətlənir

        obstacles.forEach((obs, index) => {
            obs.y += 5 * speedMultiplier;

            // Toqquşma yoxlaması
            if (player.x < obs.x + obs.w &&
                player.x + player.w > obs.x &&
                player.y < obs.y + obs.h &&
                player.y + player.h > obs.y) {
                gameOver();
            }

            if (obs.y > canvas.height) obstacles.splice(index, 1);
        });

        frame++;
    }

    function draw() {
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Oyunçu
        ctx.shadowBlur = 15;
        ctx.shadowColor = player.color;
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.w, player.h);

        // Maneələr
        obstacles.forEach(obs => {
            ctx.shadowBlur = 10;
            ctx.shadowColor = obs.color;
            ctx.fillStyle = obs.color;
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
        });
        
        ctx.shadowBlur = 0; // Reset blur for performance
    }

    function loop() {
        if (!gameActive) return;
        update();
        draw();
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
