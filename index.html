<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>AI Akustik Radar - Emoji Versiyası</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands"></script>
    <style>
        body { margin: 0; background: #000; color: #22ff22; font-family: 'Courier New', monospace; overflow: hidden; }
        #status { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 1.2rem; }
        button { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px; font-size: 20px; cursor: pointer; background: #22ff22; border: none; font-weight: bold; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="status">Sistem gözləmədə...</div>
    <button id="btn">RADARI AKTİV ET</button>
    <canvas id="canvas"></canvas>

    <script>
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        btn.onclick = async () => {
            btn.style.display = 'none';
            status.innerText = "AI Beyni Yüklənir...";
            
            const recognizer = speechCommands.create("BROWSER_FFT");
            await recognizer.ensureModelLoaded();
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            status.innerText = "DİQQƏT: Divar arxası dinlənilir...";

            recognizer.listen(result => {
                const labels = recognizer.wordLabels();
                const index = result.scores.indexOf(Math.max(...result.scores));
                const word = labels[index];
                const score = result.scores[index];

                if (score > 0.7) {
                    let emoji = "❓";
                    if (word === "down" || word === "low") emoji = "🚗"; // Maşın (Aşağı tezlik)
                    if (word === "up" || word === "high") emoji = "🏃"; // İnsan (Yüksək tezlik)
                    if (word === "noise") emoji = "💨"; // Külək/Küy
                    
                    drawObject(emoji);
                }
            }, { probabilityThreshold: 0.75 });
        };

        function drawObject(emoji) {
            const x = Math.random() * (canvas.width - 50);
            const y = Math.random() * (canvas.height - 50);
            ctx.font = "80px Arial";
            ctx.fillText(emoji, x, y);
            
            // 2 saniyə sonra görüntünü yavaşca sil
            setTimeout(() => {
                ctx.fillStyle = "rgba(0,0,0,0.1)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }, 2000);
        }
    </script>
</body>
</html>
