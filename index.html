<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AirPiano Studio Pro v6.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; touch-action: none; overflow: hidden; font-family: 'Inter', sans-serif; }
        #canvas-wrapper { position: relative; width: 98vw; height: 75vh; border-radius: 2rem; overflow: hidden; background: #000; border: 3px solid #1e293b; margin-top: 10px; }
        
        /* Güzgü effekti - Həm vizual, həm məntiqi */
        canvas { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }
        video { display: none; }

        /* Piano Düymələri - Daha geniş və professional */
        #piano-board { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 40%; 
            display: flex; gap: 3px; padding: 10px; z-index: 50;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        .white-key { 
            flex: 1; background: #fff; border-radius: 0 0 10px 10px; 
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.1);
            display: flex; align-items: flex-end; justify-content: center; 
            padding-bottom: 15px; color: #94a3b8; font-size: 0.7rem; font-weight: 900;
            transition: all 0.05s ease-out; position: relative;
        }
        .key-active { 
            background: #3b82f6 !important; 
            transform: translateY(10px); 
            box-shadow: 0 0 30px #3b82f6;
            color: white !important;
        }

        /* Alət Seçimi Paneli */
        .instrument-panel { position: absolute; right: 20px; top: 100px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .inst-btn { background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; padding: 12px; rounded-xl text-xs font-bold hover:bg-blue-600 transition-all; }
        .inst-active { background: #3b82f6; border-color: #60a5fa; }
    </style>
</head>
<body class="flex flex-col items-center">

    <div class="w-full px-6 py-4 flex justify-between items-center bg-[#0f172a] border-b border-slate-800">
        <h1 class="text-xl font-black text-white tracking-tighter">PIANO <span class="text-blue-500 text-sm italic">STUDIO PRO</span></h1>
        <button id="startBtn" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl text-white font-bold text-sm shadow-lg transition-all animate-bounce">SİSTEMİ AKTİVLƏŞDİR</button>
        <div id="status" class="text-[10px] text-emerald-400 font-mono hidden">LIVE TRACKING ACTIVE</div>
    </div>

    <div class="instrument-panel">
        <button onclick="setInst('sine')" id="inst-sine" class="inst-btn inst-active text-white">🎹 KLASSİK</button>
        <button onclick="setInst('square')" id="inst-square" class="inst-btn text-white">🎸 ELEKTRO</button>
        <button onclick="setInst('sawtooth')" id="inst-sawtooth" class="inst-btn text-white">🎷 SİNT-PRO</button>
        <button onclick="setInst('triangle')" id="inst-triangle" class="inst-btn text-white">🔔 ZƏNG</button>
    </div>

    <div id="canvas-wrapper">
        <video id="input_video"></video>
        <canvas id="output_canvas"></canvas>
        <div id="piano-board"></div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const pianoBoard = document.getElementById('piano-board');
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        let audioCtx, isReady = false;
        let instrumentType = 'sine';
        
        const notes = ['C3','D3','E3','F3','G3','A3','B3','C4','D4','E4','F4','G4','A4','B4','C5'];
        const freqs = [130.81, 146.83, 164.81, 174.61, 196.00, 220.00, 246.94, 261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
        
        let lastPlayedKeys = {}; // Barmaqların id-si ilə izlənilməsi

        // Düymələrin yaradılması
        notes.forEach((n, i) => {
            const key = document.createElement('div');
            key.className = 'white-key';
            key.id = `note-${i}`;
            key.innerText = n;
            pianoBoard.appendChild(key);
        });

        function setInst(type) {
            instrumentType = type;
            document.querySelectorAll('.inst-btn').forEach(b => b.classList.remove('inst-active'));
            document.getElementById(`inst-${type}`).classList.add('inst-active');
        }

        startBtn.onclick = () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isReady = true;
            startBtn.classList.add('hidden');
            status.classList.remove('hidden');
        };

        function playNote(i, fingerId) {
            if(!isReady) return;
            
            // Əgər həmin barmaq artıq bu notu çalıbsa, təkrar etmə (Həssaslıq tənzimləməsi)
            if(lastPlayedKeys[fingerId] === i) return;
            lastPlayedKeys[fingerId] = i;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = instrumentType;
            osc.frequency.setValueAtTime(freqs[i], audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.0);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1.0);

            const el = document.getElementById(`note-${i}`);
            el.classList.add('key-active');
            setTimeout(() => el.classList.remove('key-active'), 200);
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((landmarks, handIdx) => {
                    // Hər 5 barmağın ucu
                    const fingertips = [4, 8, 12, 16, 20];
                    
                    fingertips.forEach((pointIdx) => {
                        const point = landmarks[pointIdx];
                        // GÜZGÜ EFFEKTİ DÜZƏLİŞİ: (1 - point.x) istifadə edərək riyazi sağı-solu düzəldirik
                        const x = (1 - point.x) * canvasElement.width;
                        const y = point.y * canvasElement.height;
                        const fingerId = `${handIdx}-${pointIdx}`;

                        // Vizual kursor (Yalnız şəhadət barmağını vurğula)
                        canvasCtx.fillStyle = pointIdx === 8 ? "#3b82f6" : "#ffffff";
                        canvasCtx.beginPath();
                        canvasCtx.arc(x, y, 6, 0, 2 * Math.PI);
                        canvasCtx.fill();

                        // Piano zonası yoxlanışı (Dəqiqlik üçün y > 0.6)
                        if (y > canvasElement.height * 0.6) {
                            const keyIdx = Math.floor((x / canvasElement.width) * notes.length);
                            if (keyIdx >= 0 && keyIdx < notes.length) {
                                playNote(keyIdx, fingerId);
                            }
                        } else {
                            // Barmaq yuxarı qalxdıqda həmin barmağın "not yaddaşı"nı sil
                            lastPlayedKeys[fingerId] = null;
                        }
                    });
                });
            }
            canvasCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1, // Dəqiqlik üçün 1-ə qaldırdım
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();
    </script>
</body>
</html>
