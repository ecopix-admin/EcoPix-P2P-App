<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Professional Aero-AR Advertising Engine</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .ui-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; 
                    background: rgba(0,0,0,0.7); color: white; padding: 15px; border-radius: 15px; 
                    z-index: 10; border: 1px solid #FE001A; text-align: center; }
        .brand-logo { color: #FE001A; font-weight: bold; font-size: 1.2em; }
        #status { font-size: 0.9em; margin-top: 5px; }
    </style>
</head>

<body>
    <div class="ui-panel">
        <div class="brand-logo">Sky-Ad x Coca-Cola</div>
        <div id="status">Səma skan edilir...</div>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-assets>
            <canvas id="cokeGradient" width="512" height="128"></canvas>
        </a-assets>

        <a-camera gps-camera="minDistance: 10; maxDistance: 50000;" rotation-reader></a-camera>
    </a-scene>

    <script>
        // Coca-Cola Banneri üçün tekstura hazırlayırıq
        const canvas = document.getElementById('cokeGradient');
        const ctx = canvas.getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, 512, 0);
        grad.addColorStop(0, '#FE001A'); // Coke Red
        grad.addColorStop(1, 'rgba(254, 0, 26, 0)'); // Fade out effect
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 512, 128);

        window.onload = () => {
            const statusBox = document.getElementById('status');

            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude, longitude } = pos.coords;
                statusBox.innerText = "Təyyarə məlumatları alınır...";

                // OpenSky API - Yaxınlıqdakı təyyarələri gətirir
                const radius = 0.5; 
                const url = `https://opensky-network.org/api/states/all?lamin=${latitude-radius}&lomin=${longitude-radius}&lamax=${latitude+radius}&lomax=${longitude+radius}`;

                fetch(url)
                .then(res => res.json())
                .then(data => {
                    const scene = document.querySelector('a-scene');
                    if(!data.states) {
                        statusBox.innerText = "Hazırda yaxınlıqda təyyarə yoxdur.";
                        return;
                    }

                    statusBox.innerText = `${data.states.length} təyyarə tapıldı. Reklamlar yüklənir...`;

                    data.states.forEach(plane => {
                        const [icao24, callsign, origin, time, last_pos, lon, lat, alt] = plane;

                        // Təyyarə Lövbəri (Anchor)
                        const airplaneEntity = document.createElement('a-entity');
                        airplaneEntity.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                        
                        // Peşəkar Reklam Banneri (Quyruqdan uzanan)
                        // Ölçüləri böyük qoyuruq (hündürlük 10km olduğu üçün)
                        const banner = document.createElement('a-plane');
                        banner.setAttribute('width', '200');
                        banner.setAttribute('height', '30');
                        banner.setAttribute('position', '0 0 -110'); // Təyyarənin bir az gerisində
                        banner.setAttribute('rotation', '-90 0 0');
                        banner.setAttribute('material', 'src: #cokeGradient; transparent: true; side: double');

                        // Reklam Mətni
                        const text = document.createElement('a-text');
                        text.setAttribute('value', "Coca-Cola \n Real Magic");
                        text.setAttribute('align', 'center');
                        text.setAttribute('width', '180');
                        text.setAttribute('color', 'white');
                        text.setAttribute('position', '0 0 0.5');
                        text.setAttribute('font', 'https://cdn.aframe.io/fonts/Exo2Bold.fnt');

                        banner.appendChild(text);
                        airplaneEntity.appendChild(banner);
                        scene.appendChild(airplaneEntity);
                    });
                })
                .catch(err => {
                    statusBox.innerText = "API Xətası. İnterneti yoxlayın.";
                    console.error(err);
                });
            });
        };
    </script>
</body>
</html>
