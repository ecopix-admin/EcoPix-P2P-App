<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonarMaster AI Pro | Ultra-Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse-bg { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0px rgba(59, 130, 246, 0.5); }
            100% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body class="bg-[#0f172a] text-white min-h-screen flex flex-col items-center justify-between p-6 font-sans">

    <div class="w-full flex justify-between items-start pt-4">
        <div class="bg-slate-800/50 p-3 rounded-2xl border border-slate-700">
            <p class="text-[10px] text-slate-400 uppercase tracking-tighter">Cari Ölçü</p>
            <p id="current-display" class="text-xl font-bold text-blue-400">0.00 m</p>
        </div>
        <div class="bg-slate-800/50 p-3 rounded-2xl border border-slate-700 text-right">
            <p class="text-[10px] text-slate-400 uppercase tracking-tighter">Toplam Yaddaş</p>
            <p id="total-display" class="text-xl font-bold text-emerald-400">0.00 m</p>
        </div>
    </div>

    <div class="flex flex-col items-center">
        <div id="visual-ring" class="w-64 h-64 rounded-full border-2 border-slate-700 flex items-center justify-center relative transition-all duration-300">
            <div class="text-center">
                <h2 id="main-dist" class="text-7xl font-black tracking-tighter">0.00</h2>
                <p class="text-blue-500 font-bold text-xl uppercase tracking-widest">Metr</p>
            </div>
        </div>
        <p id="status-text" class="mt-6 text-slate-500 text-sm italic font-light">Ölçmək üçün aşağıdakı düyməni basın</p>
    </div>

    <div class="w-full max-w-sm space-y-4 pb-8">
        <button id="measureBtn" class="w-full bg-blue-600 h-20 rounded-3xl font-black text-xl shadow-2xl shadow-blue-900/40 active:scale-95 transition-transform uppercase tracking-wider">
            ÖLÇMƏYƏ BAŞLA
        </button>

        <div class="flex gap-3">
            <button id="addBtn" class="flex-1 bg-slate-800 h-14 rounded-2xl border border-slate-700 font-bold text-sm hover:bg-slate-700 active:scale-95 transition-all">
                📥 YADDAŞA AT
            </button>
            <button id="clearBtn" class="flex-1 bg-slate-800 h-14 rounded-2xl border border-slate-700 font-bold text-sm hover:bg-red-900/20 active:scale-95 transition-all text-red-400">
                🔄 SIFIRLA
            </button>
        </div>
    </div>

    <script>
        let audioCtx;
        let currentVal = 0;
        let totalVal = 0;
        let isWorking = false;

        const mainDist = document.getElementById('main-dist');
        const totalDisplay = document.getElementById('total-display');
        const currentDisplay = document.getElementById('current-display');
        const measureBtn = document.getElementById('measureBtn');
        const visualRing = document.getElementById('visual-ring');
        const statusText = document.getElementById('status-text');

        async function startMeasurement() {
            if (isWorking) return;
            isWorking = true;

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            measureBtn.innerText = "GÖZLƏYİN...";
            measureBtn.classList.add('opacity-50');
            visualRing.classList.add('pulse-bg', 'border-blue-500');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: {
                    echoCancellation: false, noiseSuppression: false, autoGainControl: false 
                }});
                
                const sampleRate = audioCtx.sampleRate;
                const chirpLen = 0.01; // 10ms
                const buffer = audioCtx.createBuffer(1, sampleRate * chirpLen, sampleRate);
                const data = buffer.getChannelData(0);

                // Chirp Signal (Yüksək tezlikli "imza" səs)
                for (let i = 0; i < buffer.length; i++) {
                    const t = i / sampleRate;
                    data[i] = Math.sin(2 * Math.PI * (17000 + 3000 * t / chirpLen) * t);
                }

                const source = audioCtx.createMediaStreamSource(stream);
                const processor = audioCtx.createScriptProcessor(4096, 1, 1);
                let recording = [];

                const node = audioCtx.createBufferSource();
                node.buffer = buffer;
                node.connect(audioCtx.destination);

                const emitTime = audioCtx.currentTime + 0.1;
                
                processor.onaudioprocess = (e) => {
                    if (audioCtx.currentTime >= emitTime) {
                        recording.push(...e.inputBuffer.getChannelData(0));
                        // 4 metr üçün təxminən 0.05 saniyə kifayətdir
                        if (recording.length > sampleRate * 0.05) { 
                            analyze(recording, data, sampleRate);
                            processor.disconnect();
                            source.disconnect();
                        }
                    }
                };

                source.connect(processor);
                processor.connect(audioCtx.destination);
                node.start(emitTime);

            } catch (err) {
                alert("Mikrofon icazəsi lazımdır!");
                stopUI();
            }
        }

        function analyze(rec, orig, sr) {
            let maxCorr = -1;
            let bestDelay = 0;

            // MÜHƏNDİSLİK DÜZƏLİŞİ: İlk 3ms-ni (təxminən 50sm) görməzdən gəlirik 
            // Bu, telefonun öz səsini "əks-səda" kimi tutmasının qarşısını alır.
            const ignoreSamples = Math.floor(sr * 0.003); 

            for (let i = ignoreSamples; i < rec.length - orig.length; i++) {
                let corr = 0;
                for (let j = 0; j < orig.length; j++) {
                    corr += rec[i + j] * orig[j];
                }
                if (corr > maxCorr) {
                    maxCorr = corr;
                    bestDelay = i;
                }
            }

            const time = bestDelay / sr;
            const dist = (time * 343) / 2;
            
            // Reallığa yaxınlaşdırmaq üçün kiçik filtr
            currentVal = Math.max(0, dist - 0.05); 
            
            // Ekrana yazdır
            mainDist.innerText = currentVal.toFixed(2);
            currentDisplay.innerText = currentVal.toFixed(2) + " m";
            
            stopUI();
        }

        function stopUI() {
            isWorking = false;
            measureBtn.innerText = "ÖLÇMƏYƏ BAŞLA";
            measureBtn.classList.remove('opacity-50');
            visualRing.classList.remove('pulse-bg', 'border-blue-500');
            statusText.innerText = "Ölçmə tamamlandı.";
        }

        // Düymə Funksiyaları
        document.getElementById('addBtn').addEventListener('click', () => {
            totalVal += currentVal;
            document.getElementById('total-display').innerText = totalVal.toFixed(2) + " m";
            statusText.innerText = "Yaddaşa əlavə edildi.";
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            currentVal = 0;
            totalVal = 0;
            mainDist.innerText = "0.00";
            document.getElementById('current-display').innerText = "0.00 m";
            document.getElementById('total-display').innerText = "0.00 m";
            statusText.innerText = "Sıfırlandı.";
        });

        measureBtn.addEventListener('click', startMeasurement);
    </script>
</body>
</html>
