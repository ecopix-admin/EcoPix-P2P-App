<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPix Mesh</title>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; padding: 20px; text-align: center; }
        .status-box { border: 1px solid #0f0; padding: 10px; margin-bottom: 20px; font-size: 14px; }
        video { width: 48%; border: 1px solid #0f0; background: #111; margin: 1%; }
        input { background: #111; color: #0f0; border: 1px solid #0f0; padding: 12px; width: 85%; margin-bottom: 10px; }
        button { background: #0f0; color: #000; border: none; padding: 12px; width: 90%; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        #log { font-size: 11px; color: #666; text-align: left; height: 120px; overflow-y: auto; border-top: 1px dashed #333; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="status-box">
        <b>ECOPIX MESH: ACTIVE</b><br>
        <span id="my-id">ID Yaradılır...</span>
    </div>

    <div>
        <video id="localVideo" autoplay muted playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <input type="text" id="targetId" placeholder="Hədəf Cihaz ID-si">
    <button onclick="connect('video')">GÖRÜNTÜLÜ ZƏNG</button>
    <button onclick="connect('audio')" style="background:#00aaff;">SƏSLİ ZƏNG</button>

    <div id="log">Sistem: Ətrafdakı 'antenalar' skan edilir...</div>

    <script>
        const log = (m) => { document.getElementById('log').innerHTML += `> ${m}<br>`; };
        const peer = new Peer('ep-' + Math.random().toString(36).substr(2, 6));

        peer.on('open', id => {
            document.getElementById('my-id').innerText = "Cihaz ID: " + id;
            log("Şəbəkəyə qoşuldu. Sən artıq bir ötürücüsən.");
        });

        let stream;
        navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
            stream = s;
            document.getElementById('localVideo').srcObject = s;
        });

        peer.on('call', call => {
            log("Zəncirvari paket qəbul edildi. Ötürülür...");
            call.answer(stream);
            call.on('stream', rs => { document.getElementById('remoteVideo').srcObject = rs; });
        });

        function connect() {
            const tid = document.getElementById('targetId').value;
            log(`Hədəf ${tid} üçün hibrid tunel açılır...`);
            const call = peer.call(tid, stream);
            call.on('stream', rs => { document.getElementById('remoteVideo').srcObject = rs; });
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
