<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детектор Проводок Pro</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; transition: background 0.3s; }
        .ui-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .value-box { font-size: 100px; font-weight: bold; margin: 20px 0; font-family: 'Courier New', monospace; }
        #status { font-size: 22px; color: #666; font-weight: bold; margin-bottom: 30px; letter-spacing: 2px; }
        button { background: #ff4444; color: #fff; border: none; padding: 25px 60px; font-size: 22px; border-radius: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(255,0,0,0.3); }
        .detected { background: #00ff00 !important; color: #000 !important; }
        .detected .value-box, .detected #status { color: #000 !important; }
    </style>
</head>
<body id="bg">

<div class="ui-container">
    <div id="status">СИСТЕМА ГОТОВА</div>
    <div class="value-box" id="display">0</div>
    <p id="msg">Держите телефон неподвижно 3 секунды для калибровки</p>
    <button id="startBtn" onclick="initApp()">ЗАПУСТИТЬ СКАНЕР</button>
</div>

<script>
    let baseline = null;
    let isScanning = false;
    let lastSpeakTime = 0;

    // РУССКАЯ ОЗВУЧКА
    function speakRussian() {
        const currentTime = Date.now();
        // Повтор фразы раз в 4 секунды, чтобы не надоедало
        if (currentTime - lastSpeakTime > 4000) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = "Провод найден"; 
            msg.lang = 'ru-RU'; // Rus dili ayarı
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
            lastSpeakTime = currentTime;
        }
    }

    function initApp() {
        // APK daxilində tam maqnitometri işlətmək üçün ən yaxşı üsul
        if ('Magnetometer' in window) {
            const sensor = new Magnetometer({frequency: 60});
            sensor.addEventListener('reading', () => {
                let x = sensor.x, y = sensor.y, z = sensor.z;
                let mag = Math.sqrt(x*x + y*y + z*z).toFixed(1);
                processData(mag);
            });
            sensor.start();
        } else {
            // Alternativ metod (Eski telefonlar üçün)
            window.addEventListener('deviceorientationabsolute', (e) => {
                let val = e.alpha || 0;
                processData(val.toFixed(1));
            }, true);
        }
        
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('status').innerText = "ИДЕТ ПОИСК...";
        isScanning = true;
    }

    function processData(currentVal) {
        const display = document.getElementById('display');
        const bg = document.getElementById('bg');
        const status = document.getElementById('status');

        display.innerText = currentVal;

        if (baseline === null) {
            baseline = currentVal;
            return;
        }

        // КРИТИЧЕСКИЙ ПОРОГ: 
        // Если отклонение больше 25 единиц — это металл или провод
        let diff = Math.abs(currentVal - baseline);

        if (diff > 25) { 
            bg.classList.add('detected');
            status.innerText = "ПРОВОД НАЙДЕН!";
            
            // Вибрация
            if (navigator.vibrate) navigator.vibrate(300);
            
            // Голосовое уведомление
            speakRussian();
        } else {
            bg.classList.remove('detected');
            status.innerText = "ИДЕТ ПОИСК...";
            
            // Адаптивная калибровка: плавно подстраиваемся под фон (убирает реакцию на движение)
            baseline = (0.01 * currentVal) + (0.99 * baseline);
        }
    }
</script>
</body>
</html>
