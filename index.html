<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloOrchestra PRO v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #010409; overflow: hidden; touch-action: none; font-family: 'Inter', sans-serif; }
        /* Güzgü effektini həm vizual, həm də hesablama üçün düzəldirik */
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { transform: scaleX(-1); border-radius: 20px; border: 4px solid #1e293b; max-width: 95%; max-height: 80vh; }
        video { display: none; }
        
        .instrument {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            pointer-events: none;
            border: 4px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }
        .hit { transform: scale(1.2); background: rgba(59, 130, 246, 0.6) !important; border-color: #3b82f6 !important; box-shadow: 0 0 50px #3b82f6; }
    </style>
</head>
<body>

    <div id="container">
        <div class="absolute top-10 flex items-center gap-3 bg-black/50 px-6 py-3 rounded-full border border-white/10 z-50">
            <div id="status-dot" class="w-3 h-3 bg-red-500 rounded-full"></div>
            <span id="status-text" class="text-white font-bold tracking-widest uppercase text-xs">SİSTEM GÖZLƏYİR</span>
        </div>

        <canvas id="output_canvas"></canvas>

        <div id="drum-left" class="instrument w-40 h-40 left-[10%] top-[30%]">NAĞARA (SOL)</div>
        <div id="drum-center" class="instrument w-48 h-48 left-[40%] bottom-[15%]">ANA NAĞARA</div>
        <div id="drum-right" class="instrument w-40 h-40 right-[10%] top-[30%]">TARELKA</div>

        <div id="overlay" class="absolute inset-0 bg-black/90 flex flex-col items-center justify-center z-[100]">
            <h1 class="text-5xl font-black text-white mb-8">HOLO-DRUMS</h1>
            <button id="startBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-12 py-6 rounded-3xl font-black text-2xl shadow-2xl shadow-blue-500/50 transition-all active:scale-95">
                SİSTEMİ BAŞLAT
            </button>
            <p class="text-slate-400 mt-6 italic text-sm">Səs və kamera icazəsi üçün basın</p>
        </div>
    </div>

    <script>
        const videoElement = document.createElement('video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        let audioCtx;
        let isStarted = false;
        let lastPositions = [{y: 0}, {y: 0}];

        // Zərb Alətləri Məlumatı
        const instruments = [
            { id: 'drum-left', xMin: 0.7, xMax: 1.0, yMin: 0.2, yMax: 0.5, freq: 120, type: 'sine' },
            { id: 'drum-center', xMin: 0.35, xMax: 0.65, yMin: 0.6, yMax: 0.9, freq: 80, type: 'triangle' },
            { id: 'drum-right', xMin: 0.0, xMax: 0.3, yMin: 0.2, yMax: 0.5, freq: 1000, type: 'square' }
        ];

        startBtn.onclick = async () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isStarted = true;
            overlay.style.display = 'none';
            statusDot.classList.replace('bg-red-500', 'bg-green-500');
            statusText.innerText = "CANLI İFA HAZIRDIR";
        };

        function playSound(freq, type, vol) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1, audioCtx.currentTime + 0.1);

            gain.gain.setValueAtTime(vol * 0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((hand, i) => {
                    const indexFinger = hand[8]; // Şəhadət barmağı
                    const x = indexFinger.x;
                    const y = indexFinger.y;

                    // Sürət hesablama (Zərbəni tutmaq üçün)
                    const velocity = y - lastPositions[i]?.y || 0;
                    lastPositions[i] = {y: y};

                    // Əgər barmaq aşağı sürətlə enirsə (Zərbə)
                    if (velocity > 0.05) {
                        instruments.forEach(inst => {
                            if (x > inst.xMin && x < inst.xMax && y > inst.yMin && y < inst.yMax) {
                                playSound(inst.freq, inst.type, velocity * 10);
                                const el = document.getElementById(inst.id);
                                el.classList.add('hit');
                                setTimeout(() => el.classList.remove('hit'), 100);
                            }
                        });
                    }

                    // Kursor (Gözəl neon dairə)
                    canvasCtx.fillStyle = "#3b82f6";
                    canvasCtx.shadowBlur = 20;
                    canvasCtx.shadowColor = "#3b82f6";
                    canvasCtx.beginPath();
                    canvasCtx.arc(x * canvasElement.width, y * canvasElement.height, 12, 0, 2 * Math.PI);
                    canvasCtx.fill();
                });
            }
            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                await hands.send({image: videoElement});
            },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
