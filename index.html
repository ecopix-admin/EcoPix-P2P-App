<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shamxal QR - Ağıllı Menyu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-dark: #1a1a1a; --accent: #ffcc00; --text: #333; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f9f9f9; color: var(--text); }
        
        header { background: var(--main-dark); color: white; padding: 20px; text-align: center; border-radius: 0 0 25px 25px; }
        .category-scroll { display: flex; overflow-x: auto; padding: 15px; gap: 10px; sticky: top; background: #f9f9f9; z-index: 10; }
        .cat-btn { background: white; border: 1px solid #ddd; padding: 8px 20px; border-radius: 20px; white-space: nowrap; cursor: pointer; }
        .cat-btn.active { background: var(--accent); border-color: var(--accent); font-weight: bold; }

        .menu-grid { padding: 15px; display: grid; gap: 15px; }
        .item-card { background: white; border-radius: 15px; display: flex; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .item-img { width: 100px; height: 100px; background: #eee; object-fit: cover; }
        .item-info { padding: 12px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .item-info h3 { margin: 0; font-size: 16px; }
        .item-info p { margin: 5px 0; font-size: 13px; color: #777; }
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .price { font-weight: bold; color: var(--main-dark); }
        .add-btn { background: var(--accent); border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold; }

        .cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: var(--main-dark); color: white; padding: 15px; border-radius: 15px; display: none; justify-content: space-between; align-items: center; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 100; }
        .order-btn { background: var(--accent); border: none; padding: 8px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>Həsənovlar Lounge</h1>
    <p><i class="fas fa-star" style="color:var(--accent)"></i> Ən dadlı təamlar</p>
</header>

<div class="category-scroll">
    <div class="cat-btn active">Hamısı</div>
    <div class="cat-btn">Kabablar</div>
    <div class="cat-btn">İçkilər</div>
    <div class="cat-btn">Şirniyyat</div>
</div>

<div class="menu-grid">
    <div class="item-card">
        <div class="item-info">
            <h3>Quzu Kababı</h3>
            <p>Təzə quzu əti, soğan, sumaq</p>
            <div class="price-row">
                <span class="price">12.00 AZN</span>
                <button class="add-btn" onclick="addToCart('Quzu Kababı', 12)">+</button>
            </div>
        </div>
    </div>
    
    <div class="item-card">
        <div class="item-info">
            <h3>Paytaxt Salatı</h3>
            <p>Kartof, yerkökü, yaşıl noxud, mayonez</p>
            <div class="price-row">
                <span class="price">6.00 AZN</span>
                <button class="add-btn" onclick="addToCart('Paytaxt Salatı', 6)">+</button>
            </div>
        </div>
    </div>
</div>

<div class="cart-bar" id="cartBar">
    <span id="cartCount">0 məhsul</span>
    <button class="order-btn" onclick="sendOrder()">Sifariş Et (<span id="totalPrice">0</span> AZN)</button>
</div>

<script>
    let cart = [];
    let total = 0;

    function addToCart(name, price) {
        cart.push(name);
        total += price;
        updateCart();
    }

    function updateCart() {
        const bar = document.getElementById('cartBar');
        if(cart.length > 0) {
            bar.style.display = 'flex';
            document.getElementById('cartCount').innerText = cart.length + " məhsul";
            document.getElementById('totalPrice').innerText = total.toFixed(2);
        }
    }

    function sendOrder() {
        const phone = "99450XXXXXXX"; // Restoranın WhatsApp nömrəsi
        let message = "Yeni Sifariş (Masa No: 5):\n\n";
        cart.forEach((item, index) => {
            message += `${index + 1}. ${item}\n`;
        });
        message += `\nCəmi: ${total.toFixed(2)} AZN`;
        
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
    }
</script>

</body>
</html>
