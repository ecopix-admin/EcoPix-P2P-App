<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloStrings MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; }
        canvas { transform: scaleX(-1); width: 100vw; height: 100vh; object-fit: cover; }
        #startBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; }
    </style>
</head>
<body>

    <button id="startBtn" class="bg-blue-600 text-white px-10 py-5 rounded-full font-bold text-xl shadow-2xl shadow-blue-500">SİSTEMİ BAŞLAT</button>
    <canvas id="output_canvas"></canvas>

    <script>
        const canvasElement = document.getElementById('output_canvas');
        const ctx = canvasElement.getContext('2d', { alpha: false }); // Renderi sürətləndirir
        const startBtn = document.getElementById('startBtn');

        let audioCtx, masterGain;
        let lastFret = 0;
        let prevY = 0;

        // Tar/Gitar notları (Daha realistik)
        const notes = [196.00, 220.00, 246.94, 293.66, 329.63, 392.00]; 

        startBtn.onclick = () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
            startBtn.style.display = 'none';
        };

        function playSound(freq, vol) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = 'sawtooth'; // Tarın o kəsik səsi üçün
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol * 0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc.connect(g);
            g.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function onResults(results) {
            ctx.save();
            ctx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                results.multiHandLandmarks.forEach((landmarks, i) => {
                    const label = results.multiHandedness[i].label; // Left/Right
                    
                    // SOL ƏL: NOT SEÇİMİ
                    if (label === 'Left' || (results.multiHandLandmarks.length === 1)) {
                        lastFret = Math.floor(landmarks[8].y * 6);
                    }

                    // SAĞ ƏL: VURUŞ (MIZRAB)
                    if (label === 'Right' || (results.multiHandLandmarks.length === 2)) {
                        const currentY = landmarks[0].y;
                        const speed = Math.abs(currentY - prevY);
                        if (speed > 0.04) { // Dəqiq vuruş limiti
                            playSound(notes[lastFret] || 196, speed * 10);
                        }
                        prevY = currentY;
                    }

                    // Barmaqları çək (Ultra-dəqiq nöqtələr)
                    landmarks.forEach(p => {
                        ctx.fillStyle = "#00ffcc";
                        ctx.fillRect(p.x * canvasElement.width, p.y * canvasElement.height, 4, 4);
                    });
                });
            }
            ctx.restore();
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ 
            maxNumHands: 2, 
            modelComplexity: 0, // DİQQƏT: Donmanı aradan qaldırmaq üçün 0-a endirdim (Sürət üçün)
            minDetectionConfidence: 0.5, 
            minTrackingConfidence: 0.5 
        });
        hands.onResults(onResults);

        const camera = new Camera(document.createElement('video'), {
            onFrame: async () => {
                canvasElement.width = window.innerWidth;
                canvasElement.height = window.innerHeight;
                await hands.send({image: canvasElement});
            },
            width: 640, height: 480 // A32 üçün optimal çözünürlük
        });
        camera.start();
    </script>
</body>
</html>
