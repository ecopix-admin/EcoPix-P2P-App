<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Görən Göz - Kosmos Naviqatoru</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* UI Panel */
        #ui-panel {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            background: rgba(0,0,0,0.8);
            color: #00f2ea;
            padding: 10px 20px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #ff0050;
            pointer-events: none;
        }
        #info { font-size: 10px; color: white; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <div>KOSMOS REGİONU: XƏTAİ, BAKI</div>
        <div id="info">Telefonu fırladaraq planetləri tapın.</div>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false">
        
        <a-assets>
            <img id="stars-bg" src="https://raw.githubusercontent.com/aframevr/aframe/master/examples/boilerplate/panorama/puydesancy.jpg">
            </a-assets>

        <a-sky color="#00021a"></a-sky>
        
        <a-sphere id="sun" position="0 0 -15" radius="5" color="#ffea00" material="emissive: #ffea00; emissiveIntensity: 2;"></a-sphere>

        <a-sphere id="mercury" position="8 0 -20" radius="0.3" color="#a8a8a8"></a-sphere>

        <a-sphere id="venus" position="15 0 -10" radius="0.6" color="#e6a760"></a-sphere>

        <a-entity id="earth-system" position="-10 0 -5">
            <a-sphere id="earth" radius="1" color="#1a4d8c" material="src: url(https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/Haxby_-_Earth_Texture_Map_2004.jpg/1200px-Haxby_-_Earth_Texture_Map_2004.jpg)"></a-sphere>
            <a-sphere id="moon" position="2 1 0" radius="0.2" color="#cccccc"></a-sphere>
        </a-entity>

        <a-sphere id="mars" position="-20 0 10" radius="0.5" color="#c1440e"></a-sphere>

        <a-sphere id="jupiter" position="0 0 30" radius="4" color="#d1ac7c"></a-sphere>

        <a-entity id="saturn-system" position="30 0 10" rotation="0 0 15">
            <a-sphere id="saturn" radius="3" color="#fce2a8"></a-sphere>
            <a-torus id="saturn-ring" color="#fce2a8" radius="5" radius-tubular="0.02" rotation="90 0 0"></a-torus>
        </a-entity>

        <a-sphere id="uranus" position="20 10 -40" radius="2" color="#93b8d9"></a-sphere>

        <a-sphere id="neptune" position="-30 5 -50" radius="1.8" color="#4b70dd"></a-sphere>

        <a-entity id="starfield">
            <script>
                const starField = document.getElementById('starfield');
                for (let i = 0; i < 500; i++) {
                    const star = document.createElement('a-sphere');
                    star.setAttribute('radius', 0.05);
                    star.setAttribute('color', '#ffffff');
                    star.setAttribute('position', `${Math.random() * 200 - 100} ${Math.random() * 200 - 100} ${Math.random() * 200 - 100}`);
                    starField.appendChild(star);
                }
            </script>
        </a-entity>

        <a-camera look-controls="enabled: true" wasd-controls-enabled="false">
            <a-cursor color="#00f2ea"></a-cursor>
        </a-camera>

    </a-scene>

    <script>
        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'az-AZ';
            window.speechSynthesis.speak(msg);
        }

        window.onload = () => {
            speak("Kosmos naviqasiyası başladı. Xətai üzərindəki ulduzlu göyə baxın.");
        };
    </script>
</body>
</html>
