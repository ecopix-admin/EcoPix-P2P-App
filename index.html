<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wire Tracker Pro v7.0</title>
    <style>
        body { background: #000; color: #333; font-family: 'Arial', sans-serif; text-align: center; margin: 0; overflow: hidden; transition: background 0.1s; }
        .container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .value { font-size: 110px; font-weight: 900; margin: 0; transition: color 0.2s; }
        #status { font-size: 20px; font-weight: bold; letter-spacing: 5px; margin-bottom: 20px; }
        button { background: #222; color: #fff; border: 2px solid #444; padding: 20px 50px; font-size: 20px; border-radius: 5px; cursor: pointer; }
        
        /* NAQİL TAPILDI - YAŞIL REJİM */
        .detected { background: #00ff00 !important; color: #000 !important; }
        .detected .value { color: #000 !important; }
        .detected #status { color: #000 !important; }
    </style>
</head>
<body>

<div class="container" id="bg">
    <div id="status">SİSTEM SÖNDÜRÜLÜB</div>
    <div id="display" class="value">0</div>
    <div id="info" style="margin-bottom: 30px;">Naqili tapmaq üçün başlat düyməsinə basın</div>
    <button id="btn" onclick="init()">BAŞLAT</button>
</div>

<script>
    let audioCtx, osc, gain;
    let values = [];
    const windowSize = 10; // Stabilizasiya pəncərəsi
    let isRunning = false;

    function init() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        osc = audioCtx.createOscillator();
        gain = audioCtx.createGain();
        osc.type = 'square'; // Daha güclü səs üçün 'square'
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        gain.gain.value = 0;
        osc.start();

        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientationabsolute', process, true);
            document.getElementById('btn').style.display = 'none';
            document.getElementById('status').innerText = "SKANER AKTİVDİR";
            isRunning = true;
        }
    }

    function process(e) {
        if (!isRunning) return;

        let val = e.alpha || e.webkitCompassHeading || 0;
        
        // Stabilizasiya Filtrləri (Moving Average)
        values.push(val);
        if (values.length > windowSize) values.shift();
        let avg = values.reduce((a, b) => a + b) / values.length;

        // Hazırkı dərəcə ilə ortalama arasındakı "Kəskin Fərq" (Jerk)
        let delta = Math.abs(val - avg);
        if (delta > 180) delta = Math.abs(delta - 360);

        const display = document.getElementById('display');
        const bg = document.getElementById('bg');
        const status = document.getElementById('status');

        display.innerText = Math.floor(avg);

        // KRİTİK HƏDD: 25 dərəcə. 
        // Əgər telefonun hərəkəti normaldırsa delta 2-5 arası olur. 
        // Naqilin yanında bu rəqəm 25-i keçir.
        if (delta > 25) { 
            bg.classList.add('detected');
            status.innerText = "NAQİL TAPILDI!";
            
            // Güclü Vibrasiya
            if (navigator.vibrate) navigator.vibrate(200);
            
            // Möhkəm Səs
            osc.frequency.setTargetAtTime(300 + (delta * 10), audioCtx.currentTime, 0.05);
            gain.gain.setTargetAtTime(0.3, audioCtx.currentTime, 0.05);
        } else {
            bg.classList.remove('detected');
            status.innerText = "SKAN EDİLİR...";
            gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        }
    }
</script>
</body>
</html>
