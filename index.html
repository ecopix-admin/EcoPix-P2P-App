<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Wire Detector</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .main-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .value-display { font-size: 80px; font-weight: 900; margin: 20px 0; color: #444; transition: 0.2s; }
        #instruction { font-size: 20px; color: #00ff00; margin-bottom: 40px; min-height: 60px; line-height: 1.5; }
        button { background: #00ff00; color: #000; border: none; padding: 25px 60px; font-size: 24px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .active-scan { color: #fff !important; text-shadow: 0 0 20px #00ff00; }
        .found { background: #ff0000 !important; }
    </style>
</head>
<body id="bodyTag">

<div class="main-container">
    <div id="instruction">Нажмите кнопку, чтобы начать настройку системы</div>
    <div id="val" class="value-display">0.0</div>
    <button id="mainBtn" onclick="startMasterProcess()">Начать работу</button>
</div>

<script>
    let baseline = 0;
    let isCalibrated = false;
    let lastSpeakTime = 0;

    function speak(text) {
        window.speechSynthesis.cancel(); // Köhnə səsi kəs ki, üst-üstə düşməsin
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ru-RU';
        msg.rate = 1.0;
        window.speechSynthesis.speak(msg);
    }

    async function startMasterProcess() {
        document.getElementById('mainBtn').style.display = 'none';
        
        // ADDIM 1: İlk təlimat
        speak("Пожалуйста, приложите телефон к стене в чистом месте и не двигайте его три секунды.");
        document.getElementById('instruction').innerText = "ПРИЛОЖИТЕ К СТЕНЕ И НЕ ДВИГАЙТЕ...";

        setTimeout(() => {
            // ADDIM 2: Kalibrasiya (Mühit ölçülür)
            initSensor();
        }, 3500);
    }

    function initSensor() {
        if ('Magnetometer' in window) {
            const sensor = new Magnetometer({frequency: 60});
            sensor.addEventListener('reading', () => {
                let mag = Math.sqrt(sensor.x**2 + sensor.y**2 + sensor.z**2);
                
                if (!isCalibrated) {
                    baseline = mag;
                    isCalibrated = true;
                    speak("Система настроена. Теперь медленно ведите телефон вправо и влево по стене.");
                    document.getElementById('instruction').innerText = "МЕДЛЕННО ВЕДИТЕ ВПРАВО И ВЛЕВО";
                    document.getElementById('val').classList.add('active-scan');
                } else {
                    checkLogic(mag);
                }
            });
            sensor.start();
        } else {
            alert("Magnetometer API не поддерживается. Используйте Chrome Android.");
        }
    }

    function checkLogic(currentMag) {
        let diff = Math.abs(currentMag - baseline);
        const display = document.getElementById('val');
        const body = document.getElementById('bodyTag');
        const instruction = document.getElementById('instruction');
        
        display.innerText = currentMag.toFixed(1);

        // HƏSSASLIQ MƏNTİQİ
        if (diff > 35) { // Real naqil tapıldı
            body.classList.add('found');
            instruction.innerText = "ПРОВОД НАЙДЕН! НЕ ДВИГАЙТЕСЬ И ОТМЕТЬТЕ МЕСТО!";
            
            if (Date.now() - lastSpeakTime > 5000) {
                speak("Провод найден! Остановитесь и отметьте это место.");
                lastSpeakTime = Date.now();
                if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
            }
        } else {
            body.classList.remove('found');
            // Havada tərpədəndə boş danışmasın deyə bura səs qoymuruq
            baseline = (0.02 * currentMag) + (0.98 * baseline); // Adaptasiya
        }
    }
</script>
</body>
</html>
