<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoPix 5-in-1 Revolutionary Messenger</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #075E54; --secondary: #128C7E; --blue: #34B7F1; --bg: #ECE5DD; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* UI Headers */
        .app-header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .status-bar { background: #054d44; color: #8fef8f; font-size: 10px; padding: 2px 15px; text-align: center; letter-spacing: 1px; }
        .tabs { background: var(--primary); display: flex; text-align: center; }
        .tab { flex: 1; padding: 15px; color: rgba(255,255,255,0.6); font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: white; border-bottom-color: white; }

        /* Screens */
        .screen { display: none; flex: 1; overflow-y: auto; background: white; }
        .screen.active { display: block; }
        .item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #ccc; margin-right: 15px; object-fit: cover; }

        /* Chat System */
        #chat-screen { position: fixed; inset: 0; background: #e5ddd5; z-index: 2000; display: none; flex-direction: column; }
        .msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 5px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-8e1d-60400d46e936.png'); }
        .msg { padding: 8px 12px; border-radius: 10px; max-width: 75%; font-size: 14px; position: relative; }
        .msg.sent { align-self: flex-end; background: #dcf8c6; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.received { align-self: flex-start; background: white; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; }

        .input-bar { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .input-bar input { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; }

        /* Call UI */
        #call-screen { position: fixed; inset: 0; background: #075e54; z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #remote-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 20px; right: 20px; width: 100px; height: 140px; border-radius: 10px; border: 2px solid white; z-index: 10; background: #222; }
        .call-controls { z-index: 20; position: absolute; bottom: 50px; display: flex; gap: 40px; }
        .btn-call { width: 70px; height: 70px; border-radius: 50%; border: none; color: white; font-size: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="status-bar" id="mesh-status">MESH: SCANNING FOR RADIOS... | DNS: STANDBY</div>
    <div class="app-header">
        <b>EcoPix Ultra v3</b>
        <span id="my-id-tag" style="background:rgba(255,255,255,0.2); padding:3px 8px; border-radius:5px; font-size:12px;">AZ-0000</span>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="showTab('chats')">SÖHBƏTLƏR</div>
        <div class="tab" onclick="showTab('contacts')">KONTAKTLAR</div>
        <div class="tab" onclick="showTab('calls')">TARİXÇƏ</div>
    </div>

    <div id="chats" class="screen active"></div>
    <div id="contacts" class="screen"></div>
    <div id="calls" class="screen"></div>

    <div id="chat-screen">
        <div class="app-header" style="background:var(--secondary)">
            <div style="display:flex; align-items:center;">
                <i class="fas fa-arrow-left" onclick="closeChat()" style="margin-right:15px;"></i>
                <img id="chat-avatar" src="" class="avatar" style="width:35px; height:35px;">
                <b id="chat-name">Ad</b>
            </div>
            <div>
                <i class="fas fa-video" onclick="makeCall(true)" style="margin-right:20px;"></i>
                <i class="fas fa-phone-alt" onclick="makeCall(false)"></i>
            </div>
        </div>
        <div class="msg-box" id="msg-container"></div>
        <div class="input-bar">
            <i class="fas fa-paperclip" onclick="uploadMedia()" style="font-size:22px; color:#777;"></i>
            <input type="text" id="msg-input" placeholder="Mesaj...">
            <button onclick="sendMsg()" style="background:none; border:none; color:var(--secondary); font-size:22px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="call-screen">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        <div style="z-index:20; text-align:center;">
            <h2 id="caller-id">AZ-User</h2>
            <p id="call-timer">Zəng edilir...</p>
        </div>
        <div class="call-controls">
            <button class="btn-call" style="background:#ff3b30;" onclick="endCall()"><i class="fas fa-phone-slash"></i></button>
            <button id="answer-btn" class="btn-call" style="background:#4cd964; display:none;" onclick="answerCall()"><i class="fas fa-phone"></i></button>
        </div>
    </div>

    <script>
        // 1. KONFİQURASİYA
        const firebaseConfig = {
            apiKey: "AIzaSyCtrVliO1bmdg7r0juWz-Yj2EaEGNsz2j8",
            databaseURL: "https://ecopix-118c6-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ecopix-118c6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myID = localStorage.getItem('eco_id') || "AZ-" + Math.floor(1000 + Math.random()*8999);
        localStorage.setItem('eco_id', myID);
        document.getElementById('my-id-tag').innerText = myID;

        // 2. MESH & P2P MOTORU (MODEM MÜDAXİLƏ SİMULYASIYASI)
        const peer = new Peer(myID, {
            config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]}
        });

        let activeTarget = null;
        let currentCall = null;
        let localStream = null;

        // 3. MULTİ-YOL (MULTI-PATH) MESAJLAŞMA
        function sendMsg(mediaUrl = null, mediaType = 'text') {
            const input = document.getElementById('msg-input');
            const val = input.value;
            if(!val && !mediaUrl) return;

            const chatKey = [myID, activeTarget].sort().join('_');
            const packet = {
                s: myID,
                t: val,
                m: mediaUrl,
                mt: mediaType,
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
            };

            // Əsas yol: Firebase (Internet)
            db.ref('msgs/' + chatKey).push(packet);
            
            // Alternativ yol: Mesh/P2P (İnternetsiz ötürmə simulyasiyası)
            console.log("Packet sent via Radio-Mesh to " + activeTarget);
            
            db.ref(`recent/${myID}/${activeTarget}`).set({ name: document.getElementById('chat-name').innerText, last: val || "Fayl paylaşıldı" });
            input.value = "";
        }

        function loadMsgs() {
            const chatKey = [myID, activeTarget].sort().join('_');
            db.ref('msgs/' + chatKey).on('value', snap => {
                const cont = document.getElementById('msg-container');
                cont.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val();
                    const side = d.s === myID ? 'sent' : 'received';
                    let html = d.t;
                    if(d.m) {
                        html = d.mt === 'video' ? `<video src="${d.m}" controls></video>` : `<img src="${d.m}" onclick="window.open('${d.m}')">`;
                    }
                    cont.innerHTML += `<div class="msg ${side}">${html}<br><small style="font-size:9px; opacity:0.5;">${d.time}</small></div>`;
                });
                cont.scrollTop = cont.scrollHeight;
            });
        }

        // 4. İNQİLABİ MEDİA-LINK SİSTEMİ (Cloudinary)
        function uploadMedia() {
            cloudinary.openUploadWidget({ cloudName: "dyrfkit3x", uploadPreset: "ml_default" }, (err, res) => {
                if (!err && res.event === "success") {
                    sendMsg(res.info.secure_url, res.info.resource_type);
                }
            });
        }

        // 5. ZƏNG VƏ ANTEN SİSTEMİ
        function makeCall(vid) {
            navigator.mediaDevices.getUserMedia({video: vid, audio: true}).then(stream => {
                localStream = stream;
                document.getElementById('local-video').srcObject = stream;
                document.getElementById('call-screen').style.display = 'flex';
                currentCall = peer.call(activeTarget, stream);
                setupCallEvents();
            });
        }

        peer.on('call', call => {
            currentCall = call;
            document.getElementById('call-screen').style.display = 'flex';
            document.getElementById('answer-btn').style.display = 'flex';
            document.getElementById('caller-id').innerText = call.peer;
        });

        function answerCall() {
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                localStream = stream;
                document.getElementById('local-video').srcObject = stream;
                currentCall.answer(stream);
                document.getElementById('answer-btn').style.display = 'none';
                setupCallEvents();
            });
        }

        function setupCallEvents() {
            currentCall.on('stream', rem => {
                document.getElementById('remote-video').srcObject = rem;
                startTimer();
            });
        }

        function endCall() {
            if(currentCall) currentCall.close();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            document.getElementById('call-screen').style.display = 'none';
        }

        // 6. UI İDARƏETMƏSİ
        function showTab(t) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.target.classList.add('active');
            if(t === 'contacts') renderContacts();
        }

        function renderContacts() {
            const list = JSON.parse(localStorage.getItem('eco_contacts') || "[]");
            document.getElementById('contacts').innerHTML = list.map(u => `
                <div class="item" onclick="openChat('${u.id}', '${u.name}')">
                    <img src="https://ui-avatars.com/api/?name=${u.name}" class="avatar">
                    <div><b>${u.name}</b><br><small>${u.id}</small></div>
                </div>
            `).join('') + `<div class="item" onclick="addContact()" style="color:var(--secondary)"><b>+ Kontakt Əlavə Et</b></div>`;
        }

        function addContact() {
            let id = prompt("AZ-ID:"); let name = prompt("Ad:");
            if(id && name) {
                let list = JSON.parse(localStorage.getItem('eco_contacts') || "[]");
                list.push({id, name});
                localStorage.setItem('eco_contacts', JSON.stringify(list));
                renderContacts();
            }
        }

        function openChat(id, name) {
            activeTarget = id;
            document.getElementById('chat-name').innerText = name;
            document.getElementById('chat-avatar').src = `https://ui-avatars.com/api/?name=${name}`;
            document.getElementById('chat-screen').style.display = 'flex';
            loadMsgs();
        }
        function closeChat() { document.getElementById('chat-screen').style.display = 'none'; }

        function startTimer() {
            let s = 0; setInterval(() => {
                s++; let m = Math.floor(s/60); let sec = s%60;
                document.getElementById('call-timer').innerText = `${m}:${sec < 10 ? '0'+sec : sec}`;
            }, 1000);
        }

        // Başlanğıc render
        renderContacts();
    </script>
</body>
</html>
