<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wire Tracker Pro + Wave Animation</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; margin: 0; overflow: hidden; }
        .container { padding: 20px; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* Rəqəm qutusu */
        .value-box { font-size: 70px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 20px #00ff00; }
        
        /* Dalğa Animasiyası */
        .wave-container { width: 100%; height: 150px; display: flex; align-items: flex-end; justify-content: center; gap: 5px; margin: 20px 0; }
        .bar { width: 10px; background: #00ff00; border-radius: 5px 5px 0 0; transition: height 0.1s ease; box-shadow: 0 0 10px #00ff00; }

        button { background: #00ff00; color: #000; border: none; padding: 20px 40px; font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer; z-index: 10; }
        .danger { color: #ff0000; text-shadow: 0 0 20px #ff0000; }
        .danger-bar { background: #ff0000 !important; box-shadow: 0 0 15px #ff0000 !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>WIRE TRACKER PRO</h2>
    <div id="status">Hazırdır</div>
    <div id="display" class="value-box">0.0</div>
    
    <div class="wave-container" id="waveContainer">
        </div>

    <button id="startBtn" onclick="startApp()">SKANERİ BAŞLAT</button>
</div>

<script>
    let audioCtx, oscillator, gainNode;
    let lastHeading = 0;
    const bars = [];
    const barCount = 20;

    // Dalğa barlarını yaradırıq
    const waveContainer = document.getElementById('waveContainer');
    for (let i = 0; i < barCount; i++) {
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = '10px';
        waveContainer.appendChild(bar);
        bars.push(bar);
    }

    function setupAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        oscillator = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        oscillator.type = 'square'; 
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        gainNode.gain.value = 0;
        oscillator.start();
    }

    function startApp() {
        setupAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientationabsolute', handleData, true);
            window.addEventListener('deviceorientation', handleData, true);
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status').innerText = "Skan edilir...";
        } else {
            alert("Sensor tapılmadı!");
        }
    }

    function handleData(event) {
        let heading = event.alpha || event.webkitCompassHeading || 0;
        let diff = Math.abs(heading - lastHeading);
        
        // Sıçrayışları süzgəcdən keçiririk (0-360 keçidi üçün)
        if (diff > 180) diff = Math.abs(diff - 360);

        // Ekranı yenilə
        const display = document.getElementById('display');
        display.innerText = heading.toFixed(1);

        // Naqil/Metal aşkarlananda (Həssaslıq: diff > 2)
        if (diff > 2) {
            let intensity = Math.min(diff * 10, 150); // Dalğa hündürlüyü
            updateWaves(intensity, true);
            
            // Səs və Vibrasiya
            oscillator.frequency.value = 100 + (intensity * 5);
            gainNode.gain.value = 0.1;
            if (navigator.vibrate) navigator.vibrate(50);
            
            display.classList.add('danger');
        } else {
            updateWaves(10, false);
            gainNode.gain.value = 0;
            display.classList.remove('danger');
        }
        lastHeading = heading;
    }

    function updateWaves(height, isDanger) {
        bars.forEach((bar, index) => {
            // Təsadüfi dalğa effekti üçün balaca rəqəmlər əlavə edirik
            let randomHeight = height + Math.random() * 20;
            bar.style.height = randomHeight + 'px';
            if (isDanger) {
                bar.classList.add('danger-bar');
            } else {
                bar.classList.remove('danger-bar');
            }
        });
    }
</script>
</body>
</html>
