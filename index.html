<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Görən Göz - LIVE</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* Video Arxa Fonu */
        #remote-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(1.1) contrast(1.1) saturate(1.2); }
        
        /* İnterfeys Elementləri */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        
        .top-bar { padding: 20px; display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
        .live-tag { background: #ff0050; color: white; padding: 5px 12px; border-radius: 4px; font-weight: bold; font-size: 14px; animation: blink 1s infinite; }
        
        .side-bar { position: absolute; right: 15px; bottom: 150px; display: flex; flex-direction: column; gap: 20px; pointer-events: auto; }
        .icon-btn { width: 50px; height: 50px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; backdrop-filter: blur(5px); }
        
        .bottom-info { padding: 30px; color: white; background: linear-gradient(transparent, rgba(0,0,0,0.8)); pointer-events: auto; }
        .username { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        
        .controls { position: absolute; bottom: 20px; width: 100%; text-align: center; pointer-events: auto; }
        button.main-btn { padding: 15px 40px; border-radius: 30px; border: none; background: #00f2ea; color: #000; font-weight: bold; font-size: 16px; box-shadow: 0 0 20px #00f2ea; }

        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
    </style>
</head>
<body>

    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted style="display:none;"></video>

    <div class="overlay">
        <div class="top-bar">
            <div class="live-tag">LIVE</div>
            <div style="color: white; text-shadow: 0 0 5px #000;">👁 1.2K</div>
        </div>

        <div class="side-bar">
            <div class="icon-btn">❤️</div>
            <div class="icon-btn">💬</div>
            <div class="icon-btn">🔗</div>
        </div>

        <div class="bottom-info">
            <div class="username">@samxal_hesenov</div>
            <div class="desc">Görən Göz layihəsi - Dünyanı kəşf et! 🚀</div>
        </div>
    </div>

    <div class="controls">
        <button class="main-btn" id="actionBtn" onclick="toggleAction()">YAYIMI BAŞLAT</button>
    </div>

    <script>
        const peer = new Peer();
        let myStream;
        let isStreaming = false;

        // Kameranı hazırla
        navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
            myStream = stream;
            document.getElementById('local-video').srcObject = stream;
        });

        function toggleAction() {
            if(!isStreaming) {
                startBroadcasting();
            } else {
                location.reload();
            }
        }

        function startBroadcasting() {
            isStreaming = true;
            document.getElementById('actionBtn').innerText = "YAYIMI BİTİR";
            document.getElementById('actionBtn').style.background = "#ff0050";
            document.getElementById('actionBtn').style.boxShadow = "0 0 20px #ff0050";
            
            // Sənin ID-ni göstər (Bu ID-ni gələcəkdə avtomatik siyahıya salacağıq)
            alert("Yayım ID-iniz: " + peer.id + "\nİzləyicilər qoşula bilər!");
            
            peer.on('call', call => {
                call.answer(myStream);
                call.on('stream', remoteStream => {
                    document.getElementById('remote-video').srcObject = remoteStream;
                });
            });
        }
        
        // Sürüşdürmə (swipe) simulyasiyası üçün bura gələcəkdə siyahı əlavə edəcəyik
    </script>
</body>
</html>
