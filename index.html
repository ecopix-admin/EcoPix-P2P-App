<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Chat Widget</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0084ff; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: #e5e5e5; }

        /* Widget Button */
        #chat-trigger {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px; background: var(--primary);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: white; font-size: 28px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,132,255,0.4);
            transition: 0.3s; z-index: 1000;
        }

        /* Chat Window */
        #chat-window {
            position: fixed; bottom: 100px; right: 30px;
            width: 350px; height: 500px; background: white;
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none; flex-direction: column; overflow: hidden;
            z-index: 1000; animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .chat-header { background: var(--primary); color: white; padding: 20px; display: flex; align-items: center; gap: 10px; }
        .chat-body { flex: 1; padding: 20px; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .msg.bot { background: white; align-self: flex-start; color: #333; border-bottom-left-radius: 2px; }
        .msg.user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        .chat-footer { padding: 15px; background: white; display: flex; gap: 10px; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 20px; outline: none; }
        button#send { background: var(--primary); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-trigger" onclick="toggleChat()"><i class="fab fa-whatsapp"></i></div>

<div id="chat-window">
    <div class="chat-header">
        <i class="fas fa-robot"></i>
        <div>
            <strong>AI Dəstək Merkezi</strong><br>
            <small>Həmişə onlayn</small>
        </div>
    </div>
    <div class="chat-body" id="chatBody">
        <div class="msg bot">Salam! Mən ağıllı köməkçiyəm. Sizə necə kömək edə bilərəm?</div>
    </div>
    <div class="chat-footer">
        <input type="text" id="userInput" placeholder="Mesajınızı yazın...">
        <button id="send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    function toggleChat() {
        const win = document.getElementById('chat-window');
        win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
    }

    function sendMessage() {
        const input = document.getElementById('userInput');
        const body = document.getElementById('chatBody');
        if(!input.value.trim()) return;

        // User Message
        const userDiv = document.createElement('div');
        userDiv.className = 'msg user';
        userDiv.innerText = input.value;
        body.appendChild(userDiv);

        const text = input.value.toLowerCase();
        input.value = '';
        body.scrollTop = body.scrollHeight;

        // Bot Logic (Simulyasiya)
        setTimeout(() => {
            const botDiv = document.createElement('div');
            botDiv.className = 'msg bot';
            
            if(text.includes('qiymət')) botDiv.innerText = "Xidmət haqqımız aylıq 20 AZN-dən başlayır.";
            else if(text.includes('ünvan')) botDiv.innerText = "Ofisimiz Bakı şəhəri, Nizami küçəsində yerləşir.";
            else if(text.includes('əlaqə')) botDiv.innerText = "Sizi operatora bağlayıram: +994 50 123 45 67";
            else botDiv.innerText = "Mən bunu hələ öyrənməmişəm. Amma rəhbərliyə xəbər verə bilərəm!";
            
            body.appendChild(botDiv);
            body.scrollTop = body.scrollHeight;
        }, 800);
    }
</script>

</body>
</html>
