<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sham-Cell Real 3D Scan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; z-index: 10; font-family: monospace; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #0f0; }
    </style>
</head>
<body>
    <div id="ui">
        <b>SHAM-CELL 3D DEPTH ENGINE</b><br>
        <small>Həqiqi həcm simulyasiyası aktivdir</small>
    </div>
    <video id="input_video" style="display:none;"></video>
    <script>
        const videoElement = document.getElementById('input_video');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Həqiqi 3D tor (Mesh) - daha çox nöqtə (128x128)
        const geometry = new THREE.PlaneGeometry(3, 4, 128, 128);
        const videoTexture = new THREE.VideoTexture(videoElement);
        const material = new THREE.MeshStandardMaterial({ 
            map: videoTexture, 
            displacementMap: videoTexture, // Şəklin rəngini dərinlik kimi istifadə edir
            displacementScale: 0.5,        // Qabarıqlıq dərəcəsi
            side: THREE.DoubleSide 
        });

        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        // İşıqlandırma (Həcmi görmək üçün vacibdir)
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(0, 0, 2);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 3;

        // İnteraktiv fırlatma
        let rot = 0;
        function animate() {
            requestAnimationFrame(animate);
            // Sən toxunmasan da yavaşca fırlansın ki, 3D-liyi görəsən
            mesh.rotation.y += 0.005; 
            renderer.render(scene, camera);
        }

        // MAQNİTOMETR VƏ YA TOUCH İLƏ İDARƏ
        window.addEventListener('touchmove', (e) => {
            mesh.rotation.y = (e.touches[0].clientX / window.innerWidth - 0.5) * 2;
            mesh.rotation.x = (e.touches[0].clientY / window.innerHeight - 0.5) * 2;
        });

        const selfieSegmentation = new SelfieSegmentation({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`});
        selfieSegmentation.setOptions({ modelSelection: 1 });
        selfieSegmentation.onResults((results) => {
            // Bu hissə hər kadrda dərinliyi yeniləyir
            material.displacementMap.needsUpdate = true;
        });

        const cam = new Camera(videoElement, {
            onFrame: async () => { await selfieSegmentation.send({image: videoElement}); },
            width: 640, height: 480
        });
        cam.start();
        animate();
    </script>
</body>
</html>
