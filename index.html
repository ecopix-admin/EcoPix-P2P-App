<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HoloSketch Studio Pro v1.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #010409; touch-action: none; overflow: hidden; font-family: 'Inter', sans-serif; }
        #app-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* Professional Drawing Canvas */
        #canvas-wrapper { position: relative; width: 98%; max-width: 1000px; aspect-ratio: 16/9; border-radius: 2rem; overflow: hidden; background: #000; border: 3px solid #1e293b; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        canvas { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }
        video { display: none; }

        /* Professional UI - Palette & Share */
        .hud-panel { position: absolute; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; transition: all 0.3s ease; opacity: 0; pointer-events: none; z-index: 100; }
        .panel-visible { opacity: 1; pointer-events: auto; }
        
        /* Palette */
        #palette-panel { bottom: 20px; left: 50%; transform: translateX(-50%) scale(0.9); width: 90%; max-width: 500px; padding: 1rem; display: flex; flex-direction: column; gap: 10px; }
        .color-dot { width: 35px; height: 35px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.2s; }
        .color-active { border-color: #3b82f6; transform: scale(1.1); }
        .brush-btn { flex: 1; background: rgba(255,255,255,0.05); padding: 10px; rounded-xl text-xs font-bold text-slate-400 hover:bg-blue-600 hover:text-white transition-all; }
        .brush-active { background: #3b82f6; color: white; }

        /* Share Menu */
        #share-panel { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 80%; max-width: 400px; padding: 2rem; text-center: center; }
        .share-btn { width: 100%; background: #1e293b; padding: 15px; rounded-xl font-bold text-sm mb-3 hover:bg-blue-600 transition-all; display: flex; items-center; justify-content: center; gap: 10px; }
        
        #startBtn { background: #3b82f6; padding: 1.5rem 3rem; border-radius: 2rem; font-size: 1.5rem; font-weight: 900; text-transform: uppercase; transition: all 0.2s; }
    </style>
</head>
<body class="flex flex-col items-center">

    <div id="start-overlay" class="fixed inset-0 bg-black/95 z-[1000] flex flex-col items-center justify-center backdrop-blur-xl transition-opacity duration-500">
        <h1 class="text-5xl font-black text-white italic tracking-tighter mb-4">HoloSketch <span class="text-blue-500">PRO</span></h1>
        <p class="text-slate-400 text-center mb-10 max-w-sm">Holoqrafik studiyanı aktivləşdirmək üçün klikləyin. Jestlərlə havada professional şəkillər çəkin.</p>
        <button id="startBtn" class="text-white">STUDİYANI BAŞLAT</button>
    </div>

    <div id="app-container">
        <div id="palette-panel" class="hud-panel glass-panel">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Rəng Palitrası</span>
                <span class="text-xs font-bold text-blue-500 uppercase tracking-widest">Açıq Əl</span>
            </div>
            <div class="flex gap-2 justify-center mb-3">
                <div onclick="setColor('#ef4444')" class="color-dot bg-red-500 color-active"></div>
                <div onclick="setColor('#3b82f6')" class="color-dot bg-blue-500"></div>
                <div onclick="setColor('#22c55e')" class="color-dot bg-emerald-500"></div>
                <div onclick="setColor('#eab308')" class="color-dot bg-yellow-500"></div>
                <div onclick="setColor('#ffffff')" class="color-dot bg-white"></div>
                <div onclick="setColor('#000000')" class="color-dot bg-black border-white/20"></div>
            </div>
            <div class="flex gap-2">
                <button onclick="setBrush('oil')" id="brush-oil" class="brush-btn brush-active">🛢️ YAĞLI BOYA</button>
                <button onclick="setBrush('pencil')" id="brush-pencil" class="brush-btn">✏️ QƏLƏM</button>
                <button onclick="setBrush('marker')" id="brush-marker" class="brush-btn">🖍️ MARKER</button>
            </div>
        </div>

        <div id="share-panel" class="hud-panel glass-panel">
            <h2 class="text-2xl font-black text-white italic tracking-tighter mb-6">ŞƏKİLİ PAYLAŞ</h2>
            <div class="text-center text-xs text-slate-500 mb-6">Əlinizi açıb yumaraq bu menyunu aktivləşdirdiniz.</div>
            <button class="share-btn text-white">📲 Instagram Story</button>
            <button class="share-btn text-white">🌐 Telegram Göndər</button>
            <button class="share-btn text-white">📥 Qalereyaya Yaz</button>
            <button onclick="closeShare()" class="text-xs text-slate-600 mt-4 hover:text-white">[ Ləğv Et ]</button>
        </div>

        <div id="status" class="absolute top-5 flex items-center gap-2 z-[100] px-4 py-2 bg-[#0f172a]/80 rounded-full border border-slate-800 text-emerald-400 font-mono text-[10px] uppercase tracking-widest opacity-0 transition-opacity duration-300">
            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
            STUDIO ACTIVE
        </div>

        <div id="canvas-wrapper">
            <video id="input_video"></video>
            <canvas id="output_canvas"></canvas>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const startOverlay = document.getElementById('start-overlay');
        const status = document.getElementById('status');
        
        // Panels
        const palettePanel = document.getElementById('palette-panel');
        const sharePanel = document.getElementById('share-panel');

        let audioCtx, isReady = false;
        let isDrawing = false;
        let isPaletteOpen = false;
        let isShareOpen = false;

        // Drawing State
        let currentColor = '#ef4444';
        let currentBrush = 'oil'; // oil, pencil, marker
        let drawingPoints = [];

        // PEŞƏKAR YUMŞALTMA (EXPONENTIAL SMOOTHING)
        // Bu, titrəməni daş kimi sabit edir.
        let smoothedX = 0, smoothedY = 0;
        const smoothingFactor = 0.25; // 0-1 arası (aşağı rəqəm daha hamar edir, amma bir az gecikmə yaradır)

        function setColor(color) {
            currentColor = color;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('color-active'));
            event.target.classList.add('color-active');
        }

        function setBrush(brush) {
            currentBrush = brush;
            document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('brush-active'));
            document.getElementById(`brush-${brush}`).classList.add('brush-active');
        }

        function closeShare() {
            isShareOpen = false;
            sharePanel.classList.remove('panel-visible', 'scale-100');
        }

        startBtn.onclick = () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isReady = true;
            startOverlay.classList.add('opacity-0');
            setTimeout(() => startOverlay.classList.add('hidden'), 500);
            status.classList.add('opacity-100');
        };

        // Professional Tekstura Render Motoru
        function drawBrushLine(points) {
            if (points.length < 2) return;
            canvasCtx.lineJoin = 'round';
            canvasCtx.lineCap = 'round';

            if (currentBrush === 'oil') {
                // Yağlı boya effekti (Mürəkkəb render)
                canvasCtx.strokeStyle = currentColor;
                canvasCtx.lineWidth = 15;
                // Kənarları teksturalı etmək üçün kölgə effekti
                canvasCtx.shadowBlur = 4;
                canvasCtx.shadowColor = currentColor;
                
                canvasCtx.beginPath();
                canvasCtx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    canvasCtx.lineTo(points[i].x, points[i].y);
                }
                canvasCtx.stroke();
                canvasCtx.shadowBlur = 0; // Sıfırla

            } else if (currentBrush === 'pencil') {
                // Qələm effekti (Nazik və kəsik-kəsik)
                canvasCtx.strokeStyle = `${currentColor}dd`; // Bir az şəffaf
                canvasCtx.lineWidth = 3;
                canvasCtx.beginPath();
                canvasCtx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    canvasCtx.lineTo(points[i].x, points[i].y);
                }
                canvasCtx.stroke();

            } else if (currentBrush === 'marker') {
                // Marker effekti (Qalın və təmiz)
                canvasCtx.strokeStyle = `${currentColor}aa`; // Daha şəffaf
                canvasCtx.lineWidth = 25;
                canvasCtx.beginPath();
                canvasCtx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) {
                    canvasCtx.lineTo(points[i].x, points[i].y);
                }
                canvasCtx.stroke();
            }
        }

        // PEŞƏKAR JEST ANALİZ MOTORU
        let lastHandState = 'OPEN'; // OPEN, CLOSED
        let stateChangeTime = 0;

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                
                // Barmaqların bir-birinə yayılma dərəcəsi (Açıq/Yumulu əl üçün)
                const tips = [8, 12, 16, 20]; const bases = [5, 9, 13, 17];
                let totalSpread = 0;
                for(let i=0; i<4; i++) {
                    const dx = hand[tips[i]].x - hand[bases[i]].x;
                    const dy = hand[tips[i]].y - hand[bases[i]].y;
                    totalSpread += Math.sqrt(dx*dx + dy*dy);
                }

                // Baş barmaq ilə şəhadət (Pinch jesti üçün)
                const thumbTip = hand[4]; const indexTip = hand[8];
                const thumbIndexDx = thumbTip.x - indexTip.x; const thumbIndexDy = thumbTip.y - indexTip.y;
                const thumbIndexDist = Math.sqrt(thumbIndexDx*thumbIndexDx + thumbIndexDy*thumbIndexDy);

                // KURSOR KOORDİNATLARINI HESABLA VƏ YUMŞALT
                // Güzgü effekti düzəlişi: (1 - indexTip.x)
                const rawX = (1 - indexTip.x) * canvasElement.width;
                const rawY = indexTip.y * canvasElement.height;

                // Riyazi Süzgəc: Exponential Smoothing
                smoothedX = smoothingFactor * rawX + (1 - smoothingFactor) * smoothedX;
                smoothedY = smoothingFactor * rawY + (1 - smoothingFactor) * smoothedY;

                // Vizual marker (Qələm ucu)
                canvasCtx.fillStyle = currentColor;
                canvasCtx.beginPath(); canvasCtx.arc(smoothedX, smoothedY, 10, 0, 2 * Math.PI); canvasCtx.fill();
                canvasCtx.lineWidth = 3; canvasCtx.strokeStyle = "white"; canvasCtx.stroke();

                // JESTLƏRİN İDARƏSİ

                // 1. Rəsm Çəkmə (Pinch - Baş + Şəhadət barmaq)
                if (thumbIndexDist < 0.04 && !isPaletteOpen && !isShareOpen) { 
                    if (!isDrawing) { drawingPoints.push([]); isDrawing = true; }
                    if (drawingPoints.length > 0) {
                        drawingPoints[drawingPoints.length - 1].push({ x: smoothedX, y: smoothedY });
                    }
                } else {
                    isDrawing = false;
                }

                // 2. Palitranı Aç (Açıq Əl - Spread yüksək)
                if (totalSpread > 0.4 && thumbIndexDist > 0.1 && !isShareOpen) {
                    if (!isPaletteOpen) { palettePanel.classList.add('panel-visible', 'scale-100'); isPaletteOpen = true; }
                } else {
                    if (isPaletteOpen) { palettePanel.classList.remove('panel-visible', 'scale-100'); isPaletteOpen = false; }
                }

                // 3. Paylaşma Menyu (Əli aç/yum - State dəyişməsi)
                const currentHandState = totalSpread > 0.3 ? 'OPEN' : 'CLOSED';
                if (currentHandState !== lastHandState) {
                    const now = Date.time;
                    if (now - stateChangeTime < 1000) { // 1 saniyə daxilində sürətli dəyişmə
                        if (!isShareOpen && !isPaletteOpen && !isDrawing) {
                           sharePanel.classList.add('panel-visible', 'scale-100'); isShareOpen = true; 
                        }
                    }
                    lastHandState = currentHandState;
                    stateChangeTime = now;
                }

                // Çəkilmiş xətləri render et
                for (const stroke of drawingPoints) {
                    drawBrushLine(stroke);
                }

            } else {
                // Əl yoxdursa, kursoru və yaddaşı sıfırla
                isDrawing = false;
                lastPlayedKeys = {};
                
                // Çəkilmiş rəsmləri göstər (Hətta əl yoxdursa belə)
                for (const stroke of drawingPoints) {
                    drawBrushLine(stroke);
                }
            }
            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                await hands.send({image: videoElement});
            },
            width: 1280, height: 720 // Çözünürlük/Sürət balansı (HD)
        });
        camera.start();
    </script>
</body>
</html>
