<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görən Göz AI - Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: Arial; text-align: center; overflow: hidden; }
        video { width: 100%; height: 80vh; object-fit: cover; border-bottom: 5px solid #27ae60; }
        .status { padding: 20px; font-size: 1.5rem; background: #1a1a1a; }
        .btn-start { padding: 20px 40px; font-size: 1.5rem; background: #27ae60; color: white; border: none; border-radius: 10px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline muted></video>
    <div id="status" class="status">Sistemi başlatmaq üçün ekrana toxunun</div>
    <button class="btn-start" onclick="init()">BAŞLAT</button>

    <script>
        let model;
        let video = document.getElementById('webcam');
        let statusDiv = document.getElementById('status');
        let synth = window.speechSynthesis;
        let lastAnnounced = "";

        // Səsli Bildiriş Funksiyası
        function speak(text) {
            if (synth.speaking) return;
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR'; // Azərbaycan dili dəstəyi üçün ən yaxın alternativ
            synth.speak(utterance);
        }

        // Kameranı və Modeli Başlat
        async function init() {
            statusDiv.innerText = "Model yüklənir, lütfən gözləyin...";
            speak("Sistem başladılır. Kamera və süni intellekt hazırlanır.");

            // COCO-SSD Modelini yüklə (Obyekt tanıma üçün)
            model = await cocoSsd.load();
            
            // Kamera icazəsi
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: false
            });
            video.srcObject = stream;

            statusDiv.innerText = "Sistem AKTİVDİR";
            speak("Sistem aktivdir. Ətrafı izləyirəm.");
            
            predict();
        }

        // Obyektləri və Maneələri Tanıma
        async function predict() {
            const predictions = await model.detect(video);
            
            if (predictions.length > 0) {
                let primaryObject = predictions[0].class;
                let score = Math.round(predictions[0].score * 100);

                // Azərbaycan dilinə tərcümə lüğəti
                const dictionary = {
                    "person": "İnsan",
                    "car": "Maşın gəlir, diqqətli olun",
                    "chair": "Qarşınızda oturacaq var",
                    "bottle": "Su qabı",
                    "cell phone": "Telefon",
                    "laptop": "Kompyuter",
                    "door": "Qapı tapıldı"
                };

                let message = dictionary[primaryObject] || primaryObject;

                if (message !== lastAnnounced) {
                    statusDiv.innerText = "Görürəm: " + message;
                    speak(message);
                    lastAnnounced = message;
                }
            }
            
            requestAnimationFrame(predict);
        }

        // Virtual Zəng Simulyasiyası (Zəng gələndə bildirmək üçün)
        // Qeyd: Brauzer birbaşa real GSM zənglərinə giriş icazəsi vermir (təhlükəsizlik üçün), 
        // lakin bu funksiya API vasitəsilə inteqrasiya oluna bilər.
        function simulateIncomingCall(contactName) {
            speak("Zəng gəlir. Zəng edən şəxs: " + contactName + ". Cavab vermək üçün ekrana iki dəfə toxunun.");
        }

        // Ekran oxuma (OCR) üçün gələcəkdə Tesseract.js əlavə edilə bilər.
    </script>
</body>
</html>
