<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoPix Ultra - P2P Mesh Messenger</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #075E54; --secondary: #128C7E; --blue: #34B7F1; --light: #ECE5DD; --white: #FFFFFF; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; background: var(--light); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Modern UI Elements */
        .app-header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .tabs { background: var(--primary); display: flex; text-align: center; border-bottom: 2px solid rgba(255,255,255,0.1); }
        .tab { flex: 1; padding: 12px; color: rgba(255,255,255,0.6); font-weight: 600; cursor: pointer; transition: 0.3s; }
        .tab.active { color: white; border-bottom: 3px solid white; }

        .screen { display: none; flex: 1; overflow-y: auto; background: var(--white); }
        .screen.active { display: block; }

        /* Chat Interface */
        #chat-screen { position: fixed; inset: 0; background: #e5ddd5; z-index: 2000; display: none; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-8e1d-60400d46e936.png'); }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.sent { align-self: flex-end; background: #dcf8c6; }
        .msg.received { align-self: flex-start; background: white; }
        .msg img, .msg video { max-width: 100%; border-radius: 5px; cursor: pointer; }

        /* Dynamic Call Screen */
        #call-screen { position: fixed; inset: 0; background: #075e54; z-index: 3000; display: none; flex-direction: column; align-items: center; color: white; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        #local-video { width: 90px; height: 120px; position: absolute; top: 20px; right: 20px; border-radius: 8px; border: 2px solid white; z-index: 3100; object-fit: cover; }
        .call-info { z-index: 3200; margin-top: 80px; text-align: center; }
        .call-btns { position: absolute; bottom: 50px; display: flex; gap: 40px; z-index: 3200; }
        .btn-call { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 25px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .bg-red { background: #ff3b30; } .bg-green { background: #4cd964; }

        /* Floating Button */
        .fab { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; background: var(--secondary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 3px 10px rgba(0,0,0,0.3); font-size: 20px; }

        .input-area { background: #f0f0f0; padding: 8px; display: flex; align-items: center; gap: 10px; }
        .input-area input { flex: 1; padding: 10px; border-radius: 20px; border: none; outline: none; }
    </style>
</head>
<body>

    <audio id="ringtone" loop src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3"></audio>

    <div id="main-app">
        <div class="app-header">
            <b>EcoPix Ultra <span id="online-status" style="color: lime; font-size: 10px;">● P2P Active</span></b>
            <div id="my-id-display" style="font-size: 12px; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 10px;">AZ-....</div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('chats')">SÖHBƏTLƏR</div>
            <div class="tab" onclick="switchTab('contacts')">KONTAKTLAR</div>
            <div class="tab" onclick="switchTab('calls')">ZƏNGLƏR</div>
        </div>

        <div id="chats" class="screen active"></div>
        <div id="contacts" class="screen"></div>
        <div id="calls" class="screen"></div>
        <div class="fab" onclick="addContact()"><i class="fas fa-plus"></i></div>
    </div>

    <div id="chat-screen">
        <div class="app-header" style="background: var(--secondary);">
            <div style="display:flex; align-items:center;">
                <i class="fas fa-arrow-left" onclick="closeChat()" style="margin-right:15px;"></i>
                <img id="active-avatar" src="https://via.placeholder.com/40" style="width:40px; height:40px; border-radius:50%; margin-right:10px;">
                <b id="active-name">Ad</b>
            </div>
            <div>
                <i class="fas fa-video" onclick="startCall(true)" style="margin-right:20px;"></i>
                <i class="fas fa-phone" onclick="startCall(false)"></i>
            </div>
        </div>
        <div class="messages" id="chat-msgs"></div>
        <div class="input-area">
            <i class="fas fa-paperclip" onclick="mediaUpload()"></i>
            <input type="text" id="msg-input" placeholder="Mesaj yazın...">
            <i class="fas fa-microphone" onclick="alert('Səsli mesaj aktivləşdirilir...')"></i>
            <button onclick="sendText()" style="border:none; background:none; color:var(--secondary); font-size:20px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="call-screen">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        <div class="call-info">
            <h2 id="caller-name">İstifadəçi</h2>
            <p id="call-status">Zəng edilir...</p>
        </div>
        <div class="call-btns">
            <button class="btn-call bg-red" onclick="hangUp()"><i class="fas fa-phone-slash"></i></button>
            <button id="answer-btn" class="btn-call bg-green" onclick="acceptCall()"><i class="fas fa-phone"></i></button>
        </div>
    </div>

    <script>
        // FIREBASE İNTEQRASİYASI
        const firebaseConfig = {
            apiKey: "AIzaSyCtrVliO1bmdg7r0juWz-Yj2EaEGNsz2j8",
            databaseURL: "https://ecopix-118c6-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ecopix-118c6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ŞƏXSİ MƏLUMATLAR
        let myID = localStorage.getItem('eco_id') || "AZ-" + Math.floor(Math.random()*9999);
        localStorage.setItem('eco_id', myID);
        document.getElementById('my-id-display').innerText = myID;

        // PEER-TO-PEER (MODEM MƏNTİQİ)
        const peer = new Peer(myID, {
            config: {'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }]},
            debug: 1
        });

        let activeTarget = null;
        let currentCall = null;
        let myStream = null;

        // KONTAKT VƏ SÖHBƏT FUNKSİYALARI
        function switchTab(t) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.target.classList.add('active');
            if(t === 'contacts') renderContacts();
            if(t === 'chats') renderRecent();
        }

        function addContact() {
            let id = prompt("Dostunuzun AZ-ID-sini yazın:");
            let name = prompt("Ona bir ad verin:");
            if(id && name) {
                let list = JSON.parse(localStorage.getItem('eco_contacts') || "[]");
                list.push({id, name});
                localStorage.setItem('eco_contacts', JSON.stringify(list));
                renderContacts();
            }
        }

        function renderContacts() {
            const cont = document.getElementById('contacts');
            let list = JSON.parse(localStorage.getItem('eco_contacts') || "[]");
            cont.innerHTML = list.map(u => `
                <div style="padding:15px; border-bottom:1px solid #eee; display:flex; align-items:center;" onclick="openChat('${u.id}', '${u.name}')">
                    <img src="https://ui-avatars.com/api/?name=${u.name}" style="width:45px; border-radius:50%; margin-right:15px;">
                    <div><b>${u.name}</b><br><small>${u.id}</small></div>
                </div>
            `).join('');
        }

        function openChat(id, name) {
            activeTarget = id;
            document.getElementById('active-name').innerText = name;
            document.getElementById('chat-screen').style.display = 'flex';
            loadMsgs();
        }

        function closeChat() { document.getElementById('chat-screen').style.display = 'none'; }

        // MEDIA-LINK (ANINDA ŞƏKİL/VİDEO)
        function mediaUpload() {
            cloudinary.openUploadWidget({ cloudName: "dyrfkit3x", uploadPreset: "ml_default" }, (err, res) => {
                if (!err && res.event === "success") {
                    let type = res.info.resource_type; // image or video
                    sendText(res.info.secure_url, type);
                }
            });
        }

        function sendText(mediaUrl = null, mediaType = 'text') {
            let input = document.getElementById('msg-input');
            let val = input.value;
            if(!val && !mediaUrl) return;

            let chatID = [myID, activeTarget].sort().join('_');
            db.ref('messages/' + chatID).push({
                sender: myID,
                text: val,
                media: mediaUrl,
                type: mediaType,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            
            db.ref(`recent/${myID}/${activeTarget}`).set({ name: document.getElementById('active-name').innerText, last: val || "Media paylaşıldı" });
            input.value = "";
        }

        function loadMsgs() {
            let chatID = [myID, activeTarget].sort().join('_');
            db.ref('messages/' + chatID).on('value', snap => {
                let box = document.getElementById('chat-msgs');
                box.innerHTML = "";
                snap.forEach(m => {
                    let d = m.val();
                    let side = d.sender === myID ? 'sent' : 'received';
                    let content = d.text;
                    if(d.media) {
                        content = d.type === 'video' ? `<video src="${d.media}" controls></video>` : `<img src="${d.media}" onclick="window.open('${d.media}')">`;
                    }
                    box.innerHTML += `<div class="msg ${side}">${content}<br><small style="font-size:9px; opacity:0.5;">${d.time}</small></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // ZƏNG SİSTEMİ (İNTERNETSİZ MESH DƏSTƏKLİ)
        function startCall(isVid) {
            navigator.mediaDevices.getUserMedia({video: isVid, audio: true}).then(stream => {
                myStream = stream;
                document.getElementById('local-video').srcObject = stream;
                document.getElementById('local-video').style.display = 'block';
                currentCall = peer.call(activeTarget, stream);
                handleCall();
                document.getElementById('call-screen').style.display = 'flex';
                document.getElementById('answer-btn').style.display = 'none';
                document.getElementById('call-status').innerText = "Zəng edilir...";
            });
        }

        peer.on('call', call => {
            currentCall = call;
            document.getElementById('call-screen').style.display = 'flex';
            document.getElementById('answer-btn').style.display = 'flex';
            document.getElementById('ringtone').play();
            document.getElementById('caller-name').innerText = call.peer;
            document.getElementById('call-status').innerText = "Gələn zəng...";
        });

        function acceptCall() {
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                myStream = stream;
                document.getElementById('local-video').srcObject = stream;
                currentCall.answer(stream);
                document.getElementById('ringtone').pause();
                document.getElementById('answer-btn').style.display = 'none';
                handleCall();
            });
        }

        function handleCall() {
            currentCall.on('stream', rem => {
                document.getElementById('remote-video').srcObject = rem;
                document.getElementById('call-status').innerText = "00:01";
            });
        }

        function hangUp() {
            if(currentCall) currentCall.close();
            if(myStream) myStream.getTracks().forEach(t => t.stop());
            document.getElementById('call-screen').style.display = 'none';
            document.getElementById('ringtone').pause();
        }

        function renderRecent() {
            db.ref(`recent/${myID}`).on('value', snap => {
                const c = document.getElementById('chats');
                c.innerHTML = "";
                snap.forEach(s => {
                    let d = s.val();
                    c.innerHTML += `<div class="list-item" style="padding:15px; border-bottom:1px solid #eee; display:flex;" onclick="openChat('${s.key}', '${d.name}')">
                        <img src="https://ui-avatars.com/api/?name=${d.name}" style="width:50px; border-radius:50%; margin-right:15px;">
                        <div style="flex:1;"><b>${d.name}</b><br><small>${d.last}</small></div>
                    </div>`;
                });
            });
        }

        renderRecent();
    </script>
</body>
</html>
