<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Görən Göz VBN Pro</title>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; }
        canvas { width: 100%; height: auto; display: block; }
        .info { position: absolute; top: 0; left: 0; width: 100%; background: rgba(0,255,0,0.1); padding: 10px; border-bottom: 1px solid #0f0; z-index: 10; }
        #startBtn { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 20px; background: #0f0; border: none; font-weight: bold; width: 80%; z-index: 20; }
    </style>
</head>
<body>

<div class="info">
    <div>X (SAĞ/SOL): <span id="x">0.00</span> m</div>
    <div>Y (İLERİ/GERİ): <span id="y">0.00</span> m</div>
    <div>NÖQTƏ SAYI: <span id="pts">0</span></div>
</div>

<video id="v" style="display:none" playsinline></video>
<canvas id="c"></canvas>
<button id="startBtn">SİSTEMİ START ET</button>

<script>
let x = 0, y = 0;
let v = document.getElementById('v');
let btn = document.getElementById('startBtn');

btn.onclick = () => {
    btn.style.display = 'none';
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => {
        v.srcObject = s;
        v.play();
        run();
    });
};

function run() {
    let cap = new cv.VideoCapture(v);
    let src = new cv.Mat(v.videoHeight, v.videoWidth, cv.CV_8UC4);
    let gray = new cv.Mat();
    let prev = new cv.Mat();
    let p0 = new cv.Mat();
    let p1 = new cv.Mat();
    let st = new cv.Mat();
    let err = new cv.Mat();

    function p() {
        cap.read(src);
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
        if (prev.empty()) { gray.copyTo(prev); cv.goodFeaturesToTrack(gray, p0, 40, 0.01, 10); }
        
        if (!p0.empty()) {
            cv.calcOpticalFlowPyrLK(prev, gray, p0, p1, st, err);
            let cnt = 0, dx = 0, dy = 0;
            for (let i = 0; i < st.rows; i++) {
                if (st.data[i] == 1) {
                    dx += p1.data32F[i*2] - p0.data32F[i*2];
                    dy += p1.data32F[i*2+1] - p0.data32F[i*2+1];
                    cnt++;
                }
            }
            if (cnt > 5) {
                x += (dx / cnt) * 0.005; // Hassasiyet ayarı
                y += (dy / cnt) * 0.005;
                document.getElementById('x').innerText = x.toFixed(2);
                document.getElementById('y').innerText = y.toFixed(2);
                document.getElementById('pts').innerText = cnt;
                p1.copyTo(p0);
            } else {
                cv.goodFeaturesToTrack(gray, p0, 40, 0.01, 10);
            }
        }
        cv.imshow('c', src);
        gray.copyTo(prev);
        requestAnimationFrame(p);
    }
    p();
}
</script>
</body>
</html>
