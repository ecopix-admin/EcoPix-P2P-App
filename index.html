<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Görən Göz - Mars Portal</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        .ui { position: absolute; bottom: 40px; width: 100%; text-align: center; z-index: 999; }
        button { padding: 15px 35px; font-size: 18px; background: #ff4500; color: #fff; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="ui">
        <button onclick="startExperience()">PORTALI QUR</button>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false">
        <a-assets>
            <img id="mars-360" src="https://raw.githubusercontent.com/aframevr/aframe/master/examples/boilerplate/panorama/puydesancy.jpg">
        </a-assets>

        <a-sky id="world" src="#mars-360" visible="false" rotation="0 -90 0"></a-sky>

        <a-entity id="rig" position="0 1.6 0">
            <a-camera id="cam" look-controls="enabled: true; magicWindowTrackingEnabled: true" wasd-controls-enabled="false">
                <a-cursor color="#FF4500"></a-cursor>
            </a-camera>
        </a-entity>
    </a-scene>

    <script>
        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ru-RU';
            window.speechSynthesis.speak(msg);
        }

        function startExperience() {
            // Dünyanı görünən edirik
            const world = document.getElementById('world');
            world.setAttribute('visible', 'true');
            
            // Səsli təlimat
            speak("Добро пожаловать на Марс. Поворачивайте телефон вокруг себя, чтобы увидеть всю планету.");
            
            // Avtomatik fırlanma animasiyası (əgər sensor işləməsə belə hərəkət olsun)
            let rot = 0;
            setInterval(() => {
                rot += 0.1;
                world.setAttribute('rotation', `0 ${rot} 0`);
            }, 20);

            alert("Portal açıldı! İndi telefonu ətrafınızda 360 dərəcə çevirin.");
        }
    </script>
</body>
</html>
