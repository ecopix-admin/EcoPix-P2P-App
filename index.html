<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAM-CELL: Azad Şəbəkə</title>
    <style>
        body {
            background-color: #121212;
            color: #00FF00;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        h1 { font-size: 26px; margin-bottom: 20px; }
        input {
            width: 300px;
            padding: 15px;
            background: #1e1e1e;
            border: 1px solid #333;
            color: white;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        button {
            width: 330px;
            padding: 15px;
            margin: 5px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            text-transform: uppercase;
        }
        .btn-send { background-color: #1E88E5; color: white; }
        .btn-call { background-color: #E53935; color: white; }
        .btn-media { background-color: #43A047; color: white; }
        #status { color: #888; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <h1>SHAM-CELL: AZAD ŞƏBƏKƏ</h1>
    
    <input type="text" id="msgInput" placeholder="Mesaj yazın...">
    
    <button class="btn-send" onclick="sendData()">Göyə Göndər (Mesaj)</button>
    <button class="btn-call" onclick="startCall()">İonosfer Zəngi</button>
    <button class="btn-media" onclick="sendMedia()">Foto/Video Ötürücü</button>

    <p id="status">Status: Sistem Hazırdır</p>

    <script>
        // DAXİLİ ŞİFRƏLƏMƏ (Eynilə sənin Kotlin kodundakı məntiq)
        function xorEncrypt(text) {
            const key = "SHAMXAL_KEY_2026";
            let output = "";
            for (let i = 0; i < text.length; i++) {
                output += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return btoa(output); // Radio dalğası üçün Base64 formatına salırıq
        }

        function sendData() {
            const msg = document.getElementById('msgInput').value;
            if (msg) {
                const encrypted = xorEncrypt(msg);
                console.log("Radio Paketi Hazırdır: SHAM_PROT_V1_" + encrypted);
                alert("Mesaj İonosferə buraxıldı: " + encrypted);
                document.getElementById('msgInput').value = "";
                document.getElementById('status').innerText = "Status: Mesaj Göndərildi";
            }
        }

        function startCall() {
            alert("İnternetsiz və Azad Zəng Aktivdir!");
            document.getElementById('status').innerText = "Status: Zəng Davam Edir...";
        }

        function sendMedia() {
            alert("Media paketi göyə atəşləndi!");
        }
    </script>
</body>
</html>
