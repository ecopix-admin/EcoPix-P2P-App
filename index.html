<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green-Eye: Bitki Analizatoru</title>
    <style>
        body { margin: 0; background: #121212; color: #4caf50; font-family: sans-serif; text-align: center; }
        canvas { width: 90%; max-width: 500px; border-radius: 15px; border: 2px solid #4caf50; margin-top: 10px; }
        .info-box { background: #1e1e1e; margin: 15px; padding: 15px; border-radius: 10px; border-left: 5px solid #4caf50; }
        button { background: #4caf50; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 50px; cursor: pointer; margin: 10px; }
        #status { font-weight: bold; font-size: 1.2rem; }
        video { display: none; }
    </style>
</head>
<body>

    <h1>🌿 GREEN-EYE v1.0</h1>
    <p>Bitki yarpağını kameraya yaxınlaşdırın</p>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="info-box">
        <div id="status">Analiz gözlənilir...</div>
        <div id="details">Sağlamlıq İndeksi: -</div>
    </div>

    <button onclick="analyzePlant()">ANALİZ ET</button>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // Kameranı başlat
        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        }

        function analyzePlant() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = frame.data;
            let totalGreen = 0;
            let totalRed = 0;

            // Piksel analizi: NDVI (Basit versiya: (G-R)/(G+R))
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];

                totalGreen += g;
                totalRed += r;

                // Ekranda vizual olaraq sağlam olmayan hissələri işarələ (Sarımtıl hissələr)
                if (r > g * 0.8) {
                    data[i] = 255; // Qırmızı (Problem zonası)
                    data[i + 1] = 0;
                    data[i + 2] = 0;
                }
            }

            ctx.putImageData(frame, 0, 0);

            const healthIndex = (totalGreen - totalRed) / (totalGreen + totalRed);
            displayResult(healthIndex);
        }

        function displayResult(index) {
            const statusDiv = document.getElementById('status');
            const detailDiv = document.getElementById('details');
            
            let result = "";
            let score = ((index + 1) * 50).toFixed(1); // 0-100 arası bal

            if (index > 0.1) {
                result = "✅ BİTKİ SAĞLAMDIR";
                statusDiv.style.color = "#4caf50";
            } else if (index > 0) {
                result = "⚠️ DİQQƏT: STRES BAŞLAYIR";
                statusDiv.style.color = "#ffeb3b";
            } else {
                result = "🚨 TƏHLÜKƏ: XƏSTƏLİK VƏ YA SUSUZLUQ";
                statusDiv.style.color = "#f44336";
            }

            statusDiv.innerText = result;
            detailDiv.innerText = "Sağlamlıq Balı: " + score + "%";
        }

        startCamera();
    </script>
</body>
</html>
