<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoPix Ultra Pro v8</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #075E54; --secondary: #128C7E; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header & Tabs */
        .app-header { background: var(--primary); color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .tabs { background: var(--primary); display: flex; text-align: center; }
        .tab { flex: 1; padding: 14px; color: rgba(255,255,255,0.6); font-weight: bold; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab.active { color: white; border-bottom-color: white; }

        .screen { display: none; flex: 1; overflow-y: auto; background: var(--white); height: calc(100vh - 110px); }
        .screen.active { display: block; }
        .list-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; margin-right: 15px; background: #ddd; object-fit: cover; }

        /* Chat */
        #chat-screen { position: fixed; inset: 0; background: #e5ddd5; z-index: 2000; display: none; flex-direction: column; }
        .msg-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-8e1d-60400d46e936.png'); }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 75%; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg.sent { align-self: flex-end; background: #dcf8c6; }
        .msg.received { align-self: flex-start; background: white; }
        .input-bar { background: #f0f0f0; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .input-bar input { flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none; }

        /* ZƏNG EKRANI - YENİ PANEL DİZAYNI */
        #call-screen { position: fixed; inset: 0; background: linear-gradient(to bottom, #dbeafe, #93c5fd); z-index: 3000; display: none; flex-direction: column; color: #1e3a8a; }
        
        .call-info { text-align: center; margin-top: 80px; }
        .call-status { font-size: 14px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 15px; }
        .call-name { font-size: 32px; font-weight: bold; margin: 10px 0; }
        
        .video-wrapper { flex: 1; display: none; position: relative; width: 100%; margin-top: 20px; }
        .video-wrapper video { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; }
        .video-wrapper.active { display: block; }

        .call-panel { background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(15px); width: 90%; align-self: center; border-radius: 30px; padding: 25px 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .panel-btn { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; background: none; border: none; color: #1e3a8a; transition: 0.2s; }
        .panel-btn i { width: 55px; height: 55px; background: rgba(255,255,255,0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .panel-btn.active i { background: #3b82f6; color: white; }
        .panel-btn span { font-size: 12px; font-weight: 500; }
        
        .hangup-btn { grid-column: span 3; display: flex; justify-content: center; margin-top: 10px; }
        .btn-red { width: 75px; height: 75px; background: #ef4444; color: white; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; transform: rotate(135deg); box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); }
        .btn-green { background: #22c55e; transform: rotate(0deg); box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4); }

        .fab { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--secondary); color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 24px; z-index: 50; }
    </style>
</head>
<body>

    <audio id="snd-msg" src="https://cdn.pixabay.com/audio/2022/03/15/audio_7315cc6690.mp3"></audio> 
    <audio id="snd-ring" loop src="https://www.soundjay.com/phone/phone-calling-1.mp3"></audio> 
    <audio id="snd-qudok" loop src="https://www.soundjay.com/phone/telephone-ring-03a.mp3"></audio> 

    <div class="app-header">
        <i class="fas fa-qrcode" onclick="toggleQR(true)"></i>
        <b>EcoPix Ultra Pro</b>
        <div id="my-id-display" style="font-size: 11px;">AZ-....</div>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('chats')">SÖHBƏTLƏR</div>
        <div class="tab" onclick="switchTab('contacts')">KONTAKTLAR</div>
        <div class="tab" onclick="switchTab('history')">TARİXÇƏ</div>
    </div>

    <div id="chats" class="screen active"></div>
    <div id="contacts" class="screen"></div>
    <div id="history" class="screen"></div>

    <div id="main-fab" class="fab" onclick="addContact()"><i class="fas fa-plus"></i></div>

    <div id="chat-screen">
        <div class="app-header" style="background:var(--secondary)">
            <div style="display:flex; align-items:center; flex:1;">
                <i class="fas fa-arrow-left" onclick="closeChat()" style="margin-right:15px; padding:10px;"></i>
                <img id="active-avatar" src="" class="avatar" style="width:35px; height:35px;">
                <b id="active-name">...</b>
            </div>
            <div style="display:flex; gap:20px;">
                <i class="fas fa-video" onclick="initCall(true)"></i>
                <i class="fas fa-phone-alt" onclick="initCall(false)"></i>
            </div>
        </div>
        <div class="msg-box" id="msg-render"></div>
        <div class="input-bar">
            <input type="text" id="msg-input" placeholder="Mesaj yazın...">
            <i class="fas fa-paper-plane" onclick="sendData()" style="color:var(--secondary); font-size:22px;"></i>
        </div>
    </div>

    <div id="call-screen">
        <div class="call-info">
            <div class="call-status">
                <i class="fas fa-shield-alt"></i> Zəng edilir...
            </div>
            <h1 class="call-name" id="call-partner-name">Sənan Ss 99</h1>
            <div id="call-timer" style="font-weight: 500; opacity: 0.8;">00:00</div>
        </div>

        <div class="video-wrapper" id="video-box">
            <video id="remote-video" autoplay playsinline></video>
        </div>

        <div class="call-panel">
            <button class="panel-btn"><i class="fas fa-plus"></i><span>Zəng əlavə edin</span></button>
            <button class="panel-btn" onclick="toggleHold(this)"><i class="fas fa-pause"></i><span>Zəngi saxla</span></button>
            <button class="panel-btn"><i class="fab fa-bluetooth-b"></i><span>Bluetooth</span></button>
            
            <button class="panel-btn" onclick="toggleSpeaker(this)"><i class="fas fa-volume-up"></i><span>Dinamik</span></button>
            <button class="panel-btn" onclick="toggleMute(this)"><i class="fas fa-microphone-slash"></i><span>Səssiz</span></button>
            <button class="panel-btn"><i class="fas fa-th"></i><span>Klaviatura</span></button>

            <div class="hangup-btn">
                <button id="btn-answer" class="btn-red btn-green" style="display:none; margin-right:20px;" onclick="acceptCall()">
                    <i class="fas fa-phone"></i>
                </button>
                <button class="btn-red" onclick="endCall()">
                    <i class="fas fa-phone"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="qr-modal" onclick="toggleQR(false)" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:4000; display:none; align-items:center; justify-content:center;">
        <div id="qrcode" style="background:white; padding:20px; border-radius:15px;"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCtrVliO1bmdg7r0juWz-Yj2EaEGNsz2j8", databaseURL: "https://ecopix-118c6-default-rtdb.europe-west1.firebasedatabase.app", projectId: "ecopix-118c6" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myID = localStorage.getItem('eco_id') || "AZ-" + Math.floor(1000 + Math.random()*9000);
        localStorage.setItem('eco_id', myID);
        document.getElementById('my-id-display').innerText = myID;
        new QRCode(document.getElementById("qrcode"), { text: myID, width: 200, height: 200 });

        const peer = new Peer(myID);
        let activePeer, activeCall, localStream, callInt;

        function switchTab(t) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.target.classList.add('active');
            document.getElementById('main-fab').style.display = (t === 'contacts') ? 'flex' : 'none';
            if(t === 'contacts') renderContacts();
            if(t === 'chats') renderRecent();
        }

        function openChat(id, name) {
            activePeer = id;
            document.getElementById('active-name').innerText = name;
            document.getElementById('active-avatar').src = `https://ui-avatars.com/api/?name=${name}&background=random`;
            document.getElementById('chat-screen').style.display = 'flex';
            loadMessages();
        }

        function closeChat() { document.getElementById('chat-screen').style.display = 'none'; }

        // Mesajlaşma
        function sendData() {
            const input = document.getElementById('msg-input');
            if(!input.value) return;
            const chatKey = [myID, activePeer].sort().join('_');
            const packet = { s: myID, t: input.value, ts: Date.now(), time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
            db.ref('msgs/' + chatKey).push(packet);
            db.ref(`recent/${myID}/${activePeer}`).set({ name: document.getElementById('active-name').innerText, last: input.value, time: packet.time });
            db.ref(`recent/${activePeer}/${myID}`).set({ name: "İstifadəçi "+myID, last: input.value, time: packet.time });
            input.value = "";
        }

        function loadMessages() {
            const chatKey = [myID, activePeer].sort().join('_');
            db.ref('msgs/' + chatKey).on('value', snap => {
                const box = document.getElementById('msg-render'); box.innerHTML = "";
                snap.forEach(m => {
                    const d = m.val(); const side = d.s === myID ? 'sent' : 'received';
                    box.innerHTML += `<div class="msg ${side}">${d.t}<br><small style="font-size:9px; opacity:0.6;">${d.time}</small></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // ZƏNG FUNKSİYALARI
        function initCall(isVideo) {
            document.getElementById('call-partner-name').innerText = document.getElementById('active-name').innerText;
            document.getElementById('call-screen').style.display = 'flex';
            document.getElementById('snd-qudok').play();

            navigator.mediaDevices.getUserMedia({video: isVideo, audio: true}).then(stream => {
                localStream = stream;
                if(isVideo) {
                    document.getElementById('video-box').classList.add('active');
                }
                activeCall = peer.call(activePeer, stream, { metadata: { video: isVideo } });
                handleCall(activeCall);
            });
        }

        peer.on('call', call => {
            activeCall = call;
            document.getElementById('call-partner-name').innerText = "Gələn zəng: " + call.peer;
            document.getElementById('call-screen').style.display = 'flex';
            document.getElementById('btn-answer').style.display = 'flex';
            document.getElementById('snd-ring').play();
        });

        function acceptCall() {
            const isVideo = activeCall.metadata.video;
            navigator.mediaDevices.getUserMedia({video: isVideo, audio: true}).then(stream => {
                localStream = stream;
                activeCall.answer(stream);
                document.getElementById('snd-ring').pause();
                document.getElementById('btn-answer').style.display = 'none';
                if(isVideo) document.getElementById('video-box').classList.add('active');
                handleCall(activeCall);
            });
        }

        function handleCall(call) {
            call.on('stream', remoteStream => {
                document.getElementById('snd-qudok').pause();
                document.getElementById('remote-video').srcObject = remoteStream;
                startTimer();
            });
            call.on('close', endCall);
        }

        // Düymə Funksiyaları
        function toggleMute(btn) {
            const enabled = localStream.getAudioTracks()[0].enabled;
            localStream.getAudioTracks()[0].enabled = !enabled;
            btn.classList.toggle('active');
        }

        function toggleSpeaker(btn) {
            // Brauzerlərdə audio output dəyişmək mürəkkəbdir, vizual olaraq aktiv edilir
            btn.classList.toggle('active');
        }

        function toggleHold(btn) {
            btn.classList.toggle('active');
        }

        function endCall() {
            if(activeCall) activeCall.close();
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            document.getElementById('call-screen').style.display = 'none';
            document.getElementById('snd-qudok').pause();
            document.getElementById('snd-ring').pause();
            document.getElementById('video-box').classList.remove('active');
            clearInterval(callInt);
            document.getElementById('call-timer').innerText = "00:00";
        }

        function startTimer() {
            let s = 0;
            callInt = setInterval(() => {
                s++;
                let m = Math.floor(s/60);
                let sec = s%60;
                document.getElementById('call-timer').innerText = `${m<10?'0'+m:m}:${sec<10?'0'+sec:sec}`;
            }, 1000);
        }

        function renderRecent() {
            db.ref(`recent/${myID}`).on('value', snap => {
                const cont = document.getElementById('chats'); cont.innerHTML = "";
                snap.forEach(s => {
                    const d = s.val();
                    cont.innerHTML += `<div class="list-item" onclick="openChat('${s.key}', '${d.name}')">
                        <img src="https://ui-avatars.com/api/?name=${d.name}&background=random" class="avatar">
                        <div style="flex:1;"><b>${d.name}</b><p style="margin:0; font-size:13px; color:#666;">${d.last}</p></div>
                    </div>`;
                });
            });
        }

        function toggleQR(show) { document.getElementById('qr-modal').style.display = show ? 'flex' : 'none'; }
        
        switchTab('chats');
    </script>
</body>
</html>
