<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wire X-Ray Visualizer</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; text-align: center; }
        canvas { display: block; background: #050505; touch-action: none; }
        .ui-overlay { position: absolute; top: 10px; width: 100%; pointer-events: none; }
        #status { font-size: 18px; color: #0f0; text-shadow: 0 0 10px #0f0; }
        .controls { position: absolute; bottom: 20px; width: 100%; }
        button { background: #ff4444; color: #fff; border: none; padding: 15px 40px; font-size: 20px; border-radius: 30px; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>

<div class="ui-overlay">
    <div id="status">Нажмите кнопку для калибровки</div>
    <div style="font-size: 40px; font-weight: bold;" id="valDisplay">0</div>
</div>

<canvas id="heatmapCanvas"></canvas>

<div class="controls">
    <button id="startBtn" onclick="initXRay()">ЗАПУСТИТЬ РЕНТГЕН</button>
</div>

<script>
    const canvas = document.getElementById('heatmapCanvas');
    const ctx = canvas.getContext('2d');
    let baseline = null;
    let isScanning = false;
    let particles = [];

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ru-RU';
        window.speechSynthesis.speak(msg);
    }

    function initXRay() {
        document.getElementById('startBtn').style.display = 'none';
        speak("Приложите телефон к стене и не двигайте три секунды для настройки рентгена.");
        document.getElementById('status').innerText = "НАСТРОЙКА ВИЗУАЛИЗАЦИИ...";
        
        setTimeout(() => {
            startTracking();
        }, 3500);
    }

    function startTracking() {
        if ('Magnetometer' in window) {
            const sensor = new Magnetometer({frequency: 60});
            sensor.addEventListener('reading', () => {
                let mag = Math.sqrt(sensor.x**2 + sensor.y**2 + sensor.z**2);
                process(mag);
            });
            sensor.start();
        } else {
            window.addEventListener('deviceorientationabsolute', (e) => {
                process(e.alpha || 0);
            }, true);
        }
        speak("Система готова. Медленно ведите телефон по стене. Красные пятна укажут на путь провода.");
        document.getElementById('status').innerText = "РЕНТГЕН АКТИВЕН: ИЩИТЕ КРАСНЫЙ СЛЕД";
        isScanning = true;
    }

    function process(val) {
        if (baseline === null) { baseline = val; return; }
        
        let diff = Math.abs(val - baseline);
        document.getElementById('valDisplay').innerText = val.toFixed(0);

        // Vizual iz buraxma (Heatmap məntiqi)
        // Telefonu hərəkət etdirdikcə ekranın mərkəzinə rəngli dairələr çəkir
        let centerX = canvas.width / 2;
        let centerY = canvas.height / 2;
        
        let color;
        if (diff > 40) {
            color = `rgba(255, 0, 0, 0.5)`; // Naqil tapıldı - Qırmızı
            if (Math.random() > 0.9) speak("Обнаружен провод. Двигайтесь по красной линии.");
        } else if (diff > 15) {
            color = `rgba(255, 165, 0, 0.3)`; // Yaxınlaşır - Narıncı
        } else {
            color = `rgba(0, 100, 255, 0.1)`; // Boş yer - Göy
        }

        // Ekrana nöqtə əlavə et
        drawHeatPoint(centerX, centerY, color, diff);
        
        // Fonu yavaşca adaptasiya et
        baseline = (0.01 * val) + (0.99 * baseline);
    }

    function drawHeatPoint(x, y, color, intensity) {
        let size = 20 + (intensity * 0.5);
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        
        // Köhnə izlərin yavaşca solmaması üçün ekranı təmizləmirik, 
        // beləcə "Yol" çəkilmiş olur.
    }
</script>
</body>
</html>
