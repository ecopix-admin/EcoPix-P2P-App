<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Mars Portal - Görən Göz</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .ui-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; text-align: center; width: 100%;
        }
        button {
            padding: 15px 30px; font-size: 18px; background: #ff4500;
            color: white; border: none; border-radius: 50px; font-weight: bold;
        }
        #instruction {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: white; font-family: sans-serif; z-index: 100;
            background: rgba(0,0,0,0.5); padding: 10px 0;
        }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">

    <div id="instruction">Kameranı divara və ya yerə tutun, sonra düyməni basın</div>

    <div class="ui-panel">
        <button onclick="startMission()">PORTALI AÇ</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-assets>
            <img id="mars" src="https://raw.githubusercontent.com/aframevr/aframe/master/examples/boilerplate/panorama/puydesancy.jpg">
        </a-assets>

        <a-marker preset="hiro">
            <a-sphere position="0 0.5 0" radius="1" material="src: #mars; side: double">
                <a-animation attribute="rotation" dur="10000" fill="forwards" to="0 360 0" repeat="indefinite"></a-animation>
            </a-sphere>
            <a-text value="MARS DÜNYASI" color="#ff4500" position="-0.5 1.8 0" scale="1.5 1.5 1.5"></a-text>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ru-RU';
            window.speechSynthesis.speak(msg);
        }

        function startMission() {
            speak("Добро пожаловать в систему порталов. Камера активирована. Ищите вход на Марс.");
            document.getElementById('instruction').innerText = "ПОРТАЛ ИЩЕТ ТОЧКУ ВХОДА...";
        }
        
        // Kamera icazəsi yoxlanışı
        window.addEventListener('camera-error', (error) => {
            alert("Kamera xətası: Zəhmət olmasa ayarlardan kameraya icazə verin.");
        });
    </script>
</body>
</html>
