<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecopix Revolution Pro v15</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon-red: #ff0055; --neon-green: #00ff41; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; overflow: hidden; height: 100vh; }

        header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; background: #050505; z-index: 1001; position: relative; }
        .my-id-tag { color: var(--neon-green); font-weight: bold; border: 1px solid var(--neon-green); padding: 4px 10px; border-radius: 6px; font-size: 14px; background: rgba(0,255,65,0.1); }

        #mute-hint { position: fixed; top: 60px; width: 100%; text-align: center; color: var(--neon-red); z-index: 2000; font-weight: bold; font-size: 12px; animation: blink 1.2s infinite; pointer-events: none; }
        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0;} }

        .screen { display: none; height: calc(100vh - 130px); overflow-y: auto; position: relative; padding-bottom: 80px; }
        .screen.active { display: block; }

        /* TV */
        #tv-screen { overflow-y: scroll; scroll-snap-type: y mandatory; }
        .tv-slide { height: calc(100vh - 130px); width: 100vw; scroll-snap-align: start; position: relative; background: #111; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Contacts & Chats */
        .list-item { display: flex; align-items: center; padding: 18px 15px; border-bottom: 1px solid #151515; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--neon-red); margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; }
        
        /* Floating Button - Yuxarı çəkildi */
        .fab { position: fixed; bottom: 90px; right: 25px; width: 60px; height: 60px; background: var(--neon-green); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,255,65,0.4); z-index: 999; }

        /* Nav Bar */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 75px; background: #050505; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { text-align: center; color: #666; font-size: 11px; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 5px; }

        /* Real Chat Modal */
        #chat-modal { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; }
        #chat-header { padding: 15px; background: #080808; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; }
        .call-icons { margin-left: auto; display: flex; gap: 20px; font-size: 20px; color: var(--neon-green); }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .m-box { padding: 10px 14px; border-radius: 12px; max-width: 75%; word-wrap: break-word; font-size: 15px; }
        .sent { align-self: flex-end; background: var(--neon-green); color: black; }
        .rec { align-self: flex-start; background: #222; color: white; }
        .input-wrap { padding: 15px; display: flex; gap: 10px; background: #080808; border-top: 1px solid #222; }
        .input-wrap input { flex: 1; padding: 12px; background: #151515; border: 1px solid #333; color: white; border-radius: 8px; }

        /* Call UI */
        #call-ui { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; }
        video { width: 100%; height: 50%; object-fit: cover; background: #000; }
    </style>
</head>
<body onclick="document.getElementById('mute-hint').style.display='none'">

    <div id="mute-hint">Səsi aktiv etmək üçün ekrana toxunun!</div>

    <header>
        <span style="color:var(--neon-red); font-weight: 900; font-size: 20px;">ECOPIX</span>
        <div class="my-id-tag" id="display-my-id">...</div>
    </header>

    <div id="tv-screen" class="screen active"></div>
    <div id="chat-screen" class="screen"><div id="chat-threads"></div></div>
    <div id="history-screen" class="screen"><div id="history-list"></div></div>
    <div id="contact-screen" class="screen"><div id="contact-list"></div></div>

    <div class="fab" onclick="addContact()"><i class="fas fa-plus"></i></div>

    <div id="chat-modal">
        <div id="chat-header">
            <i class="fas fa-arrow-left" onclick="closeChat()"></i>
            <span id="chat-title" style="font-weight: bold;">Ad</span>
            <div class="call-icons">
                <i class="fas fa-phone" onclick="startCall('voice')"></i>
                <i class="fas fa-video" onclick="startCall('video')"></i>
            </div>
        </div>
        <div id="messages"></div>
        <div class="input-wrap">
            <input type="text" id="msgInput" placeholder="Mesaj yazın...">
            <button onclick="sendMsg()" style="background:var(--neon-green); border:none; width:45px; border-radius:8px;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="call-ui">
        <video id="remoteV" autoplay playsinline></video>
        <video id="localV" autoplay playsinline muted></video>
        <div style="height:100px; display:flex; justify-content:center; align-items:center; background:#050505;">
            <div onclick="endCall()" style="width:65px; height:65px; background:red; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:25px;"><i class="fas fa-phone-slash"></i></div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="tab('tv-screen', this)"><i class="fas fa-tv"></i>TV</div>
        <div class="nav-item" onclick="tab('chat-screen', this)"><i class="fas fa-comments"></i>ÇAT</div>
        <div class="nav-item" onclick="tab('history-screen', this)"><i class="fas fa-clock"></i>TARİX</div>
        <div class="nav-item" onclick="tab('contact-screen', this)"><i class="fas fa-user-friends"></i>DOSTLAR</div>
    </nav>

    <script>
        // 1. ID SİSTEMİ
        let myID = localStorage.getItem('eco_id') || 'AZ-' + Math.floor(100000 + Math.random()*900000);
        localStorage.setItem('eco_id', myID);
        document.getElementById('display-my-id').innerText = myID;

        // 2. PEERJS
        const peer = new Peer(myID);
        let activeConn, activeCall, targetID;

        peer.on('connection', conn => {
            activeConn = conn;
            conn.on('data', data => { showMsg(data, 'rec'); openChat(conn.metadata.name, conn.peer); });
        });

        peer.on('call', call => {
            if(confirm("Gələn zəng! Cavab verilsin?")) {
                navigator.mediaDevices.getUserMedia({video:true, audio:true}).then(s => {
                    document.getElementById('call-ui').style.display='flex';
                    document.getElementById('localV').srcObject=s;
                    call.answer(s);
                    call.on('stream', rs => document.getElementById('remoteV').srcObject=rs);
                    activeCall = call;
                });
            }
        });

        // 3. KANALLAR (Genişləndirilmiş)
        const channels = [
            {n:"ARB TV", u:"https://www.youtube.com/embed/live_stream?channel=UCitD_LhZzIq_v4pS_u7C3-g&autoplay=1"},
            {n:"Xəzər TV", u:"https://www.youtube.com/embed/live_stream?channel=UC8XvP-TIs9p2Ube_Z_ZInyA&autoplay=1"},
            {n:"TRT Haber", u:"https://www.youtube.com/embed/live_stream?channel=UC8sc805VLlp9pLxy9J9N4_Q&autoplay=1"},
            {n:"Kanal D", u:"https://www.youtube.com/embed/live_stream?channel=UCpP7TfS8pA0A1X4r_9yD07A&autoplay=1"},
            {n:"Star TV", u:"https://www.youtube.com/embed/live_stream?channel=UC6_S7LpXfR0Xf6lX9YwH-0w&autoplay=1"}
        ];

        function renderTV() {
            document.getElementById('tv-screen').innerHTML = channels.map(c => `
                <div class="tv-slide">
                    <iframe src="${c.u}" allow="autoplay; encrypted-media"></iframe>
                    <div style="position:absolute; bottom:20px; left:20px; background:rgba(0,0,0,0.6); padding:5px 15px; border-radius:5px;">${c.n}</div>
                </div>
            `).join('');
        }

        // 4. LOGİKA
        function tab(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        function openChat(name, id) {
            targetID = id;
            document.getElementById('chat-title').innerText = name;
            document.getElementById('chat-modal').style.display = 'flex';
            if(!activeConn || activeConn.peer !== id) {
                activeConn = peer.connect(id, {metadata: {name: "İstifadəçi"}});
            }
        }

        function closeChat() { document.getElementById('chat-modal').style.display = 'none'; }

        function sendMsg() {
            const val = document.getElementById('msgInput').value;
            if(val && activeConn) {
                activeConn.send(val);
                showMsg(val, 'sent');
                document.getElementById('msgInput').value = '';
            }
        }

        function showMsg(txt, type) {
            const div = document.createElement('div');
            div.className = `m-box ${type}`;
            div.innerText = txt;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 9999;
        }

        function startCall(type) {
            navigator.mediaDevices.getUserMedia({video: type==='video', audio:true}).then(s => {
                document.getElementById('call-ui').style.display = 'flex';
                document.getElementById('localV').srcObject = s;
                const call = peer.call(targetID, s);
                call.on('stream', rs => document.getElementById('remoteV').srcObject = rs);
                activeCall = call;
            });
        }

        function endCall() { 
            if(activeCall) activeCall.close(); 
            location.reload(); 
        }

        function addContact() {
            const n = prompt("Ad:");
            const i = prompt("ID (AZ-XXXXXX):");
            if(n && i) {
                let list = JSON.parse(localStorage.getItem('eco_contacts')) || [];
                list.push({n, i});
                localStorage.setItem('eco_contacts', JSON.stringify(list));
                renderContacts();
            }
        }

        function renderContacts() {
            const list = JSON.parse(localStorage.getItem('eco_contacts')) || [];
            document.getElementById('contact-list').innerHTML = list.map(c => `
                <div class="list-item" onclick="openChat('${c.n}', '${c.i}')">
                    <div class="avatar">${c.n[0]}</div>
                    <div style="flex:1"><b>${c.n}</b><p style="font-size:12px; color:#777;">${c.i}</p></div>
                    <i class="fas fa-comment" style="color:var(--neon-green)"></i>
                </div>
            `).join('');
        }

        renderTV();
        renderContacts();
    </script>
</body>
</html>
