<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Səs-Görüntü Sintezi (Acoustic Vision)</title>
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: monospace; }
        canvas { display: block; filter: contrast(150%) brightness(120%); }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; }
        button { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 30px; 
                 background: transparent; border: 2px solid #fff; color: #fff; cursor: pointer; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui">SİSTEM: AKUSTİK GÖRÜNTÜ ÖTÜRÜCÜSÜ AKTİVDİR...</div>
    <button id="start">GÖRÜNTÜNÜ AÇ</button>
    <canvas id="screen"></canvas>

    <script>
        const canvas = document.getElementById('screen');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('start');

        btn.onclick = () => {
            btn.style.display = 'none';
            initVision();
        };

        async function initVision() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new AudioContext();
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            
            analyser.fftSize = 512;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Piksellərdən ibarət "tor" (mesh) yaradırıq
            const cols = 40;
            const rows = 40;
            const cellW = canvas.width / cols;
            const cellH = canvas.height / rows;

            function render() {
                requestAnimationFrame(render);
                analyser.getByteFrequencyData(dataArray);

                // Ekranı yavaş silərək "kamera kadrı" effekti veririk
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (let i = 0; i < cols; i++) {
                    for (let j = 0; j < rows; j++) {
                        // Səs dalğasının müxtəlif tezlikləri hər bir pikselə təsir edir
                        const freqIdx = (i + j) % dataArray.length;
                        const v = dataArray[freqIdx];
                        
                        if (v > 50) {
                            const opacity = v / 255;
                            const size = (v / 255) * cellW * 1.5;
                            
                            // Rəng sxemi: İnsan səsi (yaşıl/mavi), ağır səslər (qırmızı/ağ)
                            const r = v > 150 ? 255 : 50;
                            const g = v > 100 ? v : 0;
                            const b = 255 - v;

                            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${opacity})`;
                            
                            // "Kamera pikselləri" formasında görüntünü yığırıq
                            ctx.beginPath();
                            ctx.arc(i * cellW + cellW/2, j * cellH + cellH/2, size, 0, Math.PI * 2);
                            ctx.fill();

                            // Səs çox güclüdürsə (obyekt yaxındırsa), pikselləri birləşdir
                            if (v > 180) {
                                ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                                ctx.lineWidth = 0.5;
                                ctx.strokeRect(i * cellW, j * cellH, cellW, cellH);
                            }
                        }
                    }
                }
            }
            render();
        }
    </script>
</body>
</html>
