<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloStrings Ultra | Professional Hybrid</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; overflow: hidden; touch-action: none; font-family: 'Inter', sans-serif; }
        canvas { transform: scaleX(-1); border-radius: 20px; width: 100vw; height: 100vh; object-fit: cover; }
        video { display: none; }
        .string-line { position: absolute; height: 2px; background: rgba(96, 165, 250, 0.4); width: 100%; box-shadow: 0 0 15px #3b82f6; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui" class="absolute top-10 left-1/2 -translate-x-1/2 z-50 text-center">
        <h1 class="text-3xl font-black text-white italic tracking-tighter">HOLO<span class="text-blue-500">STRINGS</span></h1>
        <p class="text-blue-400 font-mono text-[10px] uppercase tracking-[0.4em]">Multi-Finger Precision v8.0</p>
    </div>

    <canvas id="output_canvas"></canvas>

    <div id="overlay" class="absolute inset-0 bg-slate-950 flex flex-col items-center justify-center z-[100]">
        <button id="startBtn" class="bg-blue-600 px-12 py-6 rounded-3xl font-black text-2xl text-white shadow-2xl shadow-blue-500/50 active:scale-95 transition-all">SİSTEMİ AKTİVLƏŞDİR</button>
        <p class="text-slate-500 mt-4 italic">3 metrədən barmaqlarını hazırla</p>
    </div>

    <script>
        const canvasElement = document.getElementById('output_canvas');
        const ctx = canvasElement.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay');

        let audioCtx;
        let lastFret = 0;
        let prevRightY = 0;

        // Tar/Gitar simlərinin tezlikləri
        const frets = [196.00, 220.00, 246.94, 261.63, 293.66, 329.63]; // G, A, B, C, D, E

        startBtn.onclick = () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            overlay.style.display = 'none';
        };

        function playString(freq, volume) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sawtooth'; // Tar/Gitar üçün daha kəskin səs
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            // Rezonans effekti
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.8);
        }

        function onResults(results) {
            ctx.save();
            ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            ctx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                results.multiHandLandmarks.forEach((landmarks, idx) => {
                    const isRightHand = results.multiHandedness[idx].label === 'Right';
                    
                    // SOL ƏL: Notu (Pərdəni) Müəyyən edir
                    if (!isRightHand) {
                        const indexTip = landmarks[8];
                        // Ekranı 6 hissəyə bölürük (Tar pərdələri kimi)
                        lastFret = Math.floor(indexTip.y * 6);
                    }

                    // SAĞ ƏL: Mizrab (Vuruş) Funkisiyası
                    if (isRightHand) {
                        const wrist = landmarks[0];
                        const velocity = wrist.y - prevRightY;
                        prevRightY = wrist.y;

                        // Əgər sürətli bir "vuruş" varsa
                        if (Math.abs(velocity) > 0.04) {
                            playString(frets[lastFret] || 196, Math.min(Math.abs(velocity) * 20, 1));
                        }
                    }

                    // Barmaq izləmə vizualı (Profesional Markerlər)
                    landmarks.forEach(point => {
                        ctx.fillStyle = isRightHand ? "#ef4444" : "#3b82f6";
                        ctx.beginPath();
                        ctx.arc(point.x * canvasElement.width, point.y * canvasElement.height, 4, 0, 2*Math.PI);
                        ctx.fill();
                    });
                });
            }

            // Simləri çək (Görünürlük üçün)
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.lineWidth = 1;
            for(let i=1; i<6; i++) {
                ctx.beginPath();
                ctx.moveTo(0, (i/6) * canvasElement.height);
                ctx.lineTo(canvasElement.width, (i/6) * canvasElement.height);
                ctx.stroke();
            }

            ctx.restore();
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
        hands.onResults(onResults);

        const camera = new Camera(document.createElement('video'), {
            onFrame: async () => {
                canvasElement.width = window.innerWidth;
                canvasElement.height = window.innerHeight;
                await hands.send({image: canvasElement});
            },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
