<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloOrchestra Ultra | High-Speed Tracking</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; overflow: hidden; touch-action: none; font-family: 'Inter', sans-serif; }
        #canvas-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { transform: scaleX(-1); border-radius: 24px; border: 2px solid rgba(255,255,255,0.1); width: 95%; max-height: 85vh; object-fit: cover; }
        video { display: none; }
        
        .instrument {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            border: 4px solid rgba(59, 130, 246, 0.3);
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(8px);
            transition: all 0.05s cubic-bezier(0, 0, 0.2, 1);
            pointer-events: none;
            z-index: 10;
        }
        .hit-active { transform: scale(1.15); border-color: #60a5fa; background: rgba(59, 130, 246, 0.6); box-shadow: 0 0 40px #3b82f6; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div class="absolute top-6 flex gap-4 z-50">
            <div class="bg-black/60 backdrop-blur-md px-4 py-2 rounded-xl border border-white/10 flex items-center gap-2">
                <div id="status-led" class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] text-white font-mono uppercase">Engine: V8-Spatial</span>
            </div>
        </div>

        <canvas id="output_canvas"></canvas>

        <div id="drum-1" class="instrument w-44 h-44 left-[15%] top-[25%] border-red-500/30">NAĞARA</div>
        <div id="drum-2" class="instrument w-52 h-52 left-[40%] bottom-[12%] border-emerald-500/30">BAS NAĞARA</div>
        <div id="drum-3" class="instrument w-44 h-44 right-[15%] top-[25%] border-yellow-500/30">TARELKA</div>

        <div id="overlay" class="absolute inset-0 bg-slate-950/95 flex flex-col items-center justify-center z-[100]">
            <div class="mb-10 text-center">
                <h1 class="text-6xl font-black text-white italic mb-2 tracking-tighter">ULTRA<span class="text-blue-500 font-normal">SONIC</span></h1>
                <p class="text-blue-400 font-mono text-sm uppercase tracking-[0.3em]">Air-Drum Motion System</p>
            </div>
            <button id="startBtn" class="group relative px-12 py-6 bg-blue-600 rounded-2xl transition-all hover:bg-blue-500 active:scale-95 shadow-2xl shadow-blue-500/40">
                <span class="relative text-white font-black text-2xl tracking-widest uppercase">Sistemi Başlat</span>
            </button>
        </div>
    </div>

    <script>
        const videoElement = document.createElement('video');
        const canvasElement = document.getElementById('output_canvas');
        const ctx = canvasElement.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay');
        const led = document.getElementById('status-led');

        let audioCtx;
        let isEngineRunning = false;
        let prevY = [0, 0]; 

        // Alət tənzimləmələri
        const instruments = [
            { id: 'drum-1', xRange: [0.7, 1.0], yRange: [0.1, 0.5], freq: 110, type: 'sine' },
            { id: 'drum-2', xRange: [0.3, 0.7], yRange: [0.6, 1.0], freq: 65, type: 'triangle' },
            { id: 'drum-3', xRange: [0.0, 0.3], yRange: [0.1, 0.5], freq: 900, type: 'square' }
        ];

        // Professional Audio Engine (Oscillator Bank)
        function triggerDrum(freq, type, power) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1, audioCtx.currentTime + 0.08);

            gain.gain.setValueAtTime(power * 0.8, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.12);
        }

        startBtn.onclick = () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isEngineRunning = true;
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
            led.classList.replace('bg-red-500', 'bg-emerald-500');
        };

        function onResults(results) {
            ctx.save();
            ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            ctx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((landmarks, idx) => {
                    const tip = landmarks[8]; // Index finger tip
                    const x = tip.x;
                    const y = tip.y;

                    // Sürət analizi (Zərbənin dəqiqliyi üçün)
                    const velocity = y - prevY[idx];
                    prevY[idx] = y;

                    // Nağara ifası üçün "Sürətli Aşağı Zərbə" (Velocity Threshold)
                    if (velocity > 0.045) { // Bu rəqəm zərbənin həssaslığıdır
                        instruments.forEach(inst => {
                            if (x >= inst.xRange[0] && x <= inst.xRange[1] && 
                                y >= inst.yRange[0] && y <= inst.yRange[1]) {
                                triggerDrum(inst.freq, inst.type, velocity * 15);
                                const el = document.getElementById(inst.id);
                                el.classList.add('hit-active');
                                setTimeout(() => el.classList.remove('hit-active'), 60);
                            }
                        });
                    }

                    // Kursor dizaynı
                    ctx.fillStyle = "#60a5fa";
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "#3b82f6";
                    ctx.beginPath();
                    ctx.arc(x * canvasElement.width, y * canvasElement.height, 8, 0, 2 * Math.PI);
                    ctx.fill();
                });
            }
            ctx.restore();
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ 
            maxNumHands: 2, 
            modelComplexity: 1, // Sürət üçün 1 (Daha sürətli FPS)
            minDetectionConfidence: 0.5, 
            minTrackingConfidence: 0.5 
        });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                await hands.send({image: videoElement});
            },
            width: 1280, height: 720
        });
        camera.start();
    </script>
</body>
</html>
