<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wire Tracker Pro v4.5</title>
    <style>
        body { background: #1a0000; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; transition: background 0.2s; }
        .container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .value-box { font-size: 80px; font-weight: bold; margin: 10px 0; }
        #status { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        button { background: #ff4444; color: white; border: none; padding: 20px 40px; font-size: 20px; border-radius: 50px; cursor: pointer; }
        .safe-mode { background: #001a00 !important; }
        .safe-text { color: #00ff00 !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>WIRE TRACKER v4.5</h2>
    <div id="display" class="value-box">0.0</div>
    <div id="status">Hazırdır</div>
    <p id="info">Skaneri başladın</p>
    <button id="startBtn" onclick="startApp()">BAŞLAT</button>
</div>

<script>
    let audioCtx, oscillator, gainNode;
    let lastValue = 0;
    let currentBaseline = null;
    let isScanning = false;

    function setupAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        oscillator = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        gainNode.gain.value = 0;
        oscillator.start();
    }

    function startApp() {
        setupAudio();
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientationabsolute', handleData, true);
            document.getElementById('startBtn').style.display = 'none';
            isScanning = true;
            document.getElementById('status').innerText = "Skan Edilir...";
        } else {
            alert("Sensor tapılmadı!");
        }
    }

    function handleData(event) {
        if (!isScanning) return;
        
        let heading = event.alpha || event.webkitCompassHeading || 0;
        const display = document.getElementById('display');
        const status = document.getElementById('status');
        const body = document.body;

        // Rəqəmi göstər
        display.innerText = heading.toFixed(1);

        // İlk dəyəri fon kimi götür
        if (currentBaseline === null) {
            currentBaseline = heading;
            return;
        }

        // Maqnit sahəsindəki kəskin fərqi hesabla
        let diff = Math.abs(heading - currentBaseline);
        if (diff > 180) diff = Math.abs(diff - 360);

        // Əgər dərəcə çox oynayırsa (diff > 8 dərəcə) - Naqil tapıldı
        if (diff > 8) {
            body.classList.add('safe-mode');
            display.classList.add('safe-text');
            status.innerText = "NAQİL TAPILDI!";
            
            if (navigator.vibrate) navigator.vibrate(50);
            if (gainNode) {
                oscillator.frequency.value = 200 + (diff * 4);
                gainNode.gain.value = 0.1;
            }
        } else {
            // Əgər rəqəm stabil qalırsa, həmin rəqəmi yeni "fon" (baseline) kimi qəbul et
            // Bu, "hər yerdə yaşıl olma" problemini həll edir
            currentBaseline = (0.1 * heading) + (0.9 * currentBaseline);
            
            body.classList.remove('safe-mode');
            display.classList.remove('safe-text');
            status.innerText = "Skan Edilir...";
            if (gainNode) gainNode.gain.value = 0;
        }
        lastValue = heading;
    }
</script>
</body>
</html>
