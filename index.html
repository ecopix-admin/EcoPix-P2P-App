<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Görən Göz - Virtual & Live</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* UI Elementləri */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .controls { position: absolute; bottom: 30px; width: 100%; text-align: center; pointer-events: auto; }
        
        input { padding: 12px; border-radius: 25px; border: 1px solid #00f2ea; background: rgba(0,0,0,0.6); color: #fff; width: 70%; margin-bottom: 10px; text-align: center; }
        button { padding: 12px 30px; border-radius: 25px; border: none; background: #ff0050; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px #ff0050; }
        
        .top-info { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 0 0 5px #000; pointer-events: auto; }
        .live-tag { background: #ff0050; color: white; padding: 3px 10px; border-radius: 5px; font-weight: bold; animation: blink 1s infinite; }
        
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
    </style>
</head>
<body>

    <div class="overlay">
        <div class="top-info">
            <span class="live-tag">LIVE</span>
            <div id="loc-display" style="margin-top: 5px; font-size: 12px;">Məkan: Nərimanov, Bakı</div>
        </div>

        <div class="controls">
            <input type="text" id="target-coords" value="40.437360, 49.865777" placeholder="Kordinat (Lat, Lng)">
            <br>
            <button onclick="teleport()">MƏKANA DAXIL OL</button>
        </div>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false">
        <a-assets>
            <img id="city-view" src="https://raw.githubusercontent.com/aframevr/aframe/master/examples/boilerplate/panorama/puydesancy.jpg">
        </a-assets>

        <a-sky id="world" src="#city-view" rotation="0 -90 0"></a-sky>
        
        <a-camera look-controls="enabled: true">
            <a-cursor color="#00f2ea"></a-cursor>
        </a-camera>
    </a-scene>

    <script>
        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'az-AZ';
            window.speechSynthesis.speak(msg);
        }

        function teleport() {
            const coords = document.getElementById('target-coords').value;
            const display = document.getElementById('loc-display');
            
            // Səsli təsdiq
            speak("Kordinatlar qəbul edildi. Bakı, Nərimanov ərazisinə virtual giriş edilir. Binaları tanımaq üçün telefonu çevirin.");
            
            display.innerText = "Məkan: " + coords;
            
            // Burada real Google Street View API-dən şəkil çəkmək olar
            // Hələlik mənzərəni "yüklənmiş" kimi simulyasiya edirik
            alert(coords + " kordinatına daxil oldunuz. İndi ətrafa 360 dərəcə baxa bilərsiniz.");
        }

        // Başlanğıcda istifadəçini salamla
        window.onload = () => {
            speak("Görən Göz sisteminə xoş gəlmisiniz. Konum funksiyası aktivdir.");
        };
    </script>
</body>
</html>
