<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Sham-Vision Pro 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #111; color: #0f0; font-family: monospace; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.9); padding: 20px; border: 2px solid #0f0; border-radius: 10px; }
        button { background: #0f0; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="ui">
    <h2>SHAM-VISION PRO</h2>
    <input type="file" id="upload" accept="image/*" style="display:none">
    <button onclick="document.getElementById('upload').click()">Ňě∆ŹKńįL SE√á / SKAN ET</button>
    <div id="status">HazńĪrdńĪr. Obyekti se√ßin.</div>
</div>

<div id="canvas-container"></div>

<script>
    // 1. 3D SAH∆Ź QURULMASI
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // ńįŇüńĪqlandńĪrma
    const light = new THREE.AmbientLight(0xffffff, 1);
    scene.add(light);
    const pointLight = new THREE.PointLight(0xffffff, 1);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    camera.position.z = 5;

    // 2. KONTROLLER (Barmaqla fńĪrlatma, yaxńĪnlaŇüdńĪrma)
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 3. API ńįL∆Ź 3D MODELńįN G∆ŹTńįRńįLM∆ŹSńį (SńįMULYASńįYA)
    document.getElementById('upload').onchange = function(e) {
        document.getElementById('status').innerText = "AI 3D MODEL YARADIR... (G√∂zl…ôyin)";
        
        // Burada normalda API-y…ô (m…ôs…ôl…ôn Meshy.ai) sorńüu gedir.
        // ńįndi biz n√ľmun…ô bir 3D modeli (GLB) y√ľkl…ôyirik:
        const loader = new THREE.GLTFLoader();
        
        // N√úMUN∆Ź: S…ônin serverind…ô olan v…ô ya API-d…ôn g…ôl…ôn 3D fayl
        // loader.load('https://model-url.glb', function(gltf) {
        //    scene.add(gltf.scene);
        //    document.getElementById('status').innerText = "3D SKAN TAMAMLANDI!";
        // });

        // QEYD: H…ôqiqi 3D model √ľ√ß√ľn s…ôn…ô bir 'API KEY' lazńĪmdńĪr.
        alert("Ňě…ôkil y√ľkl…ôndi! ńįndi Cloud AI (Luma/Meshy) bunu emal edir. Bu, h…ôqiqi 3D (.glb) faylńĪdńĪr.");
    };

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
