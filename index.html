<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber-Dash: Neon Runner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #050505;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-wrapper {
            position: relative;
            width: 800px;
            max-width: 100%;
            height: 400px;
            background: linear-gradient(180deg, #0b0b1a 0%, #000 100%);
            border-bottom: 5px solid #00f2ff;
            box-shadow: 0 10px 50px rgba(0, 242, 255, 0.2);
            overflow: hidden;
        }

        canvas { display: block; }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        h1 { color: #00f2ff; text-shadow: 0 0 20px #00f2ff; font-size: 3rem; margin: 0; }
        p { color: #ff0055; letter-spacing: 2px; }

        .btn {
            margin-top: 20px;
            padding: 15px 40px;
            background: transparent;
            color: #00f2ff;
            border: 2px solid #00f2ff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }

        .btn:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 30px #00f2ff;
        }

        #score-board {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 1.5rem;
            color: #00f2ff;
            text-shadow: 0 0 10px #00f2ff;
        }

        .hidden { display: none !important; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<div id="game-wrapper">
    <div id="score-board">XAL: 0</div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="overlay">
        <h1 id="status-title">CYBER-DASH</h1>
        <p id="status-msg">TULLANMAQ ÜÇÜN EKRANA TOXUN VEYA SPACE BAS</p>
        <button class="btn" onclick="initGame()">BAŞLA</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreBoard = document.getElementById('score-board');
    const overlay = document.getElementById('overlay');
    const statusTitle = document.getElementById('status-title');
    const statusMsg = document.getElementById('status-msg');

    canvas.width = 800;
    canvas.height = 400;

    let isPlaying = false;
    let score = 0;
    let gameSpeed = 5;
    let frame = 0;

    // Personaj (Cyber-Square)
    const player = {
        x: 80,
        y: 320,
        w: 40,
        h: 40,
        dy: 0,
        jumpForce: 15,
        gravity: 0.8,
        grounded: false,
        color: '#00f2ff',
        particles: []
    };

    const obstacles = [];

    // İdarəetmə
    function jump() {
        if (player.grounded && isPlaying) {
            player.dy = -player.jumpForce;
            player.grounded = false;
        }
    }

    window.addEventListener('keydown', (e) => { if (e.code === 'Space') jump(); });
    window.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });

    function initGame() {
        isPlaying = true;
        score = 0;
        gameSpeed = 6;
        obstacles.length = 0;
        player.y = 320;
        player.dy = 0;
        overlay.classList.add('hidden');
        animate();
    }

    function spawnObstacle() {
        let type = Math.random() > 0.5 ? 'tall' : 'wide';
        obstacles.push({
            x: canvas.width,
            y: 320,
            w: type === 'wide' ? 60 : 30,
            h: type === 'tall' ? 60 : 40,
            color: '#ff0055'
        });
    }

    function createParticles(x, y, color) {
        for(let i=0; i<10; i++) {
            player.particles.push({
                x: x, y: y,
                dx: (Math.random() - 0.5) * 10,
                dy: (Math.random() - 0.5) * 10,
                life: 20,
                color: color
            });
        }
    }

    function animate() {
        if (!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Fizika
        player.dy += player.gravity;
        player.y += player.dy;

        if (player.y > 320) {
            player.y = 320;
            player.dy = 0;
            player.grounded = true;
        }

        // Personajın çəkilməsi (Gözləri olan robot kvadrat)
        ctx.shadowBlur = 20;
        ctx.shadowColor = player.color;
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.w, player.h);
        
        // Gözlər (Trend dizayn)
        ctx.fillStyle = "#000";
        ctx.fillRect(player.x + 25, player.y + 10, 8, 8); // Sağ göz
        
        // Maneələr
        if (frame % Math.floor(100 / (gameSpeed/5)) === 0) spawnObstacle();

        obstacles.forEach((obs, index) => {
            obs.x -= gameSpeed;
            
            ctx.shadowBlur = 15;
            ctx.shadowColor = obs.color;
            ctx.fillStyle = obs.color;
            ctx.fillRect(obs.x, obs.y - (obs.h - 40), obs.w, obs.h);

            // Toqquşma
            if (player.x < obs.x + obs.w &&
                player.x + player.w > obs.x &&
                player.y < obs.y + 40 &&
                player.y + player.h > obs.y - (obs.h - 40)) {
                endGame();
            }

            if (obs.x + obs.w < 0) {
                obstacles.splice(index, 1);
                score++;
                gameSpeed += 0.1;
                scoreBoard.innerText = `XAL: ${score}`;
            }
        });

        // Particle effect (Toz)
        player.particles.forEach((p, i) => {
            p.x += p.dx;
            p.y += p.dy;
            p.life--;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 4, 4);
            if(p.life <= 0) player.particles.splice(i, 1);
        });

        frame++;
        requestAnimationFrame(animate);
    }

    function endGame() {
        isPlaying = false;
        statusTitle.innerText = "SİSTEM ÇÖKDÜ!";
        statusMsg.innerHTML = `MƏSAFƏ: ${score}M <br> ENERJİ TÜKƏNDİ.`;
        overlay.classList.remove('hidden');
    }
</script>
</body>
</html>
