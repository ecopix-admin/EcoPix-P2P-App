<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AirPiano Extreme v5.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; touch-action: none; overflow: hidden; }
        #app-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-col items-center; justify-content: center; }
        
        /* Kamera sahəsi - Tək görüntü, sürətli render */
        #canvas-wrapper { position: relative; width: 95%; max-width: 900px; aspect-ratio: 16/9; border-radius: 1.5rem; overflow: hidden; background: #000; border: 2px solid #334155; }
        canvas { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }
        video { display: none; } /* Aşağıdakı kameranı tamamilə ləğv etdik */

        /* Professional Piano Düymələri */
        #piano-board { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 35%; 
            display: flex; gap: 2px; padding: 5px; transform: scaleX(-1); z-index: 50;
        }
        .white-key { 
            flex: 1; background: linear-gradient(to bottom, #f8fafc 0%, #cbd5e1 100%); 
            border-radius: 0 0 8px 8px; border: 1px solid #94a3b8;
            display: flex; align-items: flex-end; justify-content: center; 
            padding-bottom: 10px; color: #64748b; font-size: 0.6rem; font-weight: bold;
            transition: all 0.05s;
        }
        .key-pressed { background: linear-gradient(to bottom, #3b82f6 0%, #1d4ed8 100%) !important; transform: translateY(5px); color: white !important; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="absolute top-5 flex flex-col items-center gap-2 z-[100]">
            <h1 class="text-2xl font-black text-white italic tracking-widest">PIANO <span class="text-blue-500">ULTRA</span></h1>
            <button id="startBtn" class="bg-blue-600 px-6 py-2 rounded-full text-white font-bold shadow-lg active:scale-95 transition-all text-sm">SƏSİ AÇ & BAŞLA</button>
            <div id="status" class="text-[10px] text-slate-500 font-mono">SİSTEM HAZIRLANIR...</div>
        </div>

        <div id="canvas-wrapper">
            <video id="input_video"></video>
            <canvas id="output_canvas"></canvas>
            <div id="piano-board"></div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const pianoBoard = document.getElementById('piano-board');
        const startBtn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        let audioCtx, isReady = false;
        const notes = ['C3','D3','E3','F3','G3','A3','B3','C4','D4','E4','F4','G4','A4','B4','C5'];
        const freqs = [130.81, 146.83, 164.81, 174.61, 196.00, 220.00, 246.94, 261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
        
        let activeKeys = new Set();

        // Düymələrin sayını çoxaltdıq (15 nota)
        notes.forEach((n, i) => {
            const key = document.createElement('div');
            key.className = 'white-key';
            key.id = `note-${i}`;
            key.innerText = n;
            pianoBoard.appendChild(key);
        });

        startBtn.onclick = () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isReady = true;
            startBtn.classList.add('hidden');
            status.innerText = "SİSTEM AKTİVDİR";
        };

        function playNote(i) {
            if(!isReady || activeKeys.has(i)) return;
            activeKeys.add(i);

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Həqiqi səs üçün "Sawtooth" və "Sine" qarışığı effekti
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(freqs[i], audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.8);

            const el = document.getElementById(`note-${i}`);
            el.classList.add('key-pressed');
            setTimeout(() => {
                el.classList.remove('key-pressed');
                activeKeys.delete(i);
            }, 150);
        }

        function onResults(results) {
            // Render sürətini artırmaq üçün təmizləmə
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    // Hər əldəki hər barmaq ucunu (4, 8, 12, 16, 20 nömrəli nöqtələr) yoxla
                    const fingertips = [4, 8, 12, 16, 20];
                    
                    fingertips.forEach(pointIdx => {
                        const point = landmarks[pointIdx];
                        const x = point.x * canvasElement.width;
                        const y = point.y * canvasElement.height;

                        // Vizual göstərici
                        canvasCtx.fillStyle = pointIdx === 8 ? "#3b82f6" : "#f8fafc";
                        canvasCtx.beginPath();
                        canvasCtx.arc(x, y, 8, 0, 2 * Math.PI);
                        canvasCtx.fill();

                        // Düyməyə dəyib-dəymədiyini yoxla
                        if (y > canvasElement.height * 0.65) {
                            const keyIdx = Math.floor((x / canvasElement.width) * notes.length);
                            if (keyIdx >= 0 && keyIdx < notes.length) {
                                playNote(keyIdx);
                            }
                        }
                    });
                }
            }
            canvasCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 0, // 0 = Ən yüksək sürət (Dona-dona işləməni aradan qaldırır)
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 360 // Daha aşağı çözünürlük = daha çox FPS (sürət)
        });
        camera.start();
    </script>
</body>
</html>
