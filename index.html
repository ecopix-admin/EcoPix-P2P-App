<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Görən Göz - Xətai 5 Qəpik Music</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

    <audio id="local-audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" preload="auto"></audio>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        cursor="rayOrigin: mouse"
    >
        <a-camera gps-camera rotation-reader fov="80">
            <a-cursor color="#00f2ea" scale="1 1 1"></a-cursor>
        </a-camera>

        <a-entity id="music-point" 
            gps-entity-place="latitude: 40.352872; longitude: 49.962667;">
            
            <a-sphere id="music-button" 
                position="0 1.60 0" 
                radius="0.02" 
                color="#DAA520" 
                material="emissive: #DAA520; emissiveIntensity: 0.8"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 2000">
            </a-sphere>

            <a-text value="Tap to Play" align="center" position="0 1.70 0" scale="0.3 0.3 0.3" color="#fff"></a-text>
        </a-entity>

    </a-scene>

    <script>
        const audio = document.getElementById('local-audio');
        const button = document.getElementById('music-button');
        let isPlaying = false;

        // Obyektə toxunma funksiyası
        button.addEventListener('click', function () {
            if (!isPlaying) {
                audio.play();
                button.setAttribute('color', '#00ff00'); // Oxuyanda yaşıl olsun
                isPlaying = true;
                console.log("Musiqi başladı");
            } else {
                audio.pause();
                button.setAttribute('color', '#DAA520'); // Dayananda qızılı (5 qəpik) rəngə qayıtsın
                isPlaying = false;
                console.log("Musiqi dayandı");
            }
        });

        // Brauzer təhlükəsizliyi üçün ilk toxunuşda audio icazəsi
        window.addEventListener('click', () => {
            if (audio.paused && !isPlaying) {
                audio.muted = false;
            }
        }, { once: true });
    </script>
</body>
</html>
