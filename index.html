<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecopix Messenger & TV</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --neon-red: #ff0055; --neon-green: #00ff41; --bg: #0a0a0a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* TikTok Style TV Container */
        #tv-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            background: #000;
        }
        .tv-slide {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: auto;
        }

        /* Kanal Məlumatı Overlay */
        .channel-info {
            position: absolute;
            bottom: 80px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }
        .channel-info h2 { 
            color: var(--neon-green); 
            text-shadow: 0 0 10px var(--neon-green);
            font-size: 24px;
            margin-bottom: 5px;
        }
        .country-tag {
            background: var(--neon-red);
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        /* Sağ Menyu */
        .side-ctrls {
            position: absolute;
            right: 15px;
            bottom: 150px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
        }
        .icon-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 28px;
            cursor: pointer;
        }
        .icon-box span { font-size: 12px; margin-top: 5px; }

        /* Naviqasiya */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 65px;
            background: rgba(0,0,0,0.95);
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        .nav-item { color: #555; text-align: center; font-size: 11px; cursor: pointer; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 3px; }
        .nav-item.active { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }

        /* Səsləndirmə bildirişi */
        #mute-hint {
            position: fixed;
            top: 20px;
            width: 100%;
            text-align: center;
            color: var(--neon-red);
            font-weight: bold;
            z-index: 200;
            pointer-events: none;
            animation: blink 2s infinite;
        }
        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0;} }
    </style>
</head>
<body>

    <div id="mute-hint">Səsi aktiv etmək üçün ekrana toxunun!</div>

    <div id="tv-container">
        </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="location.reload()"><i class="fas fa-comment"></i>SÖHBƏT</div>
        <div class="nav-item active"><i class="fas fa-tv"></i>CANLI TV</div>
        <div class="nav-item"><i class="fas fa-users"></i>KONTAKTLAR</div>
    </div>

    <script>
        // KANAL BAZASI (Burada ən məşhur kanallar yerləşdirilir)
        const channels = [
            // AZERBAIJAN
            { name: "AZTV", country: "AZƏRBAYCAN", url: "https://www.youtube.com/embed/live_stream?channel=UCpHeC_pIn-A_O_tZ_I9Hh6g&autoplay=1" },
            { name: "İCTİMAİ TV", country: "AZƏRBAYCAN", url: "https://www.youtube.com/embed/live_stream?channel=UC4pCshT55s7S3p4ZunHh7_A&autoplay=1" },
            { name: "ARB TV", country: "AZƏRBAYCAN", url: "https://www.youtube.com/embed/live_stream?channel=UC_aB4uR5rD_nS52PZit2XpA&autoplay=1" },
            
            // TÜRKİYE
            { name: "TRT HABER", country: "TÜRKİYƏ", url: "https://www.youtube.com/embed/live_stream?channel=UC8sc805VLlp9pLxy9J9N4_Q&autoplay=1" },
            { name: "STAR TV", country: "TÜRKİYƏ", url: "https://www.youtube.com/embed/live_stream?channel=UC6_S7LpXfR0Xf6lX9YwH-0w&autoplay=1" },
            { name: "ATV TÜRKİYE", country: "TÜRKİYƏ", url: "https://www.youtube.com/embed/live_stream?channel=UCpP7TfS8pA0A1X4r_9yD07A&autoplay=1" },
            { name: "HALK TV", country: "TÜRKİYƏ", url: "https://www.youtube.com/embed/live_stream?channel=UCf_u6fW56lQ_RpxM7I7vP5A&autoplay=1" },

            // RUSSIA
            { name: "RUSSIA 24", country: "RUSİYA", url: "https://www.youtube.com/embed/live_stream?channel=UC_jI7H0-N38pIsLp5vE5N_Q&autoplay=1" },
            { name: "NTV RUSSIA", country: "RUSİYA", url: "https://www.youtube.com/embed/live_stream?channel=UCpP7TfS8pA0A1X4r_9yD07A&autoplay=1" }
        ];

        const container = document.getElementById('tv-container');

        function renderTV() {
            container.innerHTML = channels.map(ch => `
                <div class="tv-slide">
                    <iframe src="${ch.url}" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
                    <div class="channel-info">
                        <span class="country-tag">${ch.country}</span>
                        <h2>${ch.name}</h2>
                        <p style="font-size: 12px; color: #ccc;">Canlı Yayım - EcoPix TV</p>
                    </div>
                    <div class="side-ctrls">
                        <div class="icon-box"><i class="fas fa-heart" style="color:var(--neon-red)"></i><span>Canlı</span></div>
                        <div class="icon-box"><i class="fas fa-share"></i><span>Paylaş</span></div>
                        <div class="icon-box"><i class="fas fa-expand"></i><span>Tam</span></div>
                    </div>
                </div>
            `).join('');
        }

        // İlk yükləmə
        renderTV();

        // Səs məsələsi üçün brauzer xəbərdarlığı (Autoplay block edilməsin deyə)
        window.onclick = function() {
            document.getElementById('mute-hint').style.display = 'none';
        }

        // Sürüşdürmə zamanı səmərəlilik (Lazy loading simulyasiyası)
        container.addEventListener('scroll', () => {
            // Sürüşdürərkən performans üçün buraya əlavə kodlar qoymaq olar
        });
    </script>
</body>
</html>
