<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görən Göz - 3D Blueprint</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #111; color: #0f0; font-family: monospace; overflow: hidden; }
        #overlay { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 10; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        button { padding: 15px; background: #222; color: #0f0; border: 1px solid #0f0; border-radius: 5px; cursor: pointer; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="overlay">
    <div id="info">Küncə yaxınlaşın və 'KÜNCÜ QEYD ET' basın</div>
    <div id="stats">Sahə: 0 m²</div>
</div>

<div class="controls">
    <button onclick="addPoint()">KÜNCÜ QEYD ET</button>
    <button onclick="generateModel()" style="background: #004400;">MODELİ BİTİR</button>
</div>

<script>
    let points = [];
    let area = 0;

    function speak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ru-RU'; // Sənin istəyinlə rus dilində təlimat
        window.speechSynthesis.speak(msg);
    }

    function addPoint() {
        // Real cihazda burada DeviceMotion vasitəsilə kordinat götürülür
        let x = Math.random() * 5; 
        let z = Math.random() * 5;
        points.push({x, z});
        
        speak("Точка зафиксирована");
        document.getElementById('info').innerText = points.length + " künc qeyd edildi";
    }

    function calculateArea() {
        // Şoelace alqoritmi ilə sahə hesablama
        let a = 0;
        for (let i = 0; i < points.length; i++) {
            let j = (i + 1) % points.length;
            a += points[i].x * points[j].z;
            a -= points[j].x * points[i].z;
        }
        return Math.abs(a / 2).toFixed(2);
    }

    function generateModel() {
        if (points.length < 3) {
            alert("Model üçün ən azı 3 künc lazımdır!");
            return;
        }
        
        area = calculateArea();
        document.getElementById('stats').innerText = "Sahə: " + area + " m²";
        
        // Səsli nəticə
        speak(`Площадь комнаты ${area} квадратных метров. Стены отсканированы.`);
        
        // Burada 3D model (OBJ/STL) yaratmaq və Telegrama göndərmə məntiqi qoşula bilər
        alert("3D Blueprint hazırlandı və GitHub-a göndərilməyə hazırdır.");
    }
</script>
</body>
</html>
