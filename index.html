<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Sham-Vision GPS AR</title>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-look-at-marker.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #debug {
            position: absolute; bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.8); color: #0f0;
            padding: 10px; font-family: monospace; z-index: 10;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <div id="debug">GPS AR Aktivdir. Kordinata baxın.</div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-assets>
            <video id="ar-video" 
                   src="https://www.w3schools.com/html/mov_bbb.mp4" 
                   preload="auto" response-type="arraybuffer" 
                   loop="true" crossorigin="anonymous" playsinline autoplay muted>
            </video>
        </a-assets>

        <a-video
            src="#ar-video"
            look-at="[gps-camera]"
            gps-entity-place="latitude: 40.353482; longitude: 49.965170;"
            scale="15 15 15"
            position="0 10 0">
            </a-video>

        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        // Ekrana ilk toxunuşda səsi aktivləşdir və videonu başlat
        window.addEventListener('click', function () {
            const v = document.querySelector('#ar-video');
            v.muted = false;
            v.play();
            document.getElementById('debug').innerText = "Video Oynayır...";
        });
    </script>
</body>
</html>
