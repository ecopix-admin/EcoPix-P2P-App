<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Blueprint 3D - Mühəndis</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #camera-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #ui-layer { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        .header { background: rgba(0, 255, 0, 0.2); color: #0f0; padding: 20px; text-align: center; border-bottom: 1px solid #0f0; }
        .footer { padding: 30px; display: flex; justify-content: space-around; pointer-events: auto; }
        button { padding: 15px 25px; background: rgba(0, 0, 0, 0.8); color: #0f0; border: 2px solid #0f0; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #0f0; font-size: 30px; z-index: 5; pointer-events: none; }
    </style>
</head>
<body>

    <video id="camera-view" autoplay playsinline></video>

    <div id="crosshair">+</div>

    <div id="ui-layer">
        <div class="header">
            <div id="info">Kameranı küncə tutun</div>
            <div id="area">Sahə: 0.00 m²</div>
        </div>

        <div class="footer">
            <button onclick="savePoint()">KÜNCÜ QEYD ET</button>
            <button onclick="finishScan()" style="border-color: #ff4500; color: #ff4500;">BİTİR VƏ HESABLA</button>
        </div>
    </div>

    <script>
        let points = [];
        const video = document.getElementById('camera-view');

        // Kameranı aktiv etmək
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Kamera icazəsi verilmədi! Ayarlardan icazə verin.");
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ru-RU';
            window.speechSynthesis.speak(msg);
        }

        function savePoint() {
            // Real dünyada bu nöqtələr hərəkət sensoru ilə götürülməlidir
            // Simulyasiya üçün hər addımda bir addım irəli gedirik
            points.push({ x: Math.random() * 4, y: Math.random() * 4 });
            speak("Точка зафиксирована");
            document.getElementById('info').innerText = points.length + " künc yadda saxlanıldı";
        }

        function finishScan() {
            if (points.length < 3) {
                alert("Ən azı 3 künc qeyd etməlisiniz!");
                return;
            }

            // Sahə hesablama (Mühəndislik alqoritmi)
            let a = 0;
            for (let i = 0; i < points.length; i++) {
                let j = (i + 1) % points.length;
                a += points[i].x * points[j].y;
                a -= points[j].x * points[i].y;
            }
            let finalArea = Math.abs(a / 2).toFixed(2);
            
            document.getElementById('area').innerText = `Sahə: ${finalArea} m²`;
            speak(`Сканирование завершено. Площадь комнаты ${finalArea} квадратных метров.`);
            alert("Məlumatlar mühəndis hesabatı üçün hazırlandı.");
        }

        setupCamera();
    </script>
</body>
</html>
