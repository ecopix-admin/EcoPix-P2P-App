<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Görən Göz - Matrix AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        
        /* HUD Çərçivələri */
        .hud-element {
            position: fixed;
            z-index: 10000;
            color: #00f2ea;
            text-shadow: 0 0 10px #00f2ea;
            pointer-events: none;
        }

        /* Sol Üst: GPS və Sürət */
        .top-left { top: 20px; left: 20px; font-size: 14px; border-left: 3px solid #ff0050; padding-left: 10px; }
        
        /* Sağ Üst: Sistem Statusu */
        .top-right { top: 20px; right: 20px; text-align: right; font-size: 14px; }

        /* Mərkəzi Nəhəng TikTok */
        #tiktok-screen {
            position: fixed;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw;
            height: 70vh;
            z-index: 9999;
            border: 2px solid rgba(0, 242, 234, 0.3);
            box-shadow: 0 0 30px rgba(0, 242, 234, 0.2);
            opacity: 0.8; /* Şəffaf rejim */
        }

        /* Aşağı: Scaner Effekti */
        .scanner-line {
            position: fixed;
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 234, 0.5);
            z-index: 10001;
            animation: scan 4s linear infinite;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .live-tag { background: #ff0050; color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>

    <div class="scanner-line"></div>

    <div class="hud-element top-left">
        <span class="live-tag">GPS CONNECTED</span><br>
        MƏKAN: <span id="loc-name">Nərimanov, Bakı</span><br>
        SÜRƏT: <span id="speed">0</span> KM/H<br>
        COORD: <span id="coords">40.43, 49.86</span>
    </div>

    <div class="hud-element top-right">
        SYS: ACTIVE<br>
        BATT: <span id="batt">100%</span><br>
        V-MODE: GHOST-AR
    </div>

    <div id="tiktok-screen">
        <iframe 
            src="https://www.tiktok.com/embed/v2/7106794791338888494" 
            style="width: 100%; height: 100%; border: none;" 
            allow="autoplay; encrypted-media; fullscreen">
        </iframe>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-camera look-controls-enabled="false"></a-camera>
    </a-scene>

    <script>
        // GPS və Sürət Məlumatı
        navigator.geolocation.watchPosition((pos) => {
            document.getElementById('coords').innerText = `${pos.coords.latitude.toFixed(2)}, ${pos.coords.longitude.toFixed(2)}`;
            const speed = pos.coords.speed ? (pos.coords.speed * 3.6).toFixed(0) : "0";
            document.getElementById('speed').innerText = speed;
        });

        // Batareya Məlumatı
        navigator.getBattery().then(function(battery) {
            function updateBtn() {
                document.getElementById('batt').innerText = (battery.level * 100).toFixed(0) + "%";
            }
            updateBtn();
            battery.addEventListener('levelchange', updateBtn);
        });

        window.onload = () => {
            const msg = new SpeechSynthesisUtterance("Matrix rejimi aktivdir. Sistem tarandı.");
            msg.lang = 'az-AZ';
            window.speechSynthesis.speak(msg);
        };
    </script>
</body>
</html>
