<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON DRIFT 2026</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #00f2ff;
            font-size: 28px; font-weight: bold; text-shadow: 0 0 10px #00f2ff;
            pointer-events: none;
        }
        .btn {
            padding: 15px 40px; background: transparent; color: #ff0055;
            border: 3px solid #ff0055; font-size: 24px; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 3px;
        }
        .btn:hover { background: #ff0055; color: #fff; box-shadow: 0 0 30px #ff0055; }
        h1 { color: #00f2ff; font-size: 48px; margin-bottom: 10px; text-shadow: 0 0 20px #00f2ff; }
        p { color: #888; margin-bottom: 30px; }
    </style>
</head>
<body>

<div id="ui">XAL: 0</div>

<div id="overlay">
    <h1 id="title">NEON DRIFT</h1>
    <p>MANEƏLƏRDƏN QAÇ VƏ SÜRƏTİ ARTIR</p>
    <button class="btn" onclick="startGame()">SÜRÜŞƏ BAŞLA</button>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    let scene, camera, renderer, car, score = 0, speed = 0.5, isPlaying = false;
    let obstacles = [], particles = [], laneWidth = 4;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050508);
        scene.fog = new THREE.Fog(0x050508, 10, 40);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // İşıqlandırma
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);
        const blueLight = new THREE.PointLight(0x00f2ff, 2, 20);
        blueLight.position.set(5, 5, 5);
        scene.add(blueLight);

        // Yol (Yüksək keyfiyyətli tekstura effektli)
        const roadGeo = new THREE.PlaneGeometry(15, 1000);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        // Yol xətləri
        const grid = new THREE.GridHelper(1000, 100, 0x00f2ff, 0x222222);
        grid.position.y = 0.05;
        scene.add(grid);

        createCar();
        window.addEventListener('resize', onResize);
        
        // İdarəetmə
        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft' && car.position.x > -laneWidth) car.position.x -= laneWidth;
            if(e.key === 'ArrowRight' && car.position.x < laneWidth) car.position.x += laneWidth;
        });

        // Mobil idarəetmə
        window.addEventListener('touchstart', (e) => {
            const x = e.touches[0].clientX;
            if(x < window.innerWidth / 2) {
                if(car.position.x > -laneWidth) car.position.x -= laneWidth;
            } else {
                if(car.position.x < laneWidth) car.position.x += laneWidth;
            }
        });
    }

    function createCar() {
        const group = new THREE.Group();
        // Gövdə
        const body = new THREE.Mesh(
            new THREE.BoxGeometry(1.8, 0.6, 3.5),
            new THREE.MeshStandardMaterial({ color: 0x00f2ff, metalness: 0.8, roughness: 0.2 })
        );
        body.position.y = 0.6;
        group.add(body);

        // Kabina
        const cabin = new THREE.Mesh(
            new THREE.BoxGeometry(1.4, 0.5, 1.5),
            new THREE.MeshStandardMaterial({ color: 0x000000 })
        );
        cabin.position.y = 1.1;
        cabin.position.z = -0.2;
        group.add(cabin);

        // Neon Farlar
        const lightGeo = new THREE.BoxGeometry(0.4, 0.1, 0.1);
        const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const l1 = new THREE.Mesh(lightGeo, lightMat); l1.position.set(0.6, 0.6, 1.75);
        const l2 = new THREE.Mesh(lightGeo, lightMat); l2.position.set(-0.6, 0.6, 1.75);
        group.add(l1, l2);

        car = group;
        scene.add(car);
    }

    function spawnObstacle() {
        const obsGeo = new THREE.BoxGeometry(2, 2, 2);
        const obsMat = new THREE.MeshStandardMaterial({ color: 0xff0055, emissive: 0xff0055 });
        const obs = new THREE.Mesh(obsGeo, obsMat);
        obs.position.x = (Math.floor(Math.random() * 3) - 1) * laneWidth;
        obs.position.z = -50;
        obs.position.y = 1;
        obstacles.push(obs);
        scene.add(obs);
    }

    function startGame() {
        isPlaying = true;
        score = 0;
        speed = 0.5;
        obstacles.forEach(o => scene.remove(o));
        obstacles = [];
        document.getElementById('overlay').style.display = 'none';
        animate();
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        if(!isPlaying) return;
        requestAnimationFrame(animate);

        score += 0.1;
        document.getElementById('ui').innerText = `XAL: ${Math.floor(score)}`;
        speed += 0.0002;

        // Yolun hərəkəti (illüziya)
        scene.children.forEach(child => {
            if(child instanceof THREE.GridHelper) {
                child.position.z += speed;
                if(child.position.z > 10) child.position.z = 0;
            }
        });

        // Maneələr
        if(Math.random() < 0.03) spawnObstacle();
        obstacles.forEach((obs, i) => {
            obs.position.z += speed;
            // Toqquşma
            if(car.position.distanceTo(obs.position) < 2) {
                isPlaying = false;
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('title').innerText = "QƏZA BAŞ VERDİ!";
            }
            if(obs.position.z > 10) {
                scene.remove(obs);
                obstacles.splice(i, 1);
            }
        });

        // Avtomobilin titrəməsi (Motor effekti)
        car.position.y = 0.05 * Math.sin(Date.now() * 0.01);

        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
