<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akustik Göz - Səs Vizualizatoru</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            width: 100vw;
            height: 70vh;
            border-bottom: 2px solid #00ff00;
        }

        .controls {
            padding: 20px;
            text-align: center;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #00ff00;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }

        button:hover {
            background: #008800;
        }

        .legend {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h2 style="margin-top: 10px;">AKUSTİK RADAR V1.0</h2>
    <canvas id="visualizer"></canvas>

    <div class="controls">
        <button id="startBtn">SİSTEMİ AKTİV ET</button>
        <div class="legend">
            <p>Qırmızı/Sarı: Güclü Səs (Maşın, İt) | Yaşıl/Göy: Zəif Səs (İnsan səsi, Külək)</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');

        let audioCtx;
        let analyser;
        let dataArray;
        let source;

        startBtn.addEventListener('click', initAudio);

        function initAudio() {
            startBtn.style.display = 'none';
            
            // Audio Context yaradılır
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048; // Detallaşdırma səviyyəsi

            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    source = audioCtx.createMediaStreamSource(stream);
                    source.connect(analyser);
                    
                    const bufferLength = analyser.frequencyBinCount;
                    dataArray = new Uint8Array(bufferLength);
                    
                    draw();
                })
                .catch(err => {
                    alert("Mikrofona icazə verilmədi: " + err);
                });
        }

        function draw() {
            const width = canvas.width = window.innerWidth;
            const height = canvas.height = window.innerHeight * 0.7;

            requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);

            // Ekranı təmizləmək əvəzinə görüntünü sola sürüşdürək (şəlalə effekti)
            const imageData = ctx.getImageData(1, 0, width - 1, height);
            ctx.putImageData(imageData, 0, 0);

            // Yeni səs məlumatını ən sağa çəkək
            for (let i = 0; i < dataArray.length; i++) {
                const value = dataArray[i];
                const percent = value / 255;
                const y = height - (i * (height / (dataArray.length / 4))); // Tezlik oxu
                
                // Rəng kodlaması: Güclü səslər qırmızı, zəif səslər göy
                const hue = (1 - percent) * 240; 
                ctx.fillStyle = `hsla(${hue}, 100%, 50%, 1)`;
                
                if (value > 10) { // Səs küyünü süzgəcdən keçir
                    ctx.fillRect(width - 1, y, 1, 2);
                }
            }
        }
    </script>
</body>
</html>
