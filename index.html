<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER ARENA 2026</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid #0f0; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
            box-shadow: 0 0 10px #0f0;
        }
        #ui {
            position: absolute; bottom: 30px; left: 30px;
            color: #0f0; font-size: 24px; text-shadow: 0 0 15px #0f0;
        }
        #hp-bar {
            position: absolute; bottom: 30px; right: 30px;
            width: 200px; height: 20px; border: 2px solid #f00;
        }
        #hp-inner { width: 100%; height: 100%; background: #f00; transition: 0.3s; }
        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            color: #0f0; text-align: center;
        }
        button {
            background: transparent; border: 2px solid #0f0; color: #0f0;
            padding: 15px 40px; font-size: 20px; cursor: pointer; margin-top: 20px;
            text-transform: uppercase; letter-spacing: 3px;
        }
        button:hover { background: #0f0; color: #000; box-shadow: 0 0 30px #0f0; }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">SCORE: 0</div>
    <div id="hp-bar"><div id="hp-inner"></div></div>

    <div id="menu">
        <h1>CYBER ARENA: FPS</h1>
        <p>W,A,S,D - HƏRƏKƏT | MOUSE - NİŞAN AL | CLICK - ATƏŞ</p>
        <button onclick="start()">SAVAŞA BAŞLA</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        let scene, camera, renderer, isPlaying = false, score = 0, hp = 100;
        let bullets = [], enemies = [], particles = [];
        let moveF = false, moveB = false, moveL = false, moveR = false;
        const velocity = new THREE.Vector3();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 0, 40);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Yer (Neon Grid)
            const grid = new THREE.GridHelper(100, 40, 0x00ff00, 0x111111);
            scene.add(grid);

            // İşıqlandırma
            const amb = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(amb);

            // Pointer Lock
            document.addEventListener('click', () => {
                if(isPlaying) document.body.requestPointerLock();
            });

            document.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement) {
                    camera.rotation.y -= e.movementX * 0.002;
                    const pitch = camera.rotation.x - e.movementY * 0.002;
                    camera.rotation.x = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
                }
            });

            window.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW') moveF = true; if(e.code === 'KeyS') moveB = true;
                if(e.code === 'KeyA') moveL = true; if(e.code === 'KeyD') moveR = true;
            });
            window.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW') moveF = false; if(e.code === 'KeyS') moveB = false;
                if(e.code === 'KeyA') moveL = false; if(e.code === 'KeyD') moveR = false;
            });
            window.addEventListener('mousedown', shoot);
        }

        function shoot() {
            if(!document.pointerLockElement || !isPlaying) return;
            const bullet = new THREE.Mesh(
                new THREE.SphereGeometry(0.05, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0x00ff00 })
            );
            bullet.position.copy(camera.position);
            bullet.position.y -= 0.2;
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            bullet.userData.velocity = dir.multiplyScalar(1.2);
            bullets.push(bullet);
            scene.add(bullet);
        }

        function spawnEnemy() {
            if(!isPlaying) return;
            const enemy = new THREE.Mesh(
                new THREE.BoxGeometry(1, 2, 1),
                new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 1 })
            );
            const a = Math.random() * Math.PI * 2;
            const d = 25 + Math.random() * 5;
            enemy.position.set(Math.cos(a)*d, 1, Math.sin(a)*d);
            enemies.push(enemy);
            scene.add(enemy);
            setTimeout(spawnEnemy, 1500 - Math.min(score * 10, 1000));
        }

        function animate() {
            if(!isPlaying) return;
            requestAnimationFrame(animate);

            // Hərəkət
            const dir = new THREE.Vector3();
            dir.z = Number(moveF) - Number(moveB);
            dir.x = Number(moveR) - Number(moveL);
            dir.normalize();
            if(moveF || moveB) velocity.z -= dir.z * 0.015;
            if(moveL || moveR) velocity.x -= dir.x * 0.015;
            camera.translateX(-velocity.x);
            camera.translateZ(-velocity.z);
            velocity.multiplyScalar(0.9);

            // Güllə fizikası
            bullets.forEach((b, i) => {
                b.position.add(b.userData.velocity);
                if(b.position.length() > 50) { scene.remove(b); bullets.splice(i, 1); }
            });

            // Düşmən AI
            enemies.forEach((e, i) => {
                const eDir = new THREE.Vector3().subVectors(camera.position, e.position).normalize();
                e.position.x += eDir.x * 0.06;
                e.position.z += eDir.z * 0.06;

                bullets.forEach((b, bi) => {
                    if(b.position.distanceTo(e.position) < 1.2) {
                        scene.remove(e); enemies.splice(i, 1);
                        scene.remove(b); bullets.splice(bi, 1);
                        score += 50;
                        document.getElementById('ui').innerText = `SCORE: ${score}`;
                    }
                });

                if(e.position.distanceTo(camera.position) < 1.5) {
                    hp -= 0.5;
                    document.getElementById('hp-inner').style.width = hp + "%";
                    if(hp <= 0) location.reload();
                }
            });

            renderer.render(scene, camera);
        }

        window.start = () => {
            document.getElementById('menu').style.display = 'none';
            isPlaying = true;
            init();
            spawnEnemy();
            animate();
        };
    </script>
</body>
</html>
