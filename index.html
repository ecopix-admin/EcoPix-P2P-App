<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Sky-Ad Pro | Coca-Cola Edition</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #overlay {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 15px;
            border-radius: 12px; border: 2px solid #fe001a; z-index: 10;
            text-align: center; width: 85%; font-family: sans-serif;
        }
        .loader { color: #fe001a; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }
    </style>
</head>

<body>
    <div id="overlay">
        <div style="font-size: 1.2em; color: #fe001a; font-weight: bold;">SKY-AD ENGINE v2.0</div>
        <div id="status" class="loader">GPS və Səma skan edilir...</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <img id="cokeLogo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Coca-Cola_logo.svg/1024px-Coca-Cola_logo.svg.png">
        </a-assets>

        <a-camera gps-camera="minDistance: 5; maxDistance: 100000;" rotation-reader></a-camera>
    </a-scene>

    <script>
        const status = document.getElementById('status');

        window.onload = () => {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                
                // OpenSky API-a qoşulmaq üçün alternativ və daha sürətli bir yol
                // Ehtiyac olarsa CORS proxy əlavə edilə bilər
                const url = `https://opensky-network.org/api/states/all?lamin=${lat-1}&lomin=${lon-1}&lamax=${lat+1}&lomax=${lon+1}`;

                fetch(url)
                .then(res => res.json())
                .then(data => {
                    const scene = document.querySelector('a-scene');
                    if (!data.states || data.states.length === 0) {
                        status.innerText = "Hazırda səmada aktiv təyyarə tapılmadı.";
                        return;
                    }

                    status.innerText = `${data.states.length} Təyyarə üçün reklam aktivləşdirildi!`;

                    data.states.forEach(plane => {
                        const [icao, callsign, country, time, last, pLon, pLat, pAlt] = plane;
                        
                        const anchor = document.createElement('a-entity');
                        anchor.setAttribute('gps-entity-place', `latitude: ${pLat}; longitude: ${pLon};`);

                        // Reklam Banneri (Qırmızı Coca-Cola Lenti)
                        const banner = document.createElement('a-plane');
                        banner.setAttribute('width', '300');
                        banner.setAttribute('height', '40');
                        banner.setAttribute('position', '0 0 -150'); // Təyyarənin quyruq tərəfi
                        banner.setAttribute('rotation', '-90 0 0');
                        banner.setAttribute('material', 'color: #fe001a; opacity: 0.8; side: double; transparent: true');

                        // Loqo
                        const logo = document.createElement('a-image');
                        logo.setAttribute('src', '#cokeLogo');
                        logo.setAttribute('width', '120');
                        logo.setAttribute('height', '40');
                        logo.setAttribute('position', '0 0 0.2');

                        banner.appendChild(logo);
                        anchor.appendChild(banner);
                        scene.appendChild(anchor);
                    });
                })
                .catch(err => {
                    status.innerText = "Bağlantı xətası. Səhifəni yeniləyin.";
                    console.error(err);
                });
            }, (err) => {
                status.innerText = "GPS icazəsi verilməyib!";
            });
        };
    </script>
</body>
</html>
